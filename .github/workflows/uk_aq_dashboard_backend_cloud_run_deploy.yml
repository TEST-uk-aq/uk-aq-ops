name: Deploy UK AQ Dashboard Backend Cloud Run Service

on:
  push:
    branches:
      - main
    paths:
      - "local/dashboard/server/**"
      - "dashboard/**"
      - "scripts/gcp/uk_aq_secret_upsert_if_changed.sh"
      - ".github/workflows/uk_aq_dashboard_backend_cloud_run_deploy.yml"
  workflow_dispatch:

concurrency:
  group: uk-aq-dashboard-backend-deploy
  cancel-in-progress: false

jobs:
  deploy-dashboard-backend-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
      REPO: ${{ vars.GCP_ARTIFACT_REPO || 'uk-aq' }}
      SERVICE_NAME: ${{ vars.GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_NAME || 'uk-aq-dashboard-backend' }}
      DASHBOARD_BACKEND_SERVICE_ACCOUNT: ${{ vars.GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_ACCOUNT || vars.GCP_OPS_JOB_SERVICE_ACCOUNT || '' }}
      RESOURCE_LABEL: uk-aq-dashboard-backend-service
      SERVICE_TIMEOUT_SECONDS: ${{ vars.GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_TIMEOUT_SECONDS || '900' }}
      SERVICE_CPU: ${{ vars.GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_CPU || '0.25' }}
      SERVICE_MEMORY: ${{ vars.GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_MEMORY || '512Mi' }}
      SERVICE_CONCURRENCY: ${{ vars.GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_CONCURRENCY || '10' }}
      SERVICE_MAX_INSTANCES: ${{ vars.GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_MAX_INSTANCES || '1' }}
      SERVICE_MIN_INSTANCES: ${{ vars.GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_MIN_INSTANCES || '0' }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      OBS_AQIDB_SUPABASE_URL: ${{ vars.OBS_AQIDB_SUPABASE_URL }}
      UK_AQ_PUBLIC_SCHEMA: ${{ vars.UK_AQ_PUBLIC_SCHEMA || 'uk_aq_public' }}
      UK_AQ_DB_SIZE_LOOKBACK_DAYS: ${{ vars.UK_AQ_DB_SIZE_LOOKBACK_DAYS || '28' }}
      UK_AQ_DB_SIZE_API_URL: ${{ vars.UK_AQ_DB_SIZE_API_URL || '' }}
      UK_AQ_R2_HISTORY_DAYS_API_URL: ${{ vars.UK_AQ_R2_HISTORY_DAYS_API_URL || '' }}
      UK_AQ_R2_HISTORY_COUNTS_API_URL: ${{ vars.UK_AQ_R2_HISTORY_COUNTS_API_URL || '' }}
      UK_AQ_R2_HISTORY_DAYS_API_MAX_DAYS: ${{ vars.UK_AQ_R2_HISTORY_DAYS_API_MAX_DAYS || '3660' }}
      UK_AQ_R2_HISTORY_WINDOW_RPC: ${{ vars.UK_AQ_R2_HISTORY_WINDOW_RPC || 'uk_aq_rpc_r2_history_window' }}
      UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX || 'history/v1/observations' }}
      UK_AQ_R2_HISTORY_AQILEVELS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_AQILEVELS_PREFIX || 'history/v1/aqilevels' }}
      CLEANAIRSURB_ST_ID: ${{ vars.CLEANAIRSURB_ST_ID || '' }}
      UK_AQ_DROPBOX_ROOT: ${{ vars.UK_AQ_DROPBOX_ROOT || '' }}
      UK_AQ_R2_HISTORY_DROPBOX_DIR: ${{ vars.UK_AQ_R2_HISTORY_DROPBOX_DIR || '' }}
      UK_AQ_R2_HISTORY_BACKUP_STATE_REL_PATH: ${{ vars.UK_AQ_R2_HISTORY_BACKUP_STATE_REL_PATH || '' }}
      UK_AQ_R2_HISTORY_DROPBOX_STATE_FILE: ${{ vars.UK_AQ_R2_HISTORY_DROPBOX_STATE_FILE || '' }}
      UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID: ${{ vars.UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID || '' }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
      SB_SECRET_KEY: ${{ secrets.SB_SECRET_KEY }}
      OBS_AQIDB_SECRET_KEY: ${{ secrets.OBS_AQIDB_SECRET_KEY }}
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY || '' }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET || '' }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN || '' }}
      UK_AQ_DB_SIZE_API_TOKEN: ${{ secrets.UK_AQ_DB_SIZE_API_TOKEN || '' }}
      UK_AQ_R2_HISTORY_DAYS_API_TOKEN: ${{ secrets.UK_AQ_R2_HISTORY_DAYS_API_TOKEN || '' }}
      UK_AQ_R2_HISTORY_COUNTS_API_TOKEN: ${{ secrets.UK_AQ_R2_HISTORY_COUNTS_API_TOKEN || '' }}
      DASHBOARD_UPSTREAM_BEARER_TOKEN: ${{ secrets.DASHBOARD_UPSTREAM_BEARER_TOKEN || '' }}
      UK_AQ_R2_CLOUDFLARE_API_TOKEN: ${{ secrets.UK_AQ_R2_CLOUDFLARE_API_TOKEN || '' }}
      CFLARE_API_READ_TOKEN: ${{ secrets.CFLARE_API_READ_TOKEN || '' }}
      SB_SECRET_KEY_SECRET_NAME: ${{ vars.SB_SECRET_KEY_SECRET_NAME || 'SB_SECRET_KEY' }}
      OBS_AQIDB_SECRET_KEY_SECRET_NAME: ${{ vars.OBS_AQIDB_SECRET_KEY_SECRET_NAME || 'OBS_AQIDB_SECRET_KEY' }}
      DROPBOX_APP_KEY_SECRET_NAME: ${{ vars.DROPBOX_APP_KEY_SECRET_NAME || 'DROPBOX_APP_KEY' }}
      DROPBOX_APP_SECRET_SECRET_NAME: ${{ vars.DROPBOX_APP_SECRET_SECRET_NAME || 'DROPBOX_APP_SECRET' }}
      DROPBOX_REFRESH_TOKEN_SECRET_NAME: ${{ vars.DROPBOX_REFRESH_TOKEN_SECRET_NAME || 'DROPBOX_REFRESH_TOKEN' }}
      UK_AQ_DB_SIZE_API_TOKEN_SECRET_NAME: ${{ vars.UK_AQ_DB_SIZE_API_TOKEN_SECRET_NAME || 'UK_AQ_DB_SIZE_API_TOKEN' }}
      UK_AQ_R2_HISTORY_DAYS_API_TOKEN_SECRET_NAME: ${{ vars.UK_AQ_R2_HISTORY_DAYS_API_TOKEN_SECRET_NAME || 'UK_AQ_R2_HISTORY_DAYS_API_TOKEN' }}
      UK_AQ_R2_HISTORY_COUNTS_API_TOKEN_SECRET_NAME: ${{ vars.UK_AQ_R2_HISTORY_COUNTS_API_TOKEN_SECRET_NAME || 'UK_AQ_R2_HISTORY_COUNTS_API_TOKEN' }}
      DASHBOARD_UPSTREAM_BEARER_TOKEN_SECRET_NAME: ${{ vars.DASHBOARD_UPSTREAM_BEARER_TOKEN_SECRET_NAME || 'DASHBOARD_UPSTREAM_BEARER_TOKEN' }}
      UK_AQ_R2_CLOUDFLARE_API_TOKEN_SECRET_NAME: ${{ vars.UK_AQ_R2_CLOUDFLARE_API_TOKEN_SECRET_NAME || 'UK_AQ_R2_CLOUDFLARE_API_TOKEN' }}
      CFLARE_API_READ_TOKEN_SECRET_NAME: ${{ vars.CFLARE_API_READ_TOKEN_SECRET_NAME || 'CFLARE_API_READ_TOKEN' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required project config
        run: |
          set -euo pipefail
          if [ -z "${PROJECT_ID:-}" ]; then
            echo "Missing required variable: GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "${DASHBOARD_BACKEND_SERVICE_ACCOUNT:-}" ]; then
            echo "Missing required service account setting: GCP_UK_AQ_DASHBOARD_BACKEND_SERVICE_ACCOUNT (or GCP_OPS_JOB_SERVICE_ACCOUNT)"
            exit 1
          fi
          if [[ "${DASHBOARD_BACKEND_SERVICE_ACCOUNT}" == *"-compute@developer.gserviceaccount.com" ]]; then
            echo "Invalid runtime service account: default compute service account is not allowed."
            exit 1
          fi
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Missing required variable: SUPABASE_URL"
            exit 1
          fi
          if [ -z "${OBS_AQIDB_SUPABASE_URL:-}" ]; then
            echo "Missing required variable: OBS_AQIDB_SUPABASE_URL"
            exit 1
          fi

      - name: Validate Google auth config
        run: |
          set -euo pipefail
          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && [ -n "${GCP_SERVICE_ACCOUNT:-}" ]; then
            echo "Using Workload Identity Federation auth."
          elif [ -n "${GCP_SA_KEY:-}" ]; then
            echo "Using Service Account key auth."
          else
            echo "Missing Google auth config."
            echo "Set either:"
            echo "1) GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT"
            echo "or"
            echo "2) GCP_SA_KEY"
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key fallback)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || env.GCP_SERVICE_ACCOUNT == '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f

      - name: Configure gcloud project
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gcloud config set run/region "${REGION}"

      - name: Verify Artifact Registry repository exists
        run: |
          set -euo pipefail
          gcloud artifacts repositories describe "${REPO}" \
            --location "${REGION}" \
            --project "${PROJECT_ID}" >/dev/null

      - name: Configure Docker auth for Artifact Registry
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push dashboard backend image
        id: build
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/uk-aq-dashboard-backend:${GITHUB_SHA::12}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          docker build -f local/dashboard/server/Dockerfile -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Sync GitHub secrets to GCP Secret Manager
        run: |
          set -euo pipefail
          UPSERT_SCRIPT="scripts/gcp/uk_aq_secret_upsert_if_changed.sh"

          upsert_secret() {
            local secret_name="$1"
            local secret_value="$2"
            local required="${3:-0}"

            if [ -z "${secret_name}" ]; then
              if [ "${required}" = "1" ]; then
                echo "Missing required secret name."
                exit 1
              fi
              return 0
            fi

            if [ -z "${secret_value}" ] && [ "${required}" = "0" ]; then
              echo "Skipping optional secret ${secret_name} (no GitHub secret/variable value)."
              return 0
            fi

            printf '%s' "${secret_value}" | "${UPSERT_SCRIPT}" \
              --project "${PROJECT_ID}" \
              --secret "${secret_name}" \
              --required "${required}"
          }

          upsert_secret "${SB_SECRET_KEY_SECRET_NAME}" "${SB_SECRET_KEY}" 1
          upsert_secret "${OBS_AQIDB_SECRET_KEY_SECRET_NAME}" "${OBS_AQIDB_SECRET_KEY}" 1
          upsert_secret "${DROPBOX_APP_KEY_SECRET_NAME}" "${DROPBOX_APP_KEY}" 0
          upsert_secret "${DROPBOX_APP_SECRET_SECRET_NAME}" "${DROPBOX_APP_SECRET}" 0
          upsert_secret "${DROPBOX_REFRESH_TOKEN_SECRET_NAME}" "${DROPBOX_REFRESH_TOKEN}" 0
          upsert_secret "${UK_AQ_DB_SIZE_API_TOKEN_SECRET_NAME}" "${UK_AQ_DB_SIZE_API_TOKEN}" 0
          upsert_secret "${UK_AQ_R2_HISTORY_DAYS_API_TOKEN_SECRET_NAME}" "${UK_AQ_R2_HISTORY_DAYS_API_TOKEN}" 0
          upsert_secret "${UK_AQ_R2_HISTORY_COUNTS_API_TOKEN_SECRET_NAME}" "${UK_AQ_R2_HISTORY_COUNTS_API_TOKEN}" 0
          upsert_secret "${DASHBOARD_UPSTREAM_BEARER_TOKEN_SECRET_NAME}" "${DASHBOARD_UPSTREAM_BEARER_TOKEN}" 0
          upsert_secret "${UK_AQ_R2_CLOUDFLARE_API_TOKEN_SECRET_NAME}" "${UK_AQ_R2_CLOUDFLARE_API_TOKEN}" 0
          upsert_secret "${CFLARE_API_READ_TOKEN_SECRET_NAME}" "${CFLARE_API_READ_TOKEN}" 0

      - name: Build Cloud Run env and secret args
        id: cloudrun_args
        run: |
          set -euo pipefail

          require_env() {
            local key="$1"
            local value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "Missing required value for ${key}"
              exit 1
            fi
          }

          add_env() {
            local key="$1"
            local value="${!key:-}"
            if [ -n "${value}" ]; then
              env_updates+=("${key}=${value}")
            fi
          }

          add_secret_binding() {
            local env_key="$1"
            local secret_name="$2"
            local required="${3:-0}"
            if [ -z "${secret_name}" ]; then
              if [ "${required}" = "1" ]; then
                echo "Missing secret name for required binding ${env_key}"
                exit 1
              fi
              return 0
            fi
            if gcloud secrets describe "${secret_name}" --project "${PROJECT_ID}" >/dev/null 2>&1; then
              secret_updates+=("${env_key}=${secret_name}:latest")
              return 0
            fi
            if [ "${required}" = "1" ]; then
              echo "Required Secret Manager secret not found: ${secret_name}"
              exit 1
            fi
          }

          require_env SUPABASE_URL
          require_env OBS_AQIDB_SUPABASE_URL

          env_updates=()
          add_env SUPABASE_URL
          add_env OBS_AQIDB_SUPABASE_URL
          add_env UK_AQ_PUBLIC_SCHEMA
          add_env UK_AQ_DB_SIZE_LOOKBACK_DAYS
          add_env UK_AQ_DB_SIZE_API_URL
          add_env UK_AQ_R2_HISTORY_DAYS_API_URL
          add_env UK_AQ_R2_HISTORY_COUNTS_API_URL
          add_env UK_AQ_R2_HISTORY_DAYS_API_MAX_DAYS
          add_env UK_AQ_R2_HISTORY_WINDOW_RPC
          add_env UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX
          add_env UK_AQ_R2_HISTORY_AQILEVELS_PREFIX
          add_env CLEANAIRSURB_ST_ID
          add_env UK_AQ_DROPBOX_ROOT
          add_env UK_AQ_R2_HISTORY_DROPBOX_DIR
          add_env UK_AQ_R2_HISTORY_BACKUP_STATE_REL_PATH
          add_env UK_AQ_R2_HISTORY_DROPBOX_STATE_FILE
          add_env UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID
          add_env CLOUDFLARE_ACCOUNT_ID

          secret_updates=()
          add_secret_binding "SB_SECRET_KEY" "${SB_SECRET_KEY_SECRET_NAME}" 1
          add_secret_binding "OBS_AQIDB_SECRET_KEY" "${OBS_AQIDB_SECRET_KEY_SECRET_NAME}" 1
          # Bind optional secrets only when the corresponding value/feature is configured
          # in this deployment. This avoids mounting stale Secret Manager entries.
          if [ -n "${DROPBOX_APP_KEY:-}" ] && [ -n "${DROPBOX_APP_SECRET:-}" ] && [ -n "${DROPBOX_REFRESH_TOKEN:-}" ]; then
            add_secret_binding "DROPBOX_APP_KEY" "${DROPBOX_APP_KEY_SECRET_NAME}" 0
            add_secret_binding "DROPBOX_APP_SECRET" "${DROPBOX_APP_SECRET_SECRET_NAME}" 0
            add_secret_binding "DROPBOX_REFRESH_TOKEN" "${DROPBOX_REFRESH_TOKEN_SECRET_NAME}" 0
          fi
          if [ -n "${UK_AQ_DB_SIZE_API_URL:-}" ] && [ -n "${UK_AQ_DB_SIZE_API_TOKEN:-}" ]; then
            add_secret_binding "UK_AQ_DB_SIZE_API_TOKEN" "${UK_AQ_DB_SIZE_API_TOKEN_SECRET_NAME}" 0
          fi
          if [ -n "${UK_AQ_R2_HISTORY_DAYS_API_URL:-}" ] && [ -n "${UK_AQ_R2_HISTORY_DAYS_API_TOKEN:-}" ]; then
            add_secret_binding "UK_AQ_R2_HISTORY_DAYS_API_TOKEN" "${UK_AQ_R2_HISTORY_DAYS_API_TOKEN_SECRET_NAME}" 0
          fi
          if [ -n "${UK_AQ_R2_HISTORY_COUNTS_API_URL:-}" ] && [ -n "${UK_AQ_R2_HISTORY_COUNTS_API_TOKEN:-}" ]; then
            add_secret_binding "UK_AQ_R2_HISTORY_COUNTS_API_TOKEN" "${UK_AQ_R2_HISTORY_COUNTS_API_TOKEN_SECRET_NAME}" 0
          fi
          if [ -n "${DASHBOARD_UPSTREAM_BEARER_TOKEN:-}" ]; then
            add_secret_binding "DASHBOARD_UPSTREAM_BEARER_TOKEN" "${DASHBOARD_UPSTREAM_BEARER_TOKEN_SECRET_NAME}" 0
          fi
          if [ -n "${UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID:-}${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            if [ -n "${UK_AQ_R2_CLOUDFLARE_API_TOKEN:-}" ]; then
              add_secret_binding "UK_AQ_R2_CLOUDFLARE_API_TOKEN" "${UK_AQ_R2_CLOUDFLARE_API_TOKEN_SECRET_NAME}" 0
            fi
            if [ -n "${CFLARE_API_READ_TOKEN:-}" ]; then
              add_secret_binding "CFLARE_API_READ_TOKEN" "${CFLARE_API_READ_TOKEN_SECRET_NAME}" 0
            fi
          fi

          env_file="${RUNNER_TEMP}/uk-aq-dashboard-backend-env.yaml"
          : > "${env_file}"
          for kv in "${env_updates[@]}"; do
            key="${kv%%=*}"
            value="${kv#*=}"
            python3 -c 'import json,sys; f=open(sys.argv[1], "a", encoding="utf-8"); print(f"{sys.argv[2]}: {json.dumps(sys.argv[3])}", file=f); f.close()' \
              "${env_file}" "${key}" "${value}"
          done

          secret_csv="$(IFS=,; echo "${secret_updates[*]}")"
          echo "env_file=${env_file}" >> "${GITHUB_OUTPUT}"
          echo "secret_csv=${secret_csv}" >> "${GITHUB_OUTPUT}"

      - name: Deploy Cloud Run service
        run: |
          set -euo pipefail
          ENV_FILE='${{ steps.cloudrun_args.outputs.env_file }}'
          SECRET_CSV='${{ steps.cloudrun_args.outputs.secret_csv }}'

          CMD=(
            gcloud run deploy "${SERVICE_NAME}"
            --region "${REGION}"
            --image "${{ steps.build.outputs.image }}"
            --service-account "${DASHBOARD_BACKEND_SERVICE_ACCOUNT}"
            --timeout "${SERVICE_TIMEOUT_SECONDS}"
            --cpu "${SERVICE_CPU}"
            --memory "${SERVICE_MEMORY}"
            --concurrency "${SERVICE_CONCURRENCY}"
            --max-instances "${SERVICE_MAX_INSTANCES}"
            --min-instances "${SERVICE_MIN_INSTANCES}"
            --no-cpu-boost
            --labels "job_name=${RESOURCE_LABEL}"
            --allow-unauthenticated
          )
          if [ -n "${ENV_FILE}" ]; then
            CMD+=(--env-vars-file "${ENV_FILE}")
          fi
          if [ -n "${SECRET_CSV}" ]; then
            CMD+=(--set-secrets "${SECRET_CSV}")
          fi
          "${CMD[@]}"

      - name: Print dashboard backend URL
        run: |
          set -euo pipefail
          service_url="$(gcloud run services describe "${SERVICE_NAME}" --region "${REGION}" --format='value(status.url)')"
          if [ -n "${service_url}" ]; then
            echo "Dashboard backend URL: ${service_url}"
            echo "::notice::Set GitHub variable DASHBOARD_UPSTREAM_BASE_URL=${service_url}"
          fi
