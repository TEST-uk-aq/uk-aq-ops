name: Deploy uk_aq_db_r2_metrics_api Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/uk_aq_db_size_metrics_api_worker/**"
      - "workers/shared/r2_sigv4.mjs"
      - "workers/shared/uk_aq_r2_history_index.mjs"
      - ".github/workflows/uk_aq_db_r2_metrics_api_worker_deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    env:
      UK_AQ_DB_R2_METRICS_API_WORKER_NAME: ${{ vars.UK_AQ_DB_R2_METRICS_API_WORKER_NAME || 'uk-aq-db-r2-metrics-api' }}
      UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID: ${{ vars.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID || '' }}
      UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN: ${{ secrets.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare credentials
        run: |
          set -euo pipefail
          if [ -z "${UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing secret UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          if [ -z "${UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing variable UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

      - name: Deploy Worker (base)
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_db_size_metrics_api_worker
          command: deploy --name ${{ env.UK_AQ_DB_R2_METRICS_API_WORKER_NAME }}

      - name: Set Worker secrets
        working-directory: workers/uk_aq_db_size_metrics_api_worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          secrets_json="$(jq -n \
            --arg SUPABASE_URL "${{ vars.SUPABASE_URL }}" \
            --arg SB_SECRET_KEY "${{ secrets.SB_SECRET_KEY }}" \
            --arg OBS_AQIDB_SUPABASE_URL "${{ vars.OBS_AQIDB_SUPABASE_URL }}" \
            --arg OBS_AQIDB_SECRET_KEY "${{ secrets.OBS_AQIDB_SECRET_KEY }}" \
            --arg CFLARE_R2_ENDPOINT "${{ vars.CFLARE_R2_ENDPOINT }}" \
            --arg CFLARE_R2_BUCKET "${{ vars.CFLARE_R2_BUCKET }}" \
            --arg CFLARE_R2_REGION "${{ vars.CFLARE_R2_REGION }}" \
            --arg CFLARE_R2_ACCESS_KEY_ID "${{ secrets.CFLARE_R2_ACCESS_KEY_ID }}" \
            --arg CFLARE_R2_SECRET_ACCESS_KEY "${{ secrets.CFLARE_R2_SECRET_ACCESS_KEY }}" \
            --arg UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX "${{ vars.UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX || 'history/v1/observations' }}" \
            --arg UK_AQ_R2_HISTORY_AQILEVELS_PREFIX "${{ vars.UK_AQ_R2_HISTORY_AQILEVELS_PREFIX || 'history/v1/aqilevels' }}" \
            --arg UK_AQ_DB_SIZE_API_TOKEN "${{ secrets.UK_AQ_DB_SIZE_API_TOKEN }}" \
            '{SUPABASE_URL: $SUPABASE_URL, SB_SECRET_KEY: $SB_SECRET_KEY, OBS_AQIDB_SUPABASE_URL: $OBS_AQIDB_SUPABASE_URL, OBS_AQIDB_SECRET_KEY: $OBS_AQIDB_SECRET_KEY, CFLARE_R2_ENDPOINT: $CFLARE_R2_ENDPOINT, CFLARE_R2_BUCKET: $CFLARE_R2_BUCKET, CFLARE_R2_REGION: $CFLARE_R2_REGION, CFLARE_R2_ACCESS_KEY_ID: $CFLARE_R2_ACCESS_KEY_ID, CFLARE_R2_SECRET_ACCESS_KEY: $CFLARE_R2_SECRET_ACCESS_KEY, UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX: $UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX, UK_AQ_R2_HISTORY_AQILEVELS_PREFIX: $UK_AQ_R2_HISTORY_AQILEVELS_PREFIX, UK_AQ_DB_SIZE_API_TOKEN: $UK_AQ_DB_SIZE_API_TOKEN} | with_entries(select(.value != ""))')"
          for attempt in 1 2 3; do
            if printf "%s" "$secrets_json" | npx --yes wrangler@4 secret bulk --name "${UK_AQ_DB_R2_METRICS_API_WORKER_NAME}"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to apply Worker secrets after 3 attempts."
              latest_log="$(ls -1t "${HOME}/.config/.wrangler/logs"/wrangler-*.log 2>/dev/null | head -n 1 || true)"
              if [ -n "${latest_log}" ] && [ -f "${latest_log}" ]; then
                echo "Last Wrangler log: ${latest_log}"
                sed -n '1,200p' "${latest_log}" || true
              fi
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_db_size_metrics_api_worker
          command: deploy --name ${{ env.UK_AQ_DB_R2_METRICS_API_WORKER_NAME }}
