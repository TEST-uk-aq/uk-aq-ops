name: Deploy UK AQ Prune Daily Cloud Run Service

on:
  push:
    branches:
      - main
    paths:
      - "workers/uk_aq_prune_daily/server.mjs"
      - "workers/uk_aq_prune_daily/fingerprint_recheck.mjs"
      - "workers/uk_aq_prune_daily/phase_b_history_r2.mjs"
      - "workers/shared/r2_sigv4.mjs"
      - "workers/shared/uk_aq_r2_history_index.mjs"
      - "workers/shared/daily_task_health.mjs"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/uk_aq_prune_daily_cloud_run_deploy.yml"
  workflow_dispatch:

concurrency:
  group: uk-aq-prune-daily-deploy
  cancel-in-progress: false

jobs:
  deploy-uk-aq-prune-daily-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
      REPO: ${{ vars.GCP_ARTIFACT_REPO || 'uk-aq' }}
      SERVICE_NAME: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SERVICE_NAME || vars.GCP_INGESTDB_PRUNE_SERVICE_NAME || vars.INGESTDB_PRUNE_SERVICE_NAME || 'uk-aq-prune-daily' }}
      RESOURCE_LABEL: uk-aq-prune-daily
      UK_AQ_PRUNE_DAILY_RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SERVICE_ACCOUNT || vars.GCP_INGESTDB_PRUNE_SERVICE_ACCOUNT || vars.GCP_OPS_JOB_SERVICE_ACCOUNT || vars.UK_AQ_PRUNE_DAILY_RUNTIME_SERVICE_ACCOUNT || vars.INGESTDB_PRUNE_RUNTIME_SERVICE_ACCOUNT || '' }}
      UK_AQ_EDGE_UPSTREAM_SECRET: ${{ secrets.UK_AQ_EDGE_UPSTREAM_SECRET || '' }}
      SERVICE_TIMEOUT_SECONDS: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SERVICE_TIMEOUT_SECONDS || vars.GCP_INGESTDB_PRUNE_SERVICE_TIMEOUT_SECONDS || vars.UK_AQ_PRUNE_DAILY_SERVICE_TIMEOUT_SECONDS || vars.INGESTDB_PRUNE_SERVICE_TIMEOUT_SECONDS || '900' }}
      SERVICE_CPU: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SERVICE_CPU || vars.GCP_INGESTDB_PRUNE_SERVICE_CPU || vars.UK_AQ_PRUNE_DAILY_SERVICE_CPU || vars.INGESTDB_PRUNE_SERVICE_CPU || '1' }}
      SERVICE_MEMORY: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SERVICE_MEMORY || vars.GCP_INGESTDB_PRUNE_SERVICE_MEMORY || vars.UK_AQ_PRUNE_DAILY_SERVICE_MEMORY || vars.INGESTDB_PRUNE_SERVICE_MEMORY || '256Mi' }}
      SERVICE_CONCURRENCY: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SERVICE_CONCURRENCY || vars.GCP_INGESTDB_PRUNE_SERVICE_CONCURRENCY || vars.UK_AQ_PRUNE_DAILY_SERVICE_CONCURRENCY || vars.INGESTDB_PRUNE_SERVICE_CONCURRENCY || '1' }}
      SERVICE_MAX_INSTANCES: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SERVICE_MAX_INSTANCES || vars.GCP_INGESTDB_PRUNE_SERVICE_MAX_INSTANCES || vars.UK_AQ_PRUNE_DAILY_SERVICE_MAX_INSTANCES || vars.INGESTDB_PRUNE_SERVICE_MAX_INSTANCES || '1' }}
      SERVICE_MIN_INSTANCES: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SERVICE_MIN_INSTANCES || vars.GCP_INGESTDB_PRUNE_SERVICE_MIN_INSTANCES || vars.UK_AQ_PRUNE_DAILY_SERVICE_MIN_INSTANCES || vars.INGESTDB_PRUNE_SERVICE_MIN_INSTANCES || '0' }}
      SCHEDULER_ENABLED: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SCHEDULER_ENABLED || vars.GCP_INGESTDB_PRUNE_SCHEDULER_ENABLED || vars.UK_AQ_PRUNE_DAILY_SCHEDULER_ENABLED || vars.INGESTDB_PRUNE_SCHEDULER_ENABLED || 'true' }}
      SCHEDULER_JOB_NAME: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SCHEDULER_JOB_NAME || vars.GCP_INGESTDB_PRUNE_SCHEDULER_JOB_NAME || vars.UK_AQ_PRUNE_DAILY_SCHEDULER_JOB_NAME || vars.INGESTDB_PRUNE_SCHEDULER_JOB_NAME || 'uk-aq-prune-daily' }}
      SCHEDULER_CRON: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SCHEDULER_CRON || vars.GCP_INGESTDB_PRUNE_SCHEDULER_CRON || vars.UK_AQ_PRUNE_DAILY_SCHEDULER_CRON || vars.INGESTDB_PRUNE_SCHEDULER_CRON || '0 2 * * *' }}
      SCHEDULER_TIMEZONE: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SCHEDULER_TIMEZONE || vars.GCP_INGESTDB_PRUNE_SCHEDULER_TIMEZONE || vars.UK_AQ_PRUNE_DAILY_SCHEDULER_TIMEZONE || vars.INGESTDB_PRUNE_SCHEDULER_TIMEZONE || 'Etc/UTC' }}
      SCHEDULER_MAX_RETRY_ATTEMPTS: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SCHEDULER_MAX_RETRY_ATTEMPTS || vars.GCP_INGESTDB_PRUNE_SCHEDULER_MAX_RETRY_ATTEMPTS || vars.UK_AQ_PRUNE_DAILY_SCHEDULER_MAX_RETRY_ATTEMPTS || vars.INGESTDB_PRUNE_SCHEDULER_MAX_RETRY_ATTEMPTS || '0' }}
      SCHEDULER_ATTEMPT_DEADLINE: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SCHEDULER_ATTEMPT_DEADLINE || vars.GCP_INGESTDB_PRUNE_SCHEDULER_ATTEMPT_DEADLINE || vars.UK_AQ_PRUNE_DAILY_SCHEDULER_ATTEMPT_DEADLINE || vars.INGESTDB_PRUNE_SCHEDULER_ATTEMPT_DEADLINE || '15m' }}
      UK_AQ_PRUNE_DAILY_SCHEDULER_SERVICE_ACCOUNT: ${{ vars.GCP_UK_AQ_PRUNE_DAILY_SCHEDULER_SERVICE_ACCOUNT || vars.GCP_INGESTDB_PRUNE_SCHEDULER_SERVICE_ACCOUNT || vars.UK_AQ_PRUNE_DAILY_SCHEDULER_SERVICE_ACCOUNT || vars.INGESTDB_PRUNE_SCHEDULER_SERVICE_ACCOUNT || '' }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      OBS_AQIDB_SUPABASE_URL: ${{ vars.OBS_AQIDB_SUPABASE_URL }}
      INGESTDB_PRUNE_DRY_RUN: ${{ vars.INGESTDB_PRUNE_DRY_RUN || 'true' }}
      INGESTDB_RETENTION_DAYS: ${{ vars.INGESTDB_RETENTION_DAYS || '5' }}
      MAX_HOURS_PER_RUN: ${{ vars.INGESTDB_PRUNE_MAX_HOURS_PER_RUN || '48' }}
      DELETE_BATCH_SIZE: ${{ vars.INGESTDB_PRUNE_DELETE_BATCH_SIZE || '50000' }}
      MAX_DELETE_BATCHES_PER_HOUR: ${{ vars.INGESTDB_PRUNE_MAX_DELETE_BATCHES_PER_HOUR || '10' }}
      REPAIR_ONE_MISMATCH_BUCKET: ${{ vars.INGESTDB_PRUNE_REPAIR_ONE_MISMATCH_BUCKET || 'true' }}
      REPAIR_BUCKET_OUTBOX_CHUNK_SIZE: ${{ vars.INGESTDB_PRUNE_REPAIR_BUCKET_OUTBOX_CHUNK_SIZE || '1000' }}
      FLUSH_CLAIM_BATCH_LIMIT: ${{ vars.INGESTDB_PRUNE_FLUSH_CLAIM_BATCH_LIMIT || '20' }}
      MAX_FLUSH_BATCHES: ${{ vars.INGESTDB_PRUNE_MAX_FLUSH_BATCHES || '30' }}
      UK_AQ_R2_HISTORY_PHASE_B_ENABLED: ${{ vars.UK_AQ_R2_HISTORY_PHASE_B_ENABLED || 'true' }}
      UK_AQ_R2_HISTORY_PART_MAX_ROWS: ${{ vars.UK_AQ_R2_HISTORY_PART_MAX_ROWS || '1000000' }}
      UK_AQ_R2_HISTORY_OBSERVATIONS_PART_MAX_ROWS: ${{ vars.UK_AQ_R2_HISTORY_OBSERVATIONS_PART_MAX_ROWS || '5000' }}
      UK_AQ_R2_HISTORY_CURSOR_FETCH_ROWS: ${{ vars.UK_AQ_R2_HISTORY_CURSOR_FETCH_ROWS || '20000' }}
      UK_AQ_R2_HISTORY_ROW_GROUP_SIZE: ${{ vars.UK_AQ_R2_HISTORY_ROW_GROUP_SIZE || '100000' }}
      UK_AQ_R2_HISTORY_MAX_CANDIDATES_PER_RUN: ${{ vars.UK_AQ_R2_HISTORY_MAX_CANDIDATES_PER_RUN || '500' }}
      UK_AQ_R2_HISTORY_STAGING_RETENTION_DAYS: ${{ vars.UK_AQ_R2_HISTORY_STAGING_RETENTION_DAYS || '7' }}
      UK_AQ_R2_HISTORY_STAGING_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_STAGING_PREFIX || 'history/v1/_ops/observations/staging' }}
      UK_AQ_R2_HISTORY_VERSION: ${{ vars.UK_AQ_R2_HISTORY_VERSION || '' }}
      UK_AQ_R2_HISTORY_OBSERVATIONS_POLLUTANT_CODES: ${{ vars.UK_AQ_R2_HISTORY_OBSERVATIONS_POLLUTANT_CODES || 'pm25,pm10,no2,pm25index,pm10index,no2index' }}
      UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX || 'history/v1/observations' }}
      UK_AQ_R2_HISTORY_V2_OBSERVATIONS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_OBSERVATIONS_PREFIX || 'history/v2/observations' }}
      UK_AQ_R2_HISTORY_RUNS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_RUNS_PREFIX || 'history/v1/_ops/observations/runs' }}
      UK_AQ_R2_HISTORY_AQILEVELS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_AQILEVELS_PREFIX || 'history/v1/aqilevels/hourly' }}
      UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_PREFIX || 'history/v2/aqilevels/hourly/data' }}
      UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DEBUG_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DEBUG_PREFIX || 'history/v2/aqilevels/hourly/debug' }}
      UK_AQ_R2_HISTORY_V2_RUNS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_RUNS_PREFIX || 'history/v2/_ops/observations/runs' }}
      UK_AQ_R2_HISTORY_INDEX_V2_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_INDEX_V2_PREFIX || 'history/_index_v2' }}
      UK_AQ_R2_HISTORY_V2_OBSERVATIONS_TIMESERIES_INDEX_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_OBSERVATIONS_TIMESERIES_INDEX_PREFIX || 'history/_index_v2/observations_timeseries' }}
      UK_AQ_R2_HISTORY_ADOPT_EXISTING_MANIFEST_ENABLED: ${{ vars.UK_AQ_R2_HISTORY_ADOPT_EXISTING_MANIFEST_ENABLED || 'true' }}
      UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_ENABLED: ${{ vars.UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_ENABLED || 'false' }}
      UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_REQUIRED: ${{ vars.UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_REQUIRED || 'false' }}
      UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_DIR: ${{ vars.UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_DIR || 'prune_r2_check' }}
      UK_AQ_CHART_METRICS_RETENTION_DAYS: ${{ vars.UK_AQ_CHART_METRICS_RETENTION_DAYS || '90' }}
      UK_AQ_CHART_METRICS_DAILY_REFRESH_DAYS: ${{ vars.UK_AQ_CHART_METRICS_DAILY_REFRESH_DAYS || '7' }}
      CFLARE_R2_BUCKET: ${{ vars.CFLARE_R2_BUCKET || '' }}
      CFLARE_R2_ENDPOINT: ${{ vars.CFLARE_R2_ENDPOINT || '' }}
      CFLARE_R2_REGION: ${{ vars.CFLARE_R2_REGION || 'auto' }}
      SB_SECRET_KEY_SECRET_NAME: ${{ vars.SB_SECRET_KEY_SECRET_NAME || 'SB_SECRET_KEY' }}
      OBS_AQIDB_SECRET_KEY_SECRET_NAME: ${{ vars.OBS_AQIDB_SECRET_KEY_SECRET_NAME || 'OBS_AQIDB_SECRET_KEY' }}
      SUPABASE_DB_URL_SECRET_NAME: ${{ vars.SUPABASE_DB_URL_SECRET_NAME || 'SUPABASE_DB_URL' }}
      CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME: ${{ vars.CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME || 'CFLARE_R2_ACCESS_KEY_ID' }}
      CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME: ${{ vars.CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME || 'CFLARE_R2_SECRET_ACCESS_KEY' }}
      SB_SECRET_KEY: ${{ secrets.SB_SECRET_KEY }}
      OBS_AQIDB_SECRET_KEY: ${{ secrets.OBS_AQIDB_SECRET_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      CFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CFLARE_R2_ACCESS_KEY_ID }}
      CFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CFLARE_R2_SECRET_ACCESS_KEY }}
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
      DROPBOX_APP_KEY_SECRET_NAME: ${{ vars.DROPBOX_APP_KEY_SECRET_NAME || '' }}
      DROPBOX_APP_SECRET_SECRET_NAME: ${{ vars.DROPBOX_APP_SECRET_SECRET_NAME || '' }}
      DROPBOX_REFRESH_TOKEN_SECRET_NAME: ${{ vars.DROPBOX_REFRESH_TOKEN_SECRET_NAME || '' }}
      UK_AQ_DROPBOX_ROOT: ${{ vars.UK_AQ_DROPBOX_ROOT || '' }}
      UK_AIR_ERROR_DROPBOX_FOLDER: ${{ vars.UK_AIR_ERROR_DROPBOX_FOLDER || '/error_log' }}
      UK_AIR_ERROR_DROPBOX_ALLOWED_SUPABASE_URL: ${{ vars.UK_AIR_ERROR_DROPBOX_ALLOWED_SUPABASE_URL || '' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required project config
        run: |
          set -euo pipefail
          if [ -z "${PROJECT_ID:-}" ]; then
            echo "Missing required repo variable: GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "${UK_AQ_EDGE_UPSTREAM_SECRET}" ]; then
            echo "Missing secret UK_AQ_EDGE_UPSTREAM_SECRET."
            exit 1
          fi
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Missing required repo variable: SUPABASE_URL"
            exit 1
          fi
          if [ -z "${OBS_AQIDB_SUPABASE_URL:-}" ]; then
            echo "Missing required repo variable: OBS_AQIDB_SUPABASE_URL"
            exit 1
          fi
          case "${UK_AQ_R2_HISTORY_VERSION}" in
            v1|v2) ;;
            "")
              echo "Missing GitHub variable UK_AQ_R2_HISTORY_VERSION."
              exit 1
              ;;
            *)
              echo "Invalid UK_AQ_R2_HISTORY_VERSION=${UK_AQ_R2_HISTORY_VERSION}; expected v1 or v2."
              exit 1
              ;;
          esac
          if [ "${UK_AQ_R2_HISTORY_PHASE_B_ENABLED:-true}" = "true" ]; then
            if [ -z "${CFLARE_R2_ENDPOINT:-}" ]; then
              echo "Missing required repo variable: CFLARE_R2_ENDPOINT (Phase B backup enabled)."
              exit 1
            fi
            if [ -z "${CFLARE_R2_BUCKET:-}" ]; then
              echo "Missing required repo variable: CFLARE_R2_BUCKET (Phase B backup enabled)."
              exit 1
            fi
          fi

      - name: Resolve runtime and scheduler service accounts
        id: service_accounts
        run: |
          set -euo pipefail

          validate_service_account() {
            local label="$1"
            local value="$2"
            if [[ "${value}" == *$'\n'* ]] || [[ "${value}" == *$'\r'* ]]; then
              echo "Invalid ${label}: contains newline characters."
              exit 1
            fi
            if [[ "${value}" == \#* ]]; then
              echo "Invalid ${label}: starts with '#', check repo variable value."
              exit 1
            fi
            if ! [[ "${value}" =~ ^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.gserviceaccount\.com$ ]]; then
              echo "Invalid ${label}: expected a gserviceaccount.com email, got '${value}'."
              exit 1
            fi
          }

          runtime_sa="${UK_AQ_PRUNE_DAILY_RUNTIME_SERVICE_ACCOUNT:-}"
          if [ -z "${runtime_sa}" ]; then
            runtime_sa="uk-aq-ops-job@${PROJECT_ID}.iam.gserviceaccount.com"
          fi
          validate_service_account "runtime service account" "${runtime_sa}"
          if [[ "${runtime_sa}" == *"-compute@developer.gserviceaccount.com" ]]; then
            echo "Invalid runtime service account: default compute service account is not allowed."
            exit 1
          fi

          scheduler_sa="${UK_AQ_PRUNE_DAILY_SCHEDULER_SERVICE_ACCOUNT:-${runtime_sa}}"
          validate_service_account "scheduler service account" "${scheduler_sa}"
          if [[ "${scheduler_sa}" == *"-compute@developer.gserviceaccount.com" ]]; then
            echo "Invalid scheduler service account: default compute service account is not allowed."
            exit 1
          fi

          printf 'runtime_sa=%s\n' "${runtime_sa}" >> "${GITHUB_OUTPUT}"
          printf 'scheduler_sa=%s\n' "${scheduler_sa}" >> "${GITHUB_OUTPUT}"

      - name: Validate Google auth config
        run: |
          set -euo pipefail
          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && [ -n "${GCP_SERVICE_ACCOUNT:-}" ]; then
            echo "Using Workload Identity Federation auth via existing deploy SA."
          elif [ -n "${GCP_SA_KEY:-}" ]; then
            echo "Using Service Account key auth fallback."
          else
            echo "Missing Google auth config."
            echo "Set either:"
            echo "1) GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT"
            echo "or"
            echo "2) GCP_SA_KEY"
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key fallback)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || env.GCP_SERVICE_ACCOUNT == '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f

      - name: Configure gcloud project
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gcloud config set run/region "${REGION}"

      - name: Verify Artifact Registry repository exists
        run: |
          set -euo pipefail
          gcloud artifacts repositories describe "${REPO}" \
            --location "${REGION}" \
            --project "${PROJECT_ID}" >/dev/null

      - name: Sync GitHub secrets to GCP Secret Manager
        run: |
          set -euo pipefail
          UPSERT_SCRIPT="scripts/gcp/uk_aq_secret_upsert_if_changed.sh"

          upsert_secret() {
            local secret_name="$1"
            local secret_value="$2"
            local required="${3:-0}"

            if [ -z "${secret_name}" ]; then
              if [ "${required}" = "1" ]; then
                echo "Missing required secret name."
                exit 1
              fi
              return 0
            fi

            if [ -z "${secret_value}" ] && [ "${required}" = "0" ]; then
              echo "Skipping optional secret ${secret_name} (no GitHub secret/variable value)."
              return 0
            fi

            printf '%s' "${secret_value}" | "${UPSERT_SCRIPT}" \
              --project "${PROJECT_ID}" \
              --region "${REGION}" \
              --secret "${secret_name}" \
              --required "${required}" \
              --apply
          }

          upsert_secret "${SB_SECRET_KEY_SECRET_NAME}" "${SB_SECRET_KEY}" 1
          upsert_secret "${OBS_AQIDB_SECRET_KEY_SECRET_NAME}" "${OBS_AQIDB_SECRET_KEY}" 1
          upsert_secret "${SUPABASE_DB_URL_SECRET_NAME}" "${SUPABASE_DB_URL}" 1
          upsert_secret "${CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME}" "${CFLARE_R2_ACCESS_KEY_ID}" 1
          upsert_secret "${CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME}" "${CFLARE_R2_SECRET_ACCESS_KEY}" 1

          if [ -n "${DROPBOX_APP_KEY_SECRET_NAME:-}" ]; then
            upsert_secret "${DROPBOX_APP_KEY_SECRET_NAME}" "${DROPBOX_APP_KEY}" 1
          fi
          if [ -n "${DROPBOX_APP_SECRET_SECRET_NAME:-}" ]; then
            upsert_secret "${DROPBOX_APP_SECRET_SECRET_NAME}" "${DROPBOX_APP_SECRET}" 1
          fi
          if [ -n "${DROPBOX_REFRESH_TOKEN_SECRET_NAME:-}" ]; then
            upsert_secret "${DROPBOX_REFRESH_TOKEN_SECRET_NAME}" "${DROPBOX_REFRESH_TOKEN}" 1
          fi

      - name: Verify Secret Manager secrets exist
        run: |
          set -euo pipefail
          gcloud secrets describe "${SB_SECRET_KEY_SECRET_NAME}" --project "${PROJECT_ID}" >/dev/null
          gcloud secrets describe "${OBS_AQIDB_SECRET_KEY_SECRET_NAME}" --project "${PROJECT_ID}" >/dev/null
          gcloud secrets describe "${SUPABASE_DB_URL_SECRET_NAME}" --project "${PROJECT_ID}" >/dev/null
          gcloud secrets describe "${CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME}" --project "${PROJECT_ID}" >/dev/null
          gcloud secrets describe "${CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME}" --project "${PROJECT_ID}" >/dev/null
          for optional_secret in \
            "${DROPBOX_APP_KEY_SECRET_NAME:-}" \
            "${DROPBOX_APP_SECRET_SECRET_NAME:-}" \
            "${DROPBOX_REFRESH_TOKEN_SECRET_NAME:-}"; do
            if [ -n "${optional_secret}" ]; then
              gcloud secrets describe "${optional_secret}" --project "${PROJECT_ID}" >/dev/null
            fi
          done

      - name: Configure Docker auth for Artifact Registry
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: build
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/uk-aq-prune-daily:${GITHUB_SHA::12}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Build Cloud Run env and secret args
        id: cloudrun_args
        run: |
          set -euo pipefail

          env_updates=()
          env_updates+=("SUPABASE_URL=${SUPABASE_URL}")
          env_updates+=("OBS_AQIDB_SUPABASE_URL=${OBS_AQIDB_SUPABASE_URL}")
          env_updates+=("INGESTDB_PRUNE_DRY_RUN=${INGESTDB_PRUNE_DRY_RUN}")
          env_updates+=("INGESTDB_RETENTION_DAYS=${INGESTDB_RETENTION_DAYS}")
          env_updates+=("MAX_HOURS_PER_RUN=${MAX_HOURS_PER_RUN}")
          env_updates+=("DELETE_BATCH_SIZE=${DELETE_BATCH_SIZE}")
          env_updates+=("MAX_DELETE_BATCHES_PER_HOUR=${MAX_DELETE_BATCHES_PER_HOUR}")
          env_updates+=("REPAIR_ONE_MISMATCH_BUCKET=${REPAIR_ONE_MISMATCH_BUCKET}")
          env_updates+=("REPAIR_BUCKET_OUTBOX_CHUNK_SIZE=${REPAIR_BUCKET_OUTBOX_CHUNK_SIZE}")
          env_updates+=("FLUSH_CLAIM_BATCH_LIMIT=${FLUSH_CLAIM_BATCH_LIMIT}")
          env_updates+=("MAX_FLUSH_BATCHES=${MAX_FLUSH_BATCHES}")
          env_updates+=("UK_AQ_R2_HISTORY_PHASE_B_ENABLED=${UK_AQ_R2_HISTORY_PHASE_B_ENABLED}")
          env_updates+=("UK_AQ_R2_HISTORY_PART_MAX_ROWS=${UK_AQ_R2_HISTORY_PART_MAX_ROWS}")
          env_updates+=("UK_AQ_R2_HISTORY_OBSERVATIONS_PART_MAX_ROWS=${UK_AQ_R2_HISTORY_OBSERVATIONS_PART_MAX_ROWS}")
          env_updates+=("UK_AQ_R2_HISTORY_CURSOR_FETCH_ROWS=${UK_AQ_R2_HISTORY_CURSOR_FETCH_ROWS}")
          env_updates+=("UK_AQ_R2_HISTORY_ROW_GROUP_SIZE=${UK_AQ_R2_HISTORY_ROW_GROUP_SIZE}")
          env_updates+=("UK_AQ_R2_HISTORY_MAX_CANDIDATES_PER_RUN=${UK_AQ_R2_HISTORY_MAX_CANDIDATES_PER_RUN}")
          env_updates+=("UK_AQ_R2_HISTORY_STAGING_RETENTION_DAYS=${UK_AQ_R2_HISTORY_STAGING_RETENTION_DAYS}")
          env_updates+=("UK_AQ_R2_HISTORY_STAGING_PREFIX=${UK_AQ_R2_HISTORY_STAGING_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_VERSION=${UK_AQ_R2_HISTORY_VERSION}")
          env_updates+=("UK_AQ_R2_HISTORY_OBSERVATIONS_POLLUTANT_CODES=${UK_AQ_R2_HISTORY_OBSERVATIONS_POLLUTANT_CODES}")
          env_updates+=("UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX=${UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_V2_OBSERVATIONS_PREFIX=${UK_AQ_R2_HISTORY_V2_OBSERVATIONS_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_RUNS_PREFIX=${UK_AQ_R2_HISTORY_RUNS_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_AQILEVELS_PREFIX=${UK_AQ_R2_HISTORY_AQILEVELS_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_PREFIX=${UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DEBUG_PREFIX=${UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DEBUG_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_V2_RUNS_PREFIX=${UK_AQ_R2_HISTORY_V2_RUNS_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_INDEX_V2_PREFIX=${UK_AQ_R2_HISTORY_INDEX_V2_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_V2_OBSERVATIONS_TIMESERIES_INDEX_PREFIX=${UK_AQ_R2_HISTORY_V2_OBSERVATIONS_TIMESERIES_INDEX_PREFIX}")
          env_updates+=("UK_AQ_R2_HISTORY_ADOPT_EXISTING_MANIFEST_ENABLED=${UK_AQ_R2_HISTORY_ADOPT_EXISTING_MANIFEST_ENABLED}")
          env_updates+=("UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_ENABLED=${UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_ENABLED}")
          env_updates+=("UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_REQUIRED=${UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_REQUIRED}")
          env_updates+=("UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_DIR=${UK_AQ_R2_HISTORY_PRUNE_CHECK_DROPBOX_DIR}")
          env_updates+=("UK_AQ_CHART_METRICS_RETENTION_DAYS=${UK_AQ_CHART_METRICS_RETENTION_DAYS}")
          env_updates+=("UK_AQ_CHART_METRICS_DAILY_REFRESH_DAYS=${UK_AQ_CHART_METRICS_DAILY_REFRESH_DAYS}")
          env_updates+=("CFLARE_R2_ENDPOINT=${CFLARE_R2_ENDPOINT}")
          env_updates+=("CFLARE_R2_REGION=${CFLARE_R2_REGION}")
          env_updates+=("CFLARE_R2_BUCKET=${CFLARE_R2_BUCKET}")
          if [ -n "${UK_AQ_DROPBOX_ROOT:-}" ]; then
            env_updates+=("UK_AQ_DROPBOX_ROOT=${UK_AQ_DROPBOX_ROOT}")
          fi
          if [ -n "${UK_AIR_ERROR_DROPBOX_FOLDER:-}" ]; then
            env_updates+=("UK_AIR_ERROR_DROPBOX_FOLDER=${UK_AIR_ERROR_DROPBOX_FOLDER}")
          fi
          if [ -n "${UK_AIR_ERROR_DROPBOX_ALLOWED_SUPABASE_URL:-}" ]; then
            env_updates+=("UK_AIR_ERROR_DROPBOX_ALLOWED_SUPABASE_URL=${UK_AIR_ERROR_DROPBOX_ALLOWED_SUPABASE_URL}")
          fi
          env_updates+=("UK_AQ_EDGE_UPSTREAM_SECRET=${UK_AQ_EDGE_UPSTREAM_SECRET}")

          env_file="${RUNNER_TEMP}/uk-aq-prune-daily-env.yaml"
          : > "${env_file}"
          for kv in "${env_updates[@]}"; do
            key="${kv%%=*}"
            value="${kv#*=}"
            python3 -c 'import json,sys; f=open(sys.argv[1], "a", encoding="utf-8"); print(f"{sys.argv[2]}: {json.dumps(sys.argv[3])}", file=f); f.close()' \
              "${env_file}" "${key}" "${value}"
          done

          secret_updates=()
          secret_updates+=("SB_SECRET_KEY=${SB_SECRET_KEY_SECRET_NAME}:latest")
          secret_updates+=("OBS_AQIDB_SECRET_KEY=${OBS_AQIDB_SECRET_KEY_SECRET_NAME}:latest")
          secret_updates+=("SUPABASE_DB_URL=${SUPABASE_DB_URL_SECRET_NAME}:latest")
          secret_updates+=("CFLARE_R2_ACCESS_KEY_ID=${CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME}:latest")
          secret_updates+=("CFLARE_R2_SECRET_ACCESS_KEY=${CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME}:latest")
          secret_updates+=("UK_AQ_EDGE_UPSTREAM_SECRET=UK_AQ_EDGE_UPSTREAM_SECRET:latest")
          if [ -n "${DROPBOX_APP_KEY_SECRET_NAME:-}" ]; then
            secret_updates+=("DROPBOX_APP_KEY=${DROPBOX_APP_KEY_SECRET_NAME}:latest")
          fi
          if [ -n "${DROPBOX_APP_SECRET_SECRET_NAME:-}" ]; then
            secret_updates+=("DROPBOX_APP_SECRET=${DROPBOX_APP_SECRET_SECRET_NAME}:latest")
          fi
          if [ -n "${DROPBOX_REFRESH_TOKEN_SECRET_NAME:-}" ]; then
            secret_updates+=("DROPBOX_REFRESH_TOKEN=${DROPBOX_REFRESH_TOKEN_SECRET_NAME}:latest")
          fi
          secret_csv="$(IFS=,; echo "${secret_updates[*]}")"

          echo "env_file=${env_file}" >> "${GITHUB_OUTPUT}"
          echo "secret_csv=${secret_csv}" >> "${GITHUB_OUTPUT}"

      - name: Deploy Cloud Run service
        run: |
          set -euo pipefail
          gcloud run deploy "${SERVICE_NAME}" \
            --region "${REGION}" \
            --image "${{ steps.build.outputs.image }}" \
            --service-account "${{ steps.service_accounts.outputs.runtime_sa }}" \
            --timeout "${SERVICE_TIMEOUT_SECONDS}" \
            --cpu "${SERVICE_CPU}" \
            --memory "${SERVICE_MEMORY}" \
            --concurrency "${SERVICE_CONCURRENCY}" \
            --max-instances "${SERVICE_MAX_INSTANCES}" \
            --min-instances "${SERVICE_MIN_INSTANCES}" \
            --no-cpu-boost \
            --cpu-throttling \
            --labels "job_name=${RESOURCE_LABEL},service_name=${SERVICE_NAME}" \
            --allow-unauthenticated \
            --env-vars-file "${{ steps.cloudrun_args.outputs.env_file }}" \
            --set-secrets "${{ steps.cloudrun_args.outputs.secret_csv }}"

      - name: Verify service labels
        run: |
          set -euo pipefail
          labels_json="$(gcloud run services describe "${SERVICE_NAME}" --region "${REGION}" --format="json(metadata.labels)")"
          job_name_label="$(python3 -c 'import json,sys; print(((json.loads(sys.stdin.read()) or {}).get("metadata", {}) or {}).get("labels", {}).get("job_name", ""))' <<<"${labels_json}")"
          if [ "${job_name_label}" != "${RESOURCE_LABEL}" ]; then
            echo "job_name label mismatch: expected ${RESOURCE_LABEL}, got ${job_name_label:-<missing>}"
            exit 1
          fi

      - name: Ensure Cloud Scheduler trigger exists
        run: |
          set -euo pipefail

          enabled="$(printf '%s' "${SCHEDULER_ENABLED}" | tr '[:upper:]' '[:lower:]')"
          if [ "${enabled}" != "true" ] && [ "${enabled}" != "1" ] && [ "${enabled}" != "yes" ]; then
            echo "Skipping scheduler trigger management (SCHEDULER_ENABLED=${SCHEDULER_ENABLED})."
            exit 0
          fi

          scheduler_sa="${{ steps.service_accounts.outputs.scheduler_sa }}"
          service_uri="$(gcloud run services describe "${SERVICE_NAME}" --region "${REGION}" --format='value(status.url)')"
          scheduler_uri="${service_uri}/run"
          scheduler_body='{}'

          gcloud run services add-iam-policy-binding "${SERVICE_NAME}" \
            --region "${REGION}" \
            --member "serviceAccount:${scheduler_sa}" \
            --role "roles/run.invoker" >/dev/null

          if gcloud scheduler jobs describe "${SCHEDULER_JOB_NAME}" --location "${REGION}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "${SCHEDULER_JOB_NAME}" \
              --location "${REGION}" \
              --schedule "${SCHEDULER_CRON}" \
              --time-zone "${SCHEDULER_TIMEZONE}" \
              --uri "${scheduler_uri}" \
              --http-method POST \
              --update-headers "Content-Type=application/json,X-UK-AQ-Upstream-Auth=${UK_AQ_EDGE_UPSTREAM_SECRET}" \
              --message-body "${scheduler_body}" \
              --oidc-service-account-email "${scheduler_sa}" \
              --oidc-token-audience "${service_uri}" \
              --max-retry-attempts "${SCHEDULER_MAX_RETRY_ATTEMPTS}" \
              --attempt-deadline "${SCHEDULER_ATTEMPT_DEADLINE}"
            echo "Updated Cloud Scheduler job: ${SCHEDULER_JOB_NAME}"
          else
            gcloud scheduler jobs create http "${SCHEDULER_JOB_NAME}" \
              --location "${REGION}" \
              --schedule "${SCHEDULER_CRON}" \
              --time-zone "${SCHEDULER_TIMEZONE}" \
              --uri "${scheduler_uri}" \
              --http-method POST \
              --headers "Content-Type=application/json,X-UK-AQ-Upstream-Auth=${UK_AQ_EDGE_UPSTREAM_SECRET}" \
              --message-body "${scheduler_body}" \
              --oidc-service-account-email "${scheduler_sa}" \
              --oidc-token-audience "${service_uri}" \
              --max-retry-attempts "${SCHEDULER_MAX_RETRY_ATTEMPTS}" \
              --attempt-deadline "${SCHEDULER_ATTEMPT_DEADLINE}"
            echo "Created Cloud Scheduler job: ${SCHEDULER_JOB_NAME}"
          fi

      - name: Show deployed service
        run: |
          set -euo pipefail
          gcloud run services describe "${SERVICE_NAME}" \
            --region "${REGION}" \
            --format="yaml(metadata.name,metadata.labels,spec.template.spec.serviceAccountName,spec.template.spec.containerConcurrency,spec.template.spec.containers[0].image,spec.template.spec.containers[0].resources,status.url)"
