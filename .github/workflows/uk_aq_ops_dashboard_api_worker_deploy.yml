name: Deploy UK AQ Ops Dashboard API Worker

on:
  push:
    branches:
      - main
    paths:
      - "api/worker/**"
      - ".github/workflows/uk_aq_ops_dashboard_api_worker_deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    env:
      UK_AQ_OPS_DASHBOARD_API_WORKER_NAME: ${{ vars.UK_AQ_OPS_DASHBOARD_API_WORKER_NAME || 'uk-aq-ops-dashboard-api' }}
      UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID: ${{ vars.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID || '' }}
      UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN: ${{ secrets.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN || '' }}
      UK_AQ_OPS_ADMIN_HOSTNAME: ${{ vars.UK_AQ_OPS_ADMIN_HOSTNAME || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install worker dependencies
        working-directory: api/worker
        run: npm ci

      - name: Type check worker
        working-directory: api/worker
        run: npm run check

      - name: Validate Cloudflare credentials
        run: |
          set -euo pipefail
          if [ -z "${UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing secret UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          if [ -z "${UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing variable UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
          if [ -z "${UK_AQ_OPS_ADMIN_HOSTNAME}" ]; then
            echo "Missing variable UK_AQ_OPS_ADMIN_HOSTNAME."
            exit 1
          fi

      - name: Substitute wrangler.toml placeholders
        run: |
          set -euo pipefail
          sed -i "s|__UK_AQ_OPS_ADMIN_HOSTNAME__|${UK_AQ_OPS_ADMIN_HOSTNAME}|g" api/worker/wrangler.toml

      - name: Deploy Worker (base)
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api/worker
          command: deploy --name ${{ env.UK_AQ_OPS_DASHBOARD_API_WORKER_NAME }}

      - name: Set Worker secrets
        working-directory: api/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          secrets_json="$(jq -n \
            --arg DASHBOARD_UPSTREAM_BASE_URL "${{ vars.DASHBOARD_UPSTREAM_BASE_URL }}" \
            --arg DASHBOARD_UPSTREAM_BEARER_TOKEN "${{ secrets.DASHBOARD_UPSTREAM_BEARER_TOKEN }}" \
            '{DASHBOARD_UPSTREAM_BASE_URL: $DASHBOARD_UPSTREAM_BASE_URL, DASHBOARD_UPSTREAM_BEARER_TOKEN: $DASHBOARD_UPSTREAM_BEARER_TOKEN} | with_entries(select(.value != ""))')"
          printf "%s" "$secrets_json" | npx --yes wrangler@4 secret bulk --name "${UK_AQ_OPS_DASHBOARD_API_WORKER_NAME}"

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api/worker
          command: deploy --name ${{ env.UK_AQ_OPS_DASHBOARD_API_WORKER_NAME }}
