name: Deploy uk_aq_station_history Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/uk_aq_station_history/**"
      - ".github/workflows/uk_aq_station_history_deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    env:
      UK_AQ_STATION_HISTORY_WORKER_NAME: ${{ vars.UK_AQ_STATION_HISTORY_WORKER_NAME || '' }}
      UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID: ${{ vars.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID || vars.UK_AQ_CACHE_CLOUDFLARE_ACCOUNT_ID || '' }}
      UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN: ${{ secrets.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN || secrets.UK_AQ_CACHE_CLOUDFLARE_API_TOKEN || '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate station-history deployment configuration
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || '' }}
          SB_SECRET_KEY: ${{ secrets.SB_SECRET_KEY || '' }}
          UK_AQ_EDGE_UPSTREAM_SECRET: ${{ secrets.UK_AQ_EDGE_UPSTREAM_SECRET || '' }}
          UK_AQ_AQI_HISTORY_R2_API_URL: ${{ vars.UK_AQ_AQI_HISTORY_R2_API_URL || '' }}
          UK_AQ_OBSERVS_HISTORY_R2_API_URL: ${{ vars.UK_AQ_OBSERVS_HISTORY_R2_API_URL || '' }}
        run: |
          set -euo pipefail
          test -n "${UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID}" || { echo "Missing Cloudflare account ID."; exit 1; }
          test -n "${UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN}" || { echo "Missing Cloudflare API token."; exit 1; }
          test -n "${UK_AQ_STATION_HISTORY_WORKER_NAME}" || { echo "Missing required GitHub repository variable UK_AQ_STATION_HISTORY_WORKER_NAME."; exit 1; }
          test -n "${SUPABASE_URL}" || { echo "Missing required GitHub repository variable SUPABASE_URL."; exit 1; }
          test -n "${SB_SECRET_KEY}" || { echo "Missing required GitHub repository secret SB_SECRET_KEY."; exit 1; }
          test -n "${UK_AQ_EDGE_UPSTREAM_SECRET}" || { echo "Missing required GitHub repository secret UK_AQ_EDGE_UPSTREAM_SECRET."; exit 1; }
          test -n "${UK_AQ_AQI_HISTORY_R2_API_URL}" || { echo "Missing required GitHub repository variable UK_AQ_AQI_HISTORY_R2_API_URL."; exit 1; }
          test -n "${UK_AQ_OBSERVS_HISTORY_R2_API_URL}" || { echo "Missing required GitHub repository variable UK_AQ_OBSERVS_HISTORY_R2_API_URL."; exit 1; }
      - name: Set data-path Worker secrets
        working-directory: workers/uk_aq_station_history
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          jq -n --arg SUPABASE_URL "${{ vars.SUPABASE_URL }}" --arg SB_SECRET_KEY "${{ secrets.SB_SECRET_KEY }}" --arg UK_AQ_PUBLIC_SCHEMA "${{ vars.UK_AQ_PUBLIC_SCHEMA || 'uk_aq_public' }}" --arg INGESTDB_RETENTION_DAYS "${{ vars.INGESTDB_RETENTION_DAYS || '5' }}" --arg UK_AQ_EDGE_UPSTREAM_SECRET "${{ secrets.UK_AQ_EDGE_UPSTREAM_SECRET }}" --arg UK_AQ_AQI_HISTORY_R2_API_URL "${{ vars.UK_AQ_AQI_HISTORY_R2_API_URL }}" --arg UK_AQ_OBSERVS_HISTORY_R2_API_URL "${{ vars.UK_AQ_OBSERVS_HISTORY_R2_API_URL }}" '{SUPABASE_URL:$SUPABASE_URL, SB_SECRET_KEY:$SB_SECRET_KEY, UK_AQ_PUBLIC_SCHEMA:$UK_AQ_PUBLIC_SCHEMA, INGESTDB_RETENTION_DAYS:$INGESTDB_RETENTION_DAYS, UK_AQ_EDGE_UPSTREAM_SECRET:$UK_AQ_EDGE_UPSTREAM_SECRET, UK_AQ_AQI_HISTORY_R2_API_URL:$UK_AQ_AQI_HISTORY_R2_API_URL, UK_AQ_OBSERVS_HISTORY_R2_API_URL:$UK_AQ_OBSERVS_HISTORY_R2_API_URL}' | npx --yes wrangler@4 secret bulk --name "${UK_AQ_STATION_HISTORY_WORKER_NAME}"
      - name: Deploy private Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_DOMAIN_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_station_history
          command: deploy --name ${{ env.UK_AQ_STATION_HISTORY_WORKER_NAME }}
