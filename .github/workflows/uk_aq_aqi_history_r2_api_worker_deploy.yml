name: Deploy uk_aq_aqi_history_r2_api Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/uk_aq_aqi_history_r2_api_worker/**"
      - ".github/workflows/uk_aq_aqi_history_r2_api_worker_deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    env:
      UK_AQ_AQI_HISTORY_R2_API_WORKER_NAME: ${{ vars.UK_AQ_AQI_HISTORY_R2_API_WORKER_NAME || 'uk-aq-aqi-history-r2-api' }}
      UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_ACCOUNT_ID: ${{ vars.UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID || '' }}
      UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_API_TOKEN: ${{ secrets.UK_AQ_R2_CLOUDFLARE_API_TOKEN || '' }}
      CFLARE_R2_BUCKET: ${{ vars.CFLARE_R2_BUCKET || '' }}
      INGESTDB_RETENTION_DAYS: ${{ vars.INGESTDB_RETENTION_DAYS || '5' }}
      UK_AQ_AQI_HISTORY_R2_TIMESERIES_INDEX_PREFIX: ${{ vars.UK_AQ_AQI_HISTORY_R2_TIMESERIES_INDEX_PREFIX || 'history/_index/aqilevels_timeseries' }}
      UK_AQ_AQI_HISTORY_R2_TIMESERIES_INDEX_ENABLED: ${{ vars.UK_AQ_AQI_HISTORY_R2_TIMESERIES_INDEX_ENABLED || 'true' }}
      UK_AQ_AQI_HISTORY_R2_REQUIRE_TIMESERIES_INDEX: ${{ vars.UK_AQ_AQI_HISTORY_R2_REQUIRE_TIMESERIES_INDEX || 'true' }}
      UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_FILES_PER_REQUEST: ${{ vars.UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_FILES_PER_REQUEST || '120' }}
      UK_AQ_AQI_HISTORY_R2_MAX_R2_OBJECT_READS_PER_REQUEST: ${{ vars.UK_AQ_AQI_HISTORY_R2_MAX_R2_OBJECT_READS_PER_REQUEST || '80' }}
      UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_ROW_GROUPS_PER_REQUEST: ${{ vars.UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_ROW_GROUPS_PER_REQUEST || '300' }}
      UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_CHUNKS_PER_REQUEST: ${{ vars.UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_CHUNKS_PER_REQUEST || '600' }}
      UK_AQ_AQI_HISTORY_R2_MAX_SCAN_ELAPSED_MS: ${{ vars.UK_AQ_AQI_HISTORY_R2_MAX_SCAN_ELAPSED_MS || '12000' }}
      UK_AQ_R2_HISTORY_VERSION: ${{ vars.UK_AQ_R2_HISTORY_VERSION || '' }}
      UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_PREFIX || 'history/v2/aqilevels/hourly/data' }}
      UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_TIMESERIES_INDEX_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_TIMESERIES_INDEX_PREFIX || 'history/_index_v2/aqilevels_hourly_data_timeseries' }}
      UK_AQ_R2_HISTORY_INDEX_V2_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_INDEX_V2_PREFIX || 'history/_index_v2' }}
      UK_AQ_AQI_INTERNAL_RESPONSE_CACHE_ENABLED: ${{ vars.UK_AQ_AQI_INTERNAL_RESPONSE_CACHE_ENABLED || 'true' }}
      UK_AQ_AQI_MUTABLE_HOURS: ${{ vars.UK_AQ_AQI_MUTABLE_HOURS || '120' }}
      UK_AQ_AQI_LIVE_OBSERVATION_FALLBACK_ENABLED: ${{ vars.UK_AQ_AQI_LIVE_OBSERVATION_FALLBACK_ENABLED || 'false' }}
      UK_AQ_OBSERVS_HISTORY_R2_API_URL: ${{ vars.UK_AQ_OBSERVS_HISTORY_R2_API_URL || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare credentials
        run: |
          set -euo pipefail
          if [ -z "${UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing secret UK_AQ_R2_CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          if [ -z "${UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing variable UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
          if [ -z "${{ secrets.UK_AQ_EDGE_UPSTREAM_SECRET }}" ]; then
            echo "Missing secret UK_AQ_EDGE_UPSTREAM_SECRET."
            exit 1
          fi
          if [ -z "${{ vars.OBS_AQIDB_SUPABASE_URL }}" ]; then
            echo "Missing variable OBS_AQIDB_SUPABASE_URL."
            exit 1
          fi
          if [ -z "${{ secrets.OBS_AQIDB_SECRET_KEY }}" ]; then
            echo "Missing secret OBS_AQIDB_SECRET_KEY."
            exit 1
          fi
          if [ -z "${CFLARE_R2_BUCKET}" ]; then
            echo "Missing variable CFLARE_R2_BUCKET."
            exit 1
          fi
          case "${UK_AQ_R2_HISTORY_VERSION}" in
            v1|v2) ;;
            "")
              echo "Missing GitHub variable UK_AQ_R2_HISTORY_VERSION."
              exit 1
              ;;
            *)
              echo "Invalid UK_AQ_R2_HISTORY_VERSION=${UK_AQ_R2_HISTORY_VERSION}; expected v1 or v2."
              exit 1
              ;;
          esac
          if [ "${UK_AQ_AQI_LIVE_OBSERVATION_FALLBACK_ENABLED}" = "true" ] && [ -z "${UK_AQ_OBSERVS_HISTORY_R2_API_URL}" ]; then
            echo "UK_AQ_OBSERVS_HISTORY_R2_API_URL is required when UK_AQ_AQI_LIVE_OBSERVATION_FALLBACK_ENABLED=true."
            exit 1
          fi
          echo "Deploy target worker: ${UK_AQ_AQI_HISTORY_R2_API_WORKER_NAME}"
          echo "Cloudflare account id: ${UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_ACCOUNT_ID}"

      - name: Substitute wrangler.toml placeholders
        run: |
          set -euo pipefail
          sed -i "s|__CFLARE_R2_BUCKET__|${CFLARE_R2_BUCKET}|g" workers/uk_aq_aqi_history_r2_api_worker/wrangler.toml
          sed -i "s|__INGESTDB_RETENTION_DAYS__|${INGESTDB_RETENTION_DAYS}|g" workers/uk_aq_aqi_history_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_R2_HISTORY_VERSION__|${UK_AQ_R2_HISTORY_VERSION}|g" workers/uk_aq_aqi_history_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_PREFIX__|${UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_PREFIX}|g" workers/uk_aq_aqi_history_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_TIMESERIES_INDEX_PREFIX__|${UK_AQ_R2_HISTORY_V2_AQILEVELS_HOURLY_DATA_TIMESERIES_INDEX_PREFIX}|g" workers/uk_aq_aqi_history_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_R2_HISTORY_INDEX_V2_PREFIX__|${UK_AQ_R2_HISTORY_INDEX_V2_PREFIX}|g" workers/uk_aq_aqi_history_r2_api_worker/wrangler.toml
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          config_path = Path("workers/uk_aq_aqi_history_r2_api_worker/wrangler.toml")
          text = config_path.read_text(encoding="utf-8")
          replacements = {
              "UK_AQ_AQI_HISTORY_R2_TIMESERIES_INDEX_PREFIX": os.environ["UK_AQ_AQI_HISTORY_R2_TIMESERIES_INDEX_PREFIX"],
              "UK_AQ_AQI_HISTORY_R2_TIMESERIES_INDEX_ENABLED": os.environ["UK_AQ_AQI_HISTORY_R2_TIMESERIES_INDEX_ENABLED"],
              "UK_AQ_AQI_HISTORY_R2_REQUIRE_TIMESERIES_INDEX": os.environ["UK_AQ_AQI_HISTORY_R2_REQUIRE_TIMESERIES_INDEX"],
              "UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_FILES_PER_REQUEST": os.environ["UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_FILES_PER_REQUEST"],
              "UK_AQ_AQI_HISTORY_R2_MAX_R2_OBJECT_READS_PER_REQUEST": os.environ["UK_AQ_AQI_HISTORY_R2_MAX_R2_OBJECT_READS_PER_REQUEST"],
              "UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_ROW_GROUPS_PER_REQUEST": os.environ["UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_ROW_GROUPS_PER_REQUEST"],
              "UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_CHUNKS_PER_REQUEST": os.environ["UK_AQ_AQI_HISTORY_R2_MAX_PARQUET_CHUNKS_PER_REQUEST"],
              "UK_AQ_AQI_HISTORY_R2_MAX_SCAN_ELAPSED_MS": os.environ["UK_AQ_AQI_HISTORY_R2_MAX_SCAN_ELAPSED_MS"],
              "UK_AQ_AQI_INTERNAL_RESPONSE_CACHE_ENABLED": os.environ["UK_AQ_AQI_INTERNAL_RESPONSE_CACHE_ENABLED"],
              "UK_AQ_AQI_MUTABLE_HOURS": os.environ["UK_AQ_AQI_MUTABLE_HOURS"],
              "UK_AQ_AQI_LIVE_OBSERVATION_FALLBACK_ENABLED": os.environ["UK_AQ_AQI_LIVE_OBSERVATION_FALLBACK_ENABLED"],
              "UK_AQ_OBSERVS_HISTORY_R2_API_URL": os.environ["UK_AQ_OBSERVS_HISTORY_R2_API_URL"],
          }
          for key, value in replacements.items():
              escaped = value.replace("\\", "\\\\").replace('"', '\\"')
              text, count = re.subn(
                  rf'^{re.escape(key)}\s*=\s*"[^"]*"',
                  f'{key} = "{escaped}"',
                  text,
                  flags=re.MULTILINE,
              )
              if count != 1:
                  raise SystemExit(f"Expected exactly one {key} entry in {config_path}, found {count}.")
          config_path.write_text(text, encoding="utf-8")
          PY

      - name: Deploy Worker (base)
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_aqi_history_r2_api_worker
          command: deploy --name ${{ env.UK_AQ_AQI_HISTORY_R2_API_WORKER_NAME }}

      - name: Set Worker secrets
        working-directory: workers/uk_aq_aqi_history_r2_api_worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          secrets_json="$(jq -n \
            --arg UK_AQ_EDGE_UPSTREAM_SECRET "${{ secrets.UK_AQ_EDGE_UPSTREAM_SECRET }}" \
            --arg OBS_AQIDB_SUPABASE_URL "${{ vars.OBS_AQIDB_SUPABASE_URL }}" \
            --arg OBS_AQIDB_SECRET_KEY "${{ secrets.OBS_AQIDB_SECRET_KEY }}" \
            '{UK_AQ_EDGE_UPSTREAM_SECRET: $UK_AQ_EDGE_UPSTREAM_SECRET, OBS_AQIDB_SUPABASE_URL: $OBS_AQIDB_SUPABASE_URL, OBS_AQIDB_SECRET_KEY: $OBS_AQIDB_SECRET_KEY} | with_entries(select(.value != ""))')"
          for attempt in 1 2 3; do
            if printf "%s" "$secrets_json" | npx --yes wrangler@4 secret bulk --name "${UK_AQ_AQI_HISTORY_R2_API_WORKER_NAME}"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to apply Worker secrets after 3 attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_AQI_HISTORY_R2_API_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_aqi_history_r2_api_worker
          command: deploy --name ${{ env.UK_AQ_AQI_HISTORY_R2_API_WORKER_NAME }}

      - name: Print Wrangler logs on failure
        if: failure()
        run: |
          set -euo pipefail
          latest_log="$(ls -1t "${HOME}/.config/.wrangler/logs"/wrangler-*.log 2>/dev/null | head -n 1 || true)"
          if [ -n "${latest_log}" ] && [ -f "${latest_log}" ]; then
            echo "Last Wrangler log: ${latest_log}"
            sed -n '1,220p' "${latest_log}" || true
          else
            echo "No Wrangler log file found under ~/.config/.wrangler/logs"
          fi
