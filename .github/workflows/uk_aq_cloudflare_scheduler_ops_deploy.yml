name: Deploy UK AQ Ops Cloudflare Scheduler

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare/scheduler/ops/**"
      - ".github/workflows/uk_aq_cloudflare_scheduler_ops_deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-ops-scheduler:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || '' }}
      OBS_AQIDB_SUPABASE_URL: ${{ vars.OBS_AQIDB_SUPABASE_URL || '' }}
      OBS_AQIDB_SECRET_KEY: ${{ secrets.OBS_AQIDB_SECRET_KEY || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare credentials and Supabase config
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing secret CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing secret CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          if [ -z "${OBS_AQIDB_SUPABASE_URL}" ]; then
            echo "Missing repo variable OBS_AQIDB_SUPABASE_URL."
            exit 1
          fi
          if [ -z "${OBS_AQIDB_SECRET_KEY}" ]; then
            echo "Missing secret OBS_AQIDB_SECRET_KEY."
            exit 1
          fi

      - name: Deploy worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/scheduler/ops
          command: deploy

      - name: Set worker secrets
        working-directory: cloudflare/scheduler/ops
        run: |
          set -euo pipefail
          secrets_json="$(jq -n \
            --arg OBS_AQIDB_SUPABASE_URL "${OBS_AQIDB_SUPABASE_URL}" \
            --arg OBS_AQIDB_SECRET_KEY "${OBS_AQIDB_SECRET_KEY}" \
            '{OBS_AQIDB_SUPABASE_URL: $OBS_AQIDB_SUPABASE_URL, OBS_AQIDB_SECRET_KEY: $OBS_AQIDB_SECRET_KEY}')"
          printf '%s' "$secrets_json" | npx --yes wrangler@4 secret bulk --name uk-aq-scheduler-ops

      - name: Redeploy worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare/scheduler/ops
          command: deploy
