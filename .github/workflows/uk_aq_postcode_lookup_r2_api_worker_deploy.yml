name: Deploy uk_aq_postcode_lookup_r2_api Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/uk_aq_postcode_lookup_r2_api_worker/**"
      - ".github/workflows/uk_aq_postcode_lookup_r2_api_worker_deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    env:
      UK_AQ_POSTCODE_LOOKUP_R2_API_WORKER_NAME: ${{ vars.UK_AQ_POSTCODE_LOOKUP_R2_API_WORKER_NAME || 'uk-aq-postcode-lookup-r2-api' }}
      UK_AQ_POSTCODE_R2_CLOUDFLARE_ACCOUNT_ID: ${{ vars.UK_AQ_POSTCODE_R2_CLOUDFLARE_ACCOUNT_ID || vars.UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID || '' }}
      UK_AQ_POSTCODE_R2_CLOUDFLARE_API_TOKEN: ${{ secrets.UK_AQ_POSTCODE_R2_CLOUDFLARE_API_TOKEN || secrets.UK_AQ_R2_CLOUDFLARE_API_TOKEN || '' }}
      UK_AQ_POSTCODE_R2_BUCKET: ${{ vars.UK_AQ_POSTCODE_R2_BUCKET || vars.CFLARE_R2_BUCKET || '' }}
      UK_AQ_POSTCODE_R2_PREFIX: ${{ vars.UK_AQ_POSTCODE_R2_PREFIX || 'v1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare credentials
        run: |
          set -euo pipefail
          if [ -z "${UK_AQ_POSTCODE_R2_CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing secret UK_AQ_POSTCODE_R2_CLOUDFLARE_API_TOKEN (or fallback UK_AQ_R2_CLOUDFLARE_API_TOKEN)."
            exit 1
          fi
          if [ -z "${UK_AQ_POSTCODE_R2_CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing variable UK_AQ_POSTCODE_R2_CLOUDFLARE_ACCOUNT_ID (or fallback UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID)."
            exit 1
          fi
          if [ -z "${UK_AQ_POSTCODE_R2_BUCKET}" ]; then
            echo "Missing variable UK_AQ_POSTCODE_R2_BUCKET (or fallback CFLARE_R2_BUCKET)."
            exit 1
          fi
          if [ -z "${UK_AQ_POSTCODE_R2_PREFIX}" ]; then
            echo "Missing variable UK_AQ_POSTCODE_R2_PREFIX."
            exit 1
          fi

      - name: Substitute wrangler.toml placeholders
        run: |
          set -euo pipefail
          sed -i "s|__CFLARE_R2_BUCKET__|${UK_AQ_POSTCODE_R2_BUCKET}|g" workers/uk_aq_postcode_lookup_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_POSTCODE_R2_PREFIX__|${UK_AQ_POSTCODE_R2_PREFIX}|g" workers/uk_aq_postcode_lookup_r2_api_worker/wrangler.toml

      - name: Deploy Worker (base)
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_POSTCODE_R2_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_POSTCODE_R2_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_postcode_lookup_r2_api_worker
          command: deploy --name ${{ env.UK_AQ_POSTCODE_LOOKUP_R2_API_WORKER_NAME }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_POSTCODE_R2_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_POSTCODE_R2_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_postcode_lookup_r2_api_worker
          command: deploy --name ${{ env.UK_AQ_POSTCODE_LOOKUP_R2_API_WORKER_NAME }}
