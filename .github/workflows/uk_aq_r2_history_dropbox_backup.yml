name: UK AQ R2 History Dropbox Backup

on:
  # Intended external schedule:
  #   04:35 UTC daily via Cloudflare Worker
  # Previous GitHub cron:
  #   schedule:
  #     - cron: "35 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing copy/checkpoint changes"
        required: false
        default: false
        type: boolean
      max_days_per_run:
        description: "Override max new days copied per domain (0 = unlimited)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: uk-aq-r2-history-dropbox-backup
  cancel-in-progress: false

jobs:
  backup-r2-history-to-dropbox:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CFLARE_R2_ENDPOINT: ${{ vars.CFLARE_R2_ENDPOINT || '' }}
      CFLARE_R2_BUCKET: ${{ vars.CFLARE_R2_BUCKET || '' }}
      CFLARE_R2_REGION: ${{ vars.CFLARE_R2_REGION || 'auto' }}
      CFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CFLARE_R2_ACCESS_KEY_ID }}
      CFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CFLARE_R2_SECRET_ACCESS_KEY }}

      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}

      UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_OBSERVATIONS_PREFIX || 'history/v1/observations' }}
      UK_AQ_R2_HISTORY_AQILEVELS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_AQILEVELS_PREFIX || 'history/v1/aqilevels' }}
      UK_AQ_R2_HISTORY_CORE_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_CORE_PREFIX || 'history/v1/core' }}
      UK_AQ_R2_HISTORY_INDEX_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_INDEX_PREFIX || 'history/_index' }}
      UK_AQ_DROPBOX_ROOT: ${{ vars.UK_AQ_DROPBOX_ROOT || 'CIC-Test' }}
      UK_AQ_R2_HISTORY_DROPBOX_DIR: ${{ vars.UK_AQ_R2_HISTORY_DROPBOX_DIR || 'R2_history_backup' }}
      UK_AQ_R2_HISTORY_BACKUP_STATE_REL_PATH: ${{ vars.UK_AQ_R2_HISTORY_BACKUP_STATE_REL_PATH || '_ops/checkpoints/r2_history_backup_state_v1.json' }}
      UK_AQ_R2_HISTORY_BACKUP_INVENTORY_REL_PATH: ${{ vars.UK_AQ_R2_HISTORY_BACKUP_INVENTORY_REL_PATH || 'history/_index/backup_inventory_v1.json' }}
      UK_AQ_R2_HISTORY_BACKUP_MAX_DAYS_PER_RUN: ${{ vars.UK_AQ_R2_HISTORY_BACKUP_MAX_DAYS_PER_RUN || '0' }}

      INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      INPUT_MAX_DAYS_PER_RUN: ${{ github.event.inputs.max_days_per_run || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Report daily task health (started)
        id: daily_task_health_started
        env:
          SUPABASE_URL: ${{ vars.OBS_AQIDB_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.OBS_AQIDB_SECRET_KEY }}
          DAILY_TASK_KEY: ops.r2_history_dropbox_backup
          DAILY_TASK_HEALTH_REPORT_STAGE: started
        run: node scripts/report_daily_task_health.mjs

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version

      - name: Validate required configuration
        run: |
          set -euo pipefail
          required_vars=(
            CFLARE_R2_ENDPOINT
            CFLARE_R2_BUCKET
            CFLARE_R2_ACCESS_KEY_ID
            CFLARE_R2_SECRET_ACCESS_KEY
            DROPBOX_APP_KEY
            DROPBOX_APP_SECRET
            DROPBOX_REFRESH_TOKEN
            UK_AQ_DROPBOX_ROOT
            UK_AQ_R2_HISTORY_DROPBOX_DIR
          )

          missing=0
          for key in "${required_vars[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required value: ${key}" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure rclone remotes
        env:
          RCLONE_CONFIG: ${{ runner.temp }}/rclone.conf
        run: |
          set -euo pipefail

          endpoint="${CFLARE_R2_ENDPOINT%/}"
          dropbox_access_token="$(curl -fsS https://api.dropbox.com/oauth2/token \
            -u "${DROPBOX_APP_KEY}:${DROPBOX_APP_SECRET}" \
            -d grant_type=refresh_token \
            --data-urlencode "refresh_token=${DROPBOX_REFRESH_TOKEN}" \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); print(data.get("access_token",""))')"

          if [ -z "${dropbox_access_token}" ]; then
            echo "Failed to fetch Dropbox access token from refresh token" >&2
            exit 1
          fi

          dropbox_token="$(DROPBOX_ACCESS_TOKEN="${dropbox_access_token}" DROPBOX_REFRESH_TOKEN="${DROPBOX_REFRESH_TOKEN}" python3 -c 'import json, os; print(json.dumps({"access_token": os.environ["DROPBOX_ACCESS_TOKEN"], "token_type": "bearer", "refresh_token": os.environ["DROPBOX_REFRESH_TOKEN"], "expiry": "0001-01-01T00:00:00Z"}, separators=(",", ":")))')"

          mkdir -p "$(dirname "${RCLONE_CONFIG}")"
          {
            echo "[uk_aq_r2]"
            echo "type = s3"
            echo "provider = Cloudflare"
            echo "env_auth = false"
            echo "access_key_id = ${CFLARE_R2_ACCESS_KEY_ID}"
            echo "secret_access_key = ${CFLARE_R2_SECRET_ACCESS_KEY}"
            echo "endpoint = ${endpoint}"
            echo "region = ${CFLARE_R2_REGION}"
            echo "acl = private"
            echo "no_check_bucket = true"
            echo
            echo "[uk_aq_dropbox]"
            echo "type = dropbox"
            echo "client_id = ${DROPBOX_APP_KEY}"
            echo "client_secret = ${DROPBOX_APP_SECRET}"
            echo "token = ${dropbox_token}"
          } > "${RCLONE_CONFIG}"

          chmod 600 "${RCLONE_CONFIG}"

          # shellcheck disable=SC2016
          echo "RCLONE_CONFIG=${RCLONE_CONFIG}" >> "$GITHUB_ENV"

      - name: Build R2 history backup inventory
        # Always runs (no --dry-run) even when the workflow's dry_run input is
        # true. The inventory is a single small control file in R2, not user
        # data — and the sync step needs a fresh inventory to produce an
        # accurate dry-run plan. Writing the inventory is idempotent.
        run: |
          set -euo pipefail
          mkdir -p tmp

          cmd=(
            node scripts/backup_r2/build_backup_inventory.mjs
            --source-root "uk_aq_r2:${CFLARE_R2_BUCKET}"
            --inventory-rel-path "${UK_AQ_R2_HISTORY_BACKUP_INVENTORY_REL_PATH}"
            --index-prefix "${UK_AQ_R2_HISTORY_INDEX_PREFIX}"
            --report-out "tmp/r2_backup_inventory_report.json"
          )

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Run inventory-driven Dropbox sync
        run: |
          set -euo pipefail
          mkdir -p tmp

          max_days="${INPUT_MAX_DAYS_PER_RUN:-}"
          if [ -z "${max_days}" ]; then
            max_days="${UK_AQ_R2_HISTORY_BACKUP_MAX_DAYS_PER_RUN}"
          fi

          dropbox_root="${UK_AQ_DROPBOX_ROOT%/}"
          # Dropbox app-folder tokens use app-relative paths; leading slash causes
          # "path root is not supported for sandbox app" for some operations.
          dropbox_root="${dropbox_root#/}"

          dropbox_dir="${UK_AQ_R2_HISTORY_DROPBOX_DIR#/}"
          dropbox_dir="${dropbox_dir%/}"
          if [ -z "${dropbox_dir}" ]; then
            echo "UK_AQ_R2_HISTORY_DROPBOX_DIR must not be empty" >&2
            exit 1
          fi

          if [ -n "${dropbox_root}" ]; then
            dropbox_backup_root="${dropbox_root}/${dropbox_dir}"
          else
            dropbox_backup_root="${dropbox_dir}"
          fi

          cmd=(
            node scripts/backup_r2/sync_history_to_dropbox.mjs
            --source-root "uk_aq_r2:${CFLARE_R2_BUCKET}"
            --dest-root "uk_aq_dropbox:${dropbox_backup_root}"
            --inventory-rel-path "${UK_AQ_R2_HISTORY_BACKUP_INVENTORY_REL_PATH}"
            --state-rel-path "${UK_AQ_R2_HISTORY_BACKUP_STATE_REL_PATH}"
            --max-days-per-run "${max_days}"
            --report-out "tmp/r2_history_dropbox_backup_report.json"
          )

          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            cmd+=(--dry-run)
          fi

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Upload backup report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uk-aq-r2-history-dropbox-backup-report
          path: |
            tmp/r2_backup_inventory_report.json
            tmp/r2_history_dropbox_backup_report.json
          if-no-files-found: ignore

      - name: Report daily task health
        if: always()
        env:
          SUPABASE_URL: ${{ vars.OBS_AQIDB_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.OBS_AQIDB_SECRET_KEY }}
          DAILY_TASK_KEY: ops.r2_history_dropbox_backup
          DAILY_TASK_HEALTH_REPORT_STAGE: final
          DAILY_TASK_HEALTH_RUN_ID: ${{ steps.daily_task_health_started.outputs.health_run_id }}
          JOB_STATUS: ${{ job.status }}
        run: node scripts/report_daily_task_health.mjs
