name: Deploy Latest Snapshot Cloud Run Service

on:
  push:
    branches:
      - main
    paths:
      - "workers/uk_aq_latest_snapshot_cloud_run/**"
      - "workers/shared/r2_sigv4.mjs"
      - "scripts/gcp/uk_aq_secret_upsert_if_changed.sh"
      - ".github/workflows/uk_aq_latest_snapshot_cloud_run_deploy.yml"
  workflow_dispatch:

concurrency:
  group: uk-aq-latest-snapshot-deploy
  cancel-in-progress: false

jobs:
  deploy-latest-snapshot-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
      REPO: ${{ vars.GCP_ARTIFACT_REPO || 'uk-aq' }}
      SERVICE_NAME: ${{ vars.GCP_LATEST_SNAPSHOT_SERVICE_NAME || 'uk-aq-latest-snapshot-builder' }}
      LATEST_SNAPSHOT_SERVICE_ACCOUNT: ${{ vars.GCP_LATEST_SNAPSHOT_SERVICE_ACCOUNT || vars.GCP_OPS_JOB_SERVICE_ACCOUNT || '' }}
      RESOURCE_LABEL: uk-aq-latest-snapshot-service
      SERVICE_TIMEOUT_SECONDS: ${{ vars.GCP_LATEST_SNAPSHOT_SERVICE_TIMEOUT_SECONDS || '300' }}
      SERVICE_CPU: ${{ vars.GCP_LATEST_SNAPSHOT_SERVICE_CPU || '0.25' }}
      SERVICE_MEMORY: ${{ vars.GCP_LATEST_SNAPSHOT_SERVICE_MEMORY || '256Mi' }}
      SERVICE_CONCURRENCY: ${{ vars.GCP_LATEST_SNAPSHOT_SERVICE_CONCURRENCY || '1' }}
      SERVICE_MAX_INSTANCES: ${{ vars.GCP_LATEST_SNAPSHOT_SERVICE_MAX_INSTANCES || '1' }}
      SERVICE_MIN_INSTANCES: ${{ vars.GCP_LATEST_SNAPSHOT_SERVICE_MIN_INSTANCES || '0' }}
      UK_AQ_LATEST_SNAPSHOT_JOB_TIMEOUT_MS: ${{ vars.UK_AQ_LATEST_SNAPSHOT_JOB_TIMEOUT_MS || '240000' }}
      SCHEDULER_ENABLED: ${{ vars.GCP_LATEST_SNAPSHOT_SCHEDULER_ENABLED || 'true' }}
      SCHEDULER_JOB_NAME: ${{ vars.GCP_LATEST_SNAPSHOT_SCHEDULER_JOB_NAME || 'uk-aq-latest-snapshot-every-minute' }}
      SCHEDULER_CRON: ${{ vars.GCP_LATEST_SNAPSHOT_SCHEDULER_CRON || '* * * * *' }}
      SCHEDULER_TIMEZONE: ${{ vars.GCP_LATEST_SNAPSHOT_SCHEDULER_TIMEZONE || 'Etc/UTC' }}
      SCHEDULER_MAX_RETRY_ATTEMPTS: ${{ vars.GCP_LATEST_SNAPSHOT_SCHEDULER_MAX_RETRY_ATTEMPTS || '0' }}
      SCHEDULER_SERVICE_ACCOUNT: ${{ vars.GCP_LATEST_SNAPSHOT_SCHEDULER_SERVICE_ACCOUNT || '' }}
      UK_AQ_LATEST_SNAPSHOT_POLLUTANTS: ${{ vars.UK_AQ_LATEST_SNAPSHOT_POLLUTANTS || 'pm25,pm10,no2' }}
      UK_AQ_LATEST_SNAPSHOT_WINDOWS: ${{ vars.UK_AQ_LATEST_SNAPSHOT_WINDOWS || '' }}
      UK_AQ_LATEST_SNAPSHOT_NETWORK_GROUP: ${{ vars.UK_AQ_LATEST_SNAPSHOT_NETWORK_GROUP || 'all' }}
      UK_AQ_LATEST_SNAPSHOT_CONTRACT_VERSION: ${{ vars.UK_AQ_LATEST_SNAPSHOT_CONTRACT_VERSION || 'v2' }}
      UK_AQ_LATEST_SNAPSHOT_R2_PREFIX: ${{ vars.UK_AQ_LATEST_SNAPSHOT_R2_PREFIX || 'latest_snapshots/v2' }}
      UK_AQ_LATEST_SNAPSHOT_MANIFEST_KEY: ${{ vars.UK_AQ_LATEST_SNAPSHOT_MANIFEST_KEY || '' }}
      UK_AQ_LATEST_SNAPSHOT_RUNS_PREFIX: ${{ vars.UK_AQ_LATEST_SNAPSHOT_RUNS_PREFIX || '' }}
      UK_AQ_LATEST_SNAPSHOT_RUN_REPORTS_ENABLED: ${{ vars.UK_AQ_LATEST_SNAPSHOT_RUN_REPORTS_ENABLED || 'true' }}
      UK_AQ_LATEST_SNAPSHOT_STATE_PREFIX: ${{ vars.UK_AQ_LATEST_SNAPSHOT_STATE_PREFIX || 'latest_snapshots_state/v1' }}
      UK_AQ_LATEST_SNAPSHOT_CORE_METADATA_PREFIX: ${{ vars.UK_AQ_LATEST_SNAPSHOT_CORE_METADATA_PREFIX || 'history/v2/core' }}
      UK_AQ_LATEST_SNAPSHOT_METADATA_REFRESH_SECONDS: ${{ vars.UK_AQ_LATEST_SNAPSHOT_METADATA_REFRESH_SECONDS || '86400' }}
      UK_AQ_LATEST_SNAPSHOT_PUBSUB_SUBSCRIPTION: ${{ vars.UK_AQ_LATEST_SNAPSHOT_PUBSUB_SUBSCRIPTION || 'uk-aq-latest-snapshot-sub' }}
      UK_AQ_SERVICE_EGRESS_METRICS_ENABLED: ${{ vars.UK_AQ_SERVICE_EGRESS_METRICS_ENABLED || 'false' }}
      UK_AQ_SERVICE_EGRESS_METRICS_SUPABASE_URL: ${{ vars.UK_AQ_SERVICE_EGRESS_METRICS_SUPABASE_URL || vars.OBS_AQIDB_SUPABASE_URL || '' }}
      UK_AQ_SERVICE_EGRESS_METRICS_SCHEMA: ${{ vars.UK_AQ_SERVICE_EGRESS_METRICS_SCHEMA || 'uk_aq_public' }}
      UK_AQ_SERVICE_EGRESS_METRICS_RPC: ${{ vars.UK_AQ_SERVICE_EGRESS_METRICS_RPC || 'uk_aq_rpc_service_egress_metrics_batch_upsert' }}
      UK_AQ_SERVICE_EGRESS_ENV: ${{ vars.UK_AQ_SERVICE_EGRESS_ENV || vars.UK_AQ_ENV || '' }}
      UK_AQ_SERVICE_EGRESS_PROJECT_REF: ${{ vars.UK_AQ_SERVICE_EGRESS_PROJECT_REF || vars.OBS_AQIDB_SUPABASE_PROJECT_REF || '' }}
      CFLARE_R2_ENDPOINT: ${{ vars.CFLARE_R2_ENDPOINT || vars.R2_ENDPOINT }}
      CFLARE_R2_BUCKET: ${{ vars.CFLARE_R2_BUCKET || vars.R2_BUCKET }}
      CFLARE_R2_REGION: ${{ vars.CFLARE_R2_REGION || vars.R2_REGION || 'auto' }}
      OBS_AQIDB_SECRET_KEY: ${{ secrets.OBS_AQIDB_SECRET_KEY }}
      CFLARE_R2_ACCESS_KEY_ID: ${{ secrets.CFLARE_R2_ACCESS_KEY_ID }}
      CFLARE_R2_SECRET_ACCESS_KEY: ${{ secrets.CFLARE_R2_SECRET_ACCESS_KEY }}
      UK_AQ_SERVICE_EGRESS_METRICS_SB_SECRET_KEY_SECRET_NAME: ${{ vars.UK_AQ_SERVICE_EGRESS_METRICS_SB_SECRET_KEY_SECRET_NAME || vars.OBS_AQIDB_SECRET_KEY_SECRET_NAME || 'OBS_AQIDB_SECRET_KEY' }}
      CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME: ${{ vars.CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME || 'CFLARE_R2_ACCESS_KEY_ID' }}
      CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME: ${{ vars.CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME || 'CFLARE_R2_SECRET_ACCESS_KEY' }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required project config
        run: |
          set -euo pipefail
          if [ -z "${PROJECT_ID:-}" ]; then
            echo "Missing required variable: GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "${LATEST_SNAPSHOT_SERVICE_ACCOUNT:-}" ]; then
            echo "Missing required service account setting: GCP_LATEST_SNAPSHOT_SERVICE_ACCOUNT (or GCP_OPS_JOB_SERVICE_ACCOUNT)"
            exit 1
          fi
          if [[ "${LATEST_SNAPSHOT_SERVICE_ACCOUNT}" == *"-compute@developer.gserviceaccount.com" ]]; then
            echo "Invalid runtime service account: default compute service account is not allowed."
            exit 1
          fi
          if [ "${SERVICE_MAX_INSTANCES}" != "1" ]; then
            echo "GCP_LATEST_SNAPSHOT_SERVICE_MAX_INSTANCES must be 1 so the in-memory overlap guard is authoritative."
            exit 1
          fi
          if ! [[ "${SERVICE_CONCURRENCY}" =~ ^[0-9]+$ ]] || [ "${SERVICE_CONCURRENCY}" -lt 1 ]; then
            echo "GCP_LATEST_SNAPSHOT_SERVICE_CONCURRENCY must be at least 1."
            exit 1
          fi
          python3 - "${SERVICE_CPU}" "${SERVICE_CONCURRENCY}" <<'PY'
          from decimal import Decimal, InvalidOperation
          import sys

          raw_cpu, raw_concurrency = sys.argv[1:3]
          try:
              cpu = Decimal(raw_cpu[:-1]) / 1000 if raw_cpu.endswith("m") else Decimal(raw_cpu)
              concurrency = int(raw_concurrency)
          except (InvalidOperation, ValueError):
              raise SystemExit("Latest snapshot CPU and concurrency must be numeric Cloud Run values.")
          if cpu < 1 and concurrency > 1:
              raise SystemExit(
                  "Latest snapshot concurrency must be 1 when CPU is below 1. "
                  f"Received cpu={raw_cpu} concurrency={raw_concurrency}."
              )
          PY
          if ! [[ "${SERVICE_TIMEOUT_SECONDS}" =~ ^[0-9]+$ ]] \
            || ! [[ "${UK_AQ_LATEST_SNAPSHOT_JOB_TIMEOUT_MS}" =~ ^[0-9]+$ ]] \
            || [ "${UK_AQ_LATEST_SNAPSHOT_JOB_TIMEOUT_MS}" -le 0 ]; then
            echo "Latest snapshot service and child-job timeouts must be positive integers."
            exit 1
          fi
          if [ $((UK_AQ_LATEST_SNAPSHOT_JOB_TIMEOUT_MS + 30000)) -ge $((SERVICE_TIMEOUT_SECONDS * 1000)) ]; then
            echo "UK_AQ_LATEST_SNAPSHOT_JOB_TIMEOUT_MS must leave at least 30 seconds before the Cloud Run request timeout."
            exit 1
          fi
          if [ -z "${CFLARE_R2_ENDPOINT:-}" ]; then
            echo "Missing required variable: CFLARE_R2_ENDPOINT (or R2_ENDPOINT)"
            exit 1
          fi
          if [ -z "${CFLARE_R2_BUCKET:-}" ]; then
            echo "Missing required variable: CFLARE_R2_BUCKET (or R2_BUCKET)"
            exit 1
          fi

      - name: Validate Google auth config
        run: |
          set -euo pipefail
          if [ -n "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" ] && [ -n "${GCP_SERVICE_ACCOUNT:-}" ]; then
            echo "Using Workload Identity Federation auth."
          elif [ -n "${GCP_SA_KEY:-}" ]; then
            echo "Using Service Account key auth."
          else
            echo "Missing Google auth config."
            echo "Set either:"
            echo "1) GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT"
            echo "or"
            echo "2) GCP_SA_KEY"
            exit 1
          fi

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key fallback)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || env.GCP_SERVICE_ACCOUNT == '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f

      - name: Configure gcloud project
        run: |
          set -euo pipefail
          gcloud config set project "${PROJECT_ID}"
          gcloud config set run/region "${REGION}"

      - name: Verify Artifact Registry repository exists
        run: |
          set -euo pipefail
          gcloud artifacts repositories describe "${REPO}" \
            --location "${REGION}" \
            --project "${PROJECT_ID}" >/dev/null

      - name: Configure Docker auth for Artifact Registry
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282
        with:
          deno-version: v2.7.13

      - name: Install Node dependencies for Deno type resolution
        run: npm ci --ignore-scripts

      - name: Check and test latest snapshot service
        run: |
          set -euo pipefail
          deno check \
            workers/uk_aq_latest_snapshot_cloud_run/service_core.ts \
            workers/uk_aq_latest_snapshot_cloud_run/run_service.ts \
            workers/uk_aq_latest_snapshot_cloud_run/run_job.ts
          deno test \
            workers/uk_aq_latest_snapshot_cloud_run/service_core_test.ts \
            workers/uk_aq_latest_snapshot_cloud_run/latest_state_core_test.ts
          node --test tests/r2_sigv4.test.mjs

      - name: Build and push latest snapshot image
        id: build
        run: |
          set -euo pipefail
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/uk-aq-latest-snapshot-builder:${GITHUB_SHA::12}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          docker build -f workers/uk_aq_latest_snapshot_cloud_run/Dockerfile -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Sync GitHub secrets to GCP Secret Manager
        run: |
          set -euo pipefail
          UPSERT_SCRIPT="scripts/gcp/uk_aq_secret_upsert_if_changed.sh"

          upsert_secret() {
            local secret_name="$1"
            local secret_value="$2"
            local required="${3:-0}"

            if [ -z "${secret_name}" ]; then
              if [ "${required}" = "1" ]; then
                echo "Missing required secret name."
                exit 1
              fi
              return 0
            fi

            if [ -z "${secret_value}" ] && [ "${required}" = "0" ]; then
              echo "Skipping optional secret ${secret_name} (no GitHub secret/variable value)."
              return 0
            fi

            printf '%s' "${secret_value}" | "${UPSERT_SCRIPT}" \
              --project "${PROJECT_ID}" \
              --region "${REGION}" \
              --secret "${secret_name}" \
              --required "${required}" \
              --apply
          }

          upsert_secret "${UK_AQ_SERVICE_EGRESS_METRICS_SB_SECRET_KEY_SECRET_NAME}" "${OBS_AQIDB_SECRET_KEY}" 0
          upsert_secret "${CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME}" "${CFLARE_R2_ACCESS_KEY_ID}" 1
          upsert_secret "${CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME}" "${CFLARE_R2_SECRET_ACCESS_KEY}" 1

      - name: Build Cloud Run env and secret args
        id: cloudrun_args
        run: |
          set -euo pipefail

          require_env() {
            local key="$1"
            local value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "Missing required value for ${key}"
              exit 1
            fi
          }

          add_env() {
            local key="$1"
            local value="${!key:-}"
            if [ -n "${value}" ]; then
              env_updates+=("${key}=${value}")
            fi
          }

          add_secret_binding() {
            local env_key="$1"
            local secret_name="$2"
            local required="${3:-0}"
            if [ -z "${secret_name}" ]; then
              if [ "${required}" = "1" ]; then
                echo "Missing secret name for required binding ${env_key}"
                exit 1
              fi
              return 0
            fi
            if gcloud secrets describe "${secret_name}" --project "${PROJECT_ID}" >/dev/null 2>&1; then
              secret_updates+=("${env_key}=${secret_name}:latest")
              return 0
            fi
            if [ "${required}" = "1" ]; then
              echo "Required Secret Manager secret not found: ${secret_name}"
              exit 1
            fi
          }

          normalize_snapshot_contract_version() {
            local raw="${1:-}"
            case "${raw}" in
              v1|1) echo "v1" ;;
              v2|2|"") echo "v2" ;;
              *)
                echo "Unsupported UK_AQ_LATEST_SNAPSHOT_CONTRACT_VERSION: ${raw}" >&2
                exit 1
                ;;
            esac
          }

          is_under_snapshot_version_prefix() {
            local value="${1#/}"
            local version="$2"
            value="${value%/}"
            [ "${value}" = "latest_snapshots/${version}" ] || [[ "${value}" == latest_snapshots/${version}/* ]]
          }

          validate_snapshot_contract_path() {
            local name="$1"
            local value="${2:-}"
            local contract_version="$3"
            local rejected_version="v1"
            if [ "${contract_version}" = "v1" ]; then
              rejected_version="v2"
            fi
            [ -z "${value}" ] && return 0
            if is_under_snapshot_version_prefix "${value}" "${rejected_version}"; then
              echo "${name}=${value} is under latest_snapshots/${rejected_version} but UK_AQ_LATEST_SNAPSHOT_CONTRACT_VERSION=${contract_version}. Use a matching latest_snapshots/${contract_version} path or a custom non-versioned prefix."
              exit 1
            fi
          }

          validate_snapshot_contract_paths() {
            local contract_version
            contract_version="$(normalize_snapshot_contract_version "${UK_AQ_LATEST_SNAPSHOT_CONTRACT_VERSION:-v2}")"
            validate_snapshot_contract_path UK_AQ_LATEST_SNAPSHOT_R2_PREFIX "${UK_AQ_LATEST_SNAPSHOT_R2_PREFIX:-}" "${contract_version}"
            validate_snapshot_contract_path UK_AQ_LATEST_SNAPSHOT_MANIFEST_KEY "${UK_AQ_LATEST_SNAPSHOT_MANIFEST_KEY:-}" "${contract_version}"
            validate_snapshot_contract_path UK_AQ_LATEST_SNAPSHOT_RUNS_PREFIX "${UK_AQ_LATEST_SNAPSHOT_RUNS_PREFIX:-}" "${contract_version}"
          }

          require_env CFLARE_R2_ENDPOINT
          require_env CFLARE_R2_BUCKET
          validate_snapshot_contract_paths

          env_updates=()
          add_env UK_AQ_LATEST_SNAPSHOT_POLLUTANTS
          add_env UK_AQ_LATEST_SNAPSHOT_WINDOWS
          add_env UK_AQ_LATEST_SNAPSHOT_NETWORK_GROUP
          add_env UK_AQ_LATEST_SNAPSHOT_CONTRACT_VERSION
          add_env UK_AQ_LATEST_SNAPSHOT_R2_PREFIX
          add_env UK_AQ_LATEST_SNAPSHOT_MANIFEST_KEY
          add_env UK_AQ_LATEST_SNAPSHOT_RUNS_PREFIX
          add_env UK_AQ_LATEST_SNAPSHOT_RUN_REPORTS_ENABLED
          add_env UK_AQ_LATEST_SNAPSHOT_STATE_PREFIX
          add_env UK_AQ_LATEST_SNAPSHOT_CORE_METADATA_PREFIX
          add_env UK_AQ_LATEST_SNAPSHOT_METADATA_REFRESH_SECONDS
          add_env UK_AQ_LATEST_SNAPSHOT_PUBSUB_SUBSCRIPTION
          add_env UK_AQ_LATEST_SNAPSHOT_JOB_TIMEOUT_MS
          add_env UK_AQ_SERVICE_EGRESS_METRICS_ENABLED
          add_env UK_AQ_SERVICE_EGRESS_METRICS_SUPABASE_URL
          add_env UK_AQ_SERVICE_EGRESS_METRICS_SCHEMA
          add_env UK_AQ_SERVICE_EGRESS_METRICS_RPC
          add_env UK_AQ_SERVICE_EGRESS_ENV
          add_env UK_AQ_SERVICE_EGRESS_PROJECT_REF
          add_env CFLARE_R2_ENDPOINT
          add_env CFLARE_R2_BUCKET
          add_env CFLARE_R2_REGION
          env_updates+=("GCP_PROJECT_ID=${PROJECT_ID}")

          secret_updates=()
          add_secret_binding "UK_AQ_SERVICE_EGRESS_METRICS_SB_SECRET_KEY" "${UK_AQ_SERVICE_EGRESS_METRICS_SB_SECRET_KEY_SECRET_NAME}" 0
          add_secret_binding "CFLARE_R2_ACCESS_KEY_ID" "${CFLARE_R2_ACCESS_KEY_ID_SECRET_NAME}" 1
          add_secret_binding "CFLARE_R2_SECRET_ACCESS_KEY" "${CFLARE_R2_SECRET_ACCESS_KEY_SECRET_NAME}" 1

          env_file="${RUNNER_TEMP}/uk-aq-latest-snapshot-env.yaml"
          : > "${env_file}"
          for kv in "${env_updates[@]}"; do
            key="${kv%%=*}"
            value="${kv#*=}"
            python3 -c 'import json,sys; f=open(sys.argv[1], "a", encoding="utf-8"); print(f"{sys.argv[2]}: {json.dumps(sys.argv[3])}", file=f); f.close()' \
              "${env_file}" "${key}" "${value}"
          done

          secret_csv="$(IFS=,; echo "${secret_updates[*]}")"
          echo "env_file=${env_file}" >> "${GITHUB_OUTPUT}"
          echo "secret_csv=${secret_csv}" >> "${GITHUB_OUTPUT}"

      - name: Deploy Cloud Run service
        run: |
          set -euo pipefail
          ENV_FILE='${{ steps.cloudrun_args.outputs.env_file }}'
          SECRET_CSV='${{ steps.cloudrun_args.outputs.secret_csv }}'

          CMD=(
            gcloud run deploy "${SERVICE_NAME}"
            --region "${REGION}"
            --image "${{ steps.build.outputs.image }}"
            --service-account "${LATEST_SNAPSHOT_SERVICE_ACCOUNT}"
            --timeout "${SERVICE_TIMEOUT_SECONDS}"
            --cpu "${SERVICE_CPU}"
            --memory "${SERVICE_MEMORY}"
            --concurrency "${SERVICE_CONCURRENCY}"
            --max-instances "${SERVICE_MAX_INSTANCES}"
            --min-instances "${SERVICE_MIN_INSTANCES}"
            --no-cpu-boost
            --cpu-throttling
            --labels "job_name=${RESOURCE_LABEL}"
            --no-allow-unauthenticated
          )
          if [ -n "${ENV_FILE}" ]; then
            CMD+=(--env-vars-file "${ENV_FILE}")
          fi
          if [ -n "${SECRET_CSV}" ]; then
            CMD+=(--set-secrets "${SECRET_CSV}")
          fi
          "${CMD[@]}"

      - name: Verify service labels
        run: |
          set -euo pipefail
          labels_json="$(gcloud run services describe "${SERVICE_NAME}" --region "${REGION}" --format="json(metadata.labels)")"
          job_name_label="$(
            python3 -c 'import json,sys; print(((json.loads(sys.stdin.read()) or {}).get("metadata", {}) or {}).get("labels", {}).get("job_name", ""))' <<<"${labels_json}"
          )"
          if [ "${job_name_label}" != "${RESOURCE_LABEL}" ]; then
            echo "job_name label mismatch: expected ${RESOURCE_LABEL}, got ${job_name_label:-<missing>}"
            exit 1
          fi
          echo "Verified label job_name=${job_name_label}"

      - name: Ensure Cloud Scheduler trigger exists
        run: |
          set -euo pipefail

          enabled="$(printf '%s' "${SCHEDULER_ENABLED}" | tr '[:upper:]' '[:lower:]')"
          if [ "${enabled}" != "true" ] && [ "${enabled}" != "1" ] && [ "${enabled}" != "yes" ]; then
            if gcloud scheduler jobs describe "${SCHEDULER_JOB_NAME}" --location "${REGION}" >/dev/null 2>&1; then
              gcloud scheduler jobs pause "${SCHEDULER_JOB_NAME}" --location "${REGION}" || true
              echo "Paused existing scheduler job ${SCHEDULER_JOB_NAME} (SCHEDULER_ENABLED=${SCHEDULER_ENABLED})."
            else
              echo "Scheduler job ${SCHEDULER_JOB_NAME} not found; nothing to pause."
            fi
            exit 0
          fi

          scheduler_sa="${SCHEDULER_SERVICE_ACCOUNT:-${LATEST_SNAPSHOT_SERVICE_ACCOUNT}}"
          service_uri="$(gcloud run services describe "${SERVICE_NAME}" --region "${REGION}" --format='value(status.url)')"
          scheduler_body='{"trigger_mode":"scheduler"}'

          gcloud run services add-iam-policy-binding "${SERVICE_NAME}" \
            --region "${REGION}" \
            --member "serviceAccount:${scheduler_sa}" \
            --role "roles/run.invoker" >/dev/null

          if gcloud scheduler jobs describe "${SCHEDULER_JOB_NAME}" --location "${REGION}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "${SCHEDULER_JOB_NAME}" \
              --location "${REGION}" \
              --schedule "${SCHEDULER_CRON}" \
              --time-zone "${SCHEDULER_TIMEZONE}" \
              --uri "${service_uri}" \
              --http-method POST \
              --update-headers "Content-Type=application/json" \
              --message-body "${scheduler_body}" \
              --oidc-service-account-email "${scheduler_sa}" \
              --oidc-token-audience "${service_uri}" \
              --max-retry-attempts "${SCHEDULER_MAX_RETRY_ATTEMPTS}"
            echo "Updated Cloud Scheduler job: ${SCHEDULER_JOB_NAME}"
          else
            gcloud scheduler jobs create http "${SCHEDULER_JOB_NAME}" \
              --location "${REGION}" \
              --schedule "${SCHEDULER_CRON}" \
              --time-zone "${SCHEDULER_TIMEZONE}" \
              --uri "${service_uri}" \
              --http-method POST \
              --headers "Content-Type=application/json" \
              --message-body "${scheduler_body}" \
              --oidc-service-account-email "${scheduler_sa}" \
              --oidc-token-audience "${service_uri}" \
              --max-retry-attempts "${SCHEDULER_MAX_RETRY_ATTEMPTS}"
            echo "Created Cloud Scheduler job: ${SCHEDULER_JOB_NAME}"
          fi

      - name: Show deployed service
        run: |
          gcloud run services describe "${SERVICE_NAME}" \
            --region "${REGION}" \
            --format="yaml(metadata.name,metadata.labels,spec.template.spec.serviceAccountName,spec.template.spec.containerConcurrency,spec.template.spec.containers[0].image,spec.template.spec.containers[0].resources,status.url)"
