name: Deploy uk_aq_observs_history_r2_api Worker

on:
  push:
    branches:
      - main
    paths:
      - "workers/uk_aq_observs_history_r2_api_worker/**"
      - ".github/workflows/uk_aq_observs_history_r2_api_worker_deploy.yml"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    env:
      UK_AQ_OBSERVS_HISTORY_R2_API_WORKER_NAME: ${{ vars.UK_AQ_OBSERVS_HISTORY_R2_API_WORKER_NAME || 'uk-aq-observs-history-r2-api' }}
      UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID: ${{ vars.UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID || '' }}
      UK_AQ_R2_CLOUDFLARE_API_TOKEN: ${{ secrets.UK_AQ_R2_CLOUDFLARE_API_TOKEN || '' }}
      CFLARE_R2_BUCKET: ${{ vars.CFLARE_R2_BUCKET || '' }}
      UK_AQ_R2_HISTORY_VERSION: ${{ vars.UK_AQ_R2_HISTORY_VERSION || '' }}
      UK_AQ_R2_HISTORY_V2_OBSERVATIONS_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_OBSERVATIONS_PREFIX || 'history/v2/observations' }}
      UK_AQ_R2_HISTORY_INDEX_V2_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_INDEX_V2_PREFIX || 'history/_index_v2' }}
      UK_AQ_R2_HISTORY_V2_OBSERVATIONS_TIMESERIES_INDEX_PREFIX: ${{ vars.UK_AQ_R2_HISTORY_V2_OBSERVATIONS_TIMESERIES_INDEX_PREFIX || 'history/_index_v2/observations_timeseries' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Validate Cloudflare credentials
        run: |
          set -euo pipefail
          if [ -z "${UK_AQ_R2_CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing secret UK_AQ_R2_CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          if [ -z "${UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "Missing variable UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
          if [ -z "${CFLARE_R2_BUCKET}" ]; then
            echo "Missing variable CFLARE_R2_BUCKET."
            exit 1
          fi
          case "${UK_AQ_R2_HISTORY_VERSION}" in
            v1|v2) ;;
            "")
              echo "Missing GitHub variable UK_AQ_R2_HISTORY_VERSION."
              exit 1
              ;;
            *)
              echo "Invalid UK_AQ_R2_HISTORY_VERSION=${UK_AQ_R2_HISTORY_VERSION}; expected v1 or v2."
              exit 1
              ;;
          esac

      - name: Substitute wrangler.toml placeholders
        run: |
          set -euo pipefail
          sed -i "s|__CFLARE_R2_BUCKET__|${CFLARE_R2_BUCKET}|g" workers/uk_aq_observs_history_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_R2_HISTORY_VERSION__|${UK_AQ_R2_HISTORY_VERSION}|g" workers/uk_aq_observs_history_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_R2_HISTORY_V2_OBSERVATIONS_PREFIX__|${UK_AQ_R2_HISTORY_V2_OBSERVATIONS_PREFIX}|g" workers/uk_aq_observs_history_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_R2_HISTORY_INDEX_V2_PREFIX__|${UK_AQ_R2_HISTORY_INDEX_V2_PREFIX}|g" workers/uk_aq_observs_history_r2_api_worker/wrangler.toml
          sed -i "s|__UK_AQ_R2_HISTORY_V2_OBSERVATIONS_TIMESERIES_INDEX_PREFIX__|${UK_AQ_R2_HISTORY_V2_OBSERVATIONS_TIMESERIES_INDEX_PREFIX}|g" workers/uk_aq_observs_history_r2_api_worker/wrangler.toml

      - name: Set Worker secrets
        working-directory: workers/uk_aq_observs_history_r2_api_worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.UK_AQ_R2_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          secrets_json="$(jq -n \
            --arg UK_AQ_EDGE_UPSTREAM_SECRET "${{ secrets.UK_AQ_EDGE_UPSTREAM_SECRET }}" \
            '{UK_AQ_EDGE_UPSTREAM_SECRET: $UK_AQ_EDGE_UPSTREAM_SECRET} | with_entries(select(.value != ""))')"
          if [ "$(printf '%s' "$secrets_json" | jq 'length')" -gt 0 ]; then
            printf "%s" "$secrets_json" | npx --yes wrangler@4 secret bulk --name "${UK_AQ_OBSERVS_HISTORY_R2_API_WORKER_NAME}"
          else
            echo "No Worker secrets to set."
          fi

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65
        with:
          apiToken: ${{ env.UK_AQ_R2_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.UK_AQ_R2_CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/uk_aq_observs_history_r2_api_worker
          command: deploy --name ${{ env.UK_AQ_OBSERVS_HISTORY_R2_API_WORKER_NAME }}
