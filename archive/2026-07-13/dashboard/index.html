      function renderDispatchPanel(runs) {
        const filteredRuns = (Array.isArray(runs) ? runs : []).filter((run) => {
          const connectorCode = String((run && run.connector_code) || "").toLowerCase();
          if (dispatchConnectorFilter !== "all" && connectorCode !== dispatchConnectorFilter) {
            return false;
          }
          if (dispatchLookbackMinutes <= 0) {
            return true;
          }
          const timestamp = run.run_timestamp || run.run_ended_at || run.run_started_at;
          if (!timestamp) {
            return false;
          }
          const runMs = new Date(timestamp).getTime();
          if (Number.isNaN(runMs)) {
            return false;
          }
          const cutoffMs = Date.now() - dispatchLookbackMinutes * 60 * 1000;
          return runMs >= cutoffMs;
        });

        const panel = document.createElement("section");
        panel.className = "panel";
        panel.innerHTML = `
          <h2 class="panel-heading">
            <span>Dispatcher Feed</span>
            <div class="dispatch-filters">
              <label class="dispatch-filter" for="dispatch-connector-filter">
                Connector
                <select id="dispatch-connector-filter">
                  ${DISPATCH_CONNECTOR_OPTIONS
                    .map((opt) => `<option value="${opt.value}" ${opt.value === dispatchConnectorFilter ? "selected" : ""}>${opt.label}</option>`)
                    .join("")}
                </select>
              </label>
              <label class="dispatch-filter" for="dispatch-lookback-filter">
                Lookback
                <select id="dispatch-lookback-filter">
                  ${DISPATCH_LOOKBACK_OPTIONS
                    .map((opt) => `<option value="${opt.value}" ${opt.value === dispatchLookbackMinutes ? "selected" : ""}>${opt.label}</option>`)
                    .join("")}
                </select>
              </label>
            </div>
          </h2>
          <table class="dispatch-table">
            <thead>
              <tr>
                <th>Connector</th>
                <th>Status</th>
                <th>Duration</th>
                <th>Updated</th>
                <th>Last observed</th>
                <th>Stations</th>
                <th>Observations</th>
                <th>Series</th>
              </tr>
            </thead>
            <tbody>
              ${filteredRuns.length
                ? filteredRuns
                .map((run) => {
                  const status = statusMeta(run);
                  const timestamp = run.run_timestamp || run.run_ended_at || run.run_started_at;
                  const minutes = formatMinutes(run.in_flight_minutes);
                  const durationMinutes = calcDurationMinutes(run);
                  const duration = durationMinutes === null ? null : formatDurationSeconds(durationMinutes * 60);
                  const runtimeBadge = minutes
                    ? `<span class="runtime-pill ${
                        Number(run.in_flight_minutes) >= 5 ? "overdue" : ""
                      }">${minutes}</span>`
                    : "";
                  return `
                    <tr>
                      <td class="connector-name">${run.connector_label || run.connector_code || "Unknown"}</td>
                      <td>
                        <div class="status-stack">
                          <span class="status-pill ${status.className}">${status.label}${status.detail ? `<br><span class="status-detail">${status.detail}</span>` : ""}</span>
                          ${runtimeBadge}
                        </div>
                      </td>
                      <td>${duration || "n/a"}</td>
                      <td>${formatTime(timestamp)}</td>
                      <td>${formatTime(run.last_observed_at)}</td>
                      <td>${formatStations(run)}</td>
                      <td>${formatObservations(run)}</td>
                      <td>${formatSeries(run)}</td>
                    </tr>
                  `;
                })
                .join("")
                : `<tr><td colspan="8">No runs found for selected filters.</td></tr>`}
            </tbody>
          </table>
          <div class="footnote">Ordered by most recent run end time. Filters persist across refresh. Times in UTC.</div>
        `;

        const connectorSelect = panel.querySelector("#dispatch-connector-filter");
        if (connectorSelect) {
          connectorSelect.addEventListener("change", (event) => {
            const nextValue = String(event.target.value || "all");
            if (!DISPATCH_CONNECTOR_OPTIONS.some((opt) => opt.value === nextValue)) {
              return;
            }
            dispatchConnectorFilter = nextValue;
            try {
              localStorage.setItem(DISPATCH_CONNECTOR_STORAGE_KEY, dispatchConnectorFilter);
            } catch (_err) {
              // Ignore storage write issues.
            }
            loadDashboard();
          });
        }
        const lookbackSelect = panel.querySelector("#dispatch-lookback-filter");
        if (lookbackSelect) {
          lookbackSelect.addEventListener("change", (event) => {
            const nextMinutes = Number(event.target.value);
            if (
              !Number.isFinite(nextMinutes) ||
              !DISPATCH_LOOKBACK_OPTIONS.some((opt) => opt.value === nextMinutes)
            ) {
              return;
            }
            dispatchLookbackMinutes = nextMinutes;
            try {
              localStorage.setItem(DISPATCH_LOOKBACK_STORAGE_KEY, String(dispatchLookbackMinutes));
            } catch (_err) {
              // Ignore storage write issues.
            }
            loadDashboard();
          });
        }

        return panel;
      }

      function buildDbPath(points, key, xFor, yFor) {
        let path = "";
        let started = false;
        points.forEach((point) => {
          const value = point[key];
          if (value === null || value === undefined || Number.isNaN(Number(value))) {
            return;
          }
          const command = started ? "L" : "M";
          path += `${command}${xFor(point.ms).toFixed(2)},${yFor(Number(value)).toFixed(2)} `;
          started = true;
        });
        return path.trim();
      }

      function getSingleSeriesPoint(points, key) {
        const valid = points.filter((point) => {
          const value = point[key];
          return value !== null && value !== undefined && !Number.isNaN(Number(value));
        });
        return valid.length === 1 ? valid[0] : null;
      }

      function computeAxisMax(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric) || numeric <= 0) {
          return 1;
        }
        const magnitude = 10 ** Math.floor(Math.log10(numeric));
        const normalized = numeric / magnitude;
        const niceSteps = [1, 2, 2.5, 5, 10];
        const step = niceSteps.find((candidate) => candidate >= normalized) || 10;
        return Math.max(1, step * magnitude);
      }

      function buildYAxisTicks(axisMax, tickCount = 5) {
        const ticks = [];
        const maxValue = Math.max(1, Number(axisMax) || 1);
        for (let idx = 0; idx <= tickCount; idx += 1) {
          ticks.push((maxValue / tickCount) * idx);
        }
        return ticks;
      }

      function buildStackedAreaPath(points, key, priorKeys, xFor, yFor) {
        if (!Array.isArray(points) || points.length === 0) {
          return "";
        }
        const topPoints = points.map((point) => {
          const priorSum = priorKeys.reduce((sum, priorKey) => sum + Number(point[priorKey] || 0), 0);
          const value = Number(point[key] || 0);
          return {
            x: xFor(point.ms),
            top: yFor(priorSum + value),
            bottom: yFor(priorSum),
          };
        });
        const hasVisible = topPoints.some((point) => Math.abs(point.top - point.bottom) > 0.1);
        if (!hasVisible) {
          return "";
        }
        const upper = topPoints
          .map((point, index) => `${index === 0 ? "M" : "L"}${point.x.toFixed(2)},${point.top.toFixed(2)}`)
          .join(" ");
        const lower = [...topPoints]
          .reverse()
          .map((point) => `L${point.x.toFixed(2)},${point.bottom.toFixed(2)}`)
          .join(" ");
        return `${upper} ${lower} Z`;
      }

      function buildStackedMetricPoints(rows, dimensionKey, allowedKeys, cutoffMs) {
        const allowed = new Set(allowedKeys);
        const pointMap = new Map();
        (Array.isArray(rows) ? rows : []).forEach((row) => {
          const key = String((row && row[dimensionKey]) || "").toLowerCase().trim();
          if (!allowed.has(key)) {
            return;
          }
          const timestamp = (row && (row.bucket_hour || row.recorded_at)) || null;
          const ms = new Date(timestamp || "").getTime();
          if (Number.isNaN(ms) || ms < cutoffMs) {
            return;
          }
          const sizeBytes = asNumber(row && row.size_bytes);
          if (sizeBytes === null || sizeBytes < 0) {
            return;
          }
          const bucketKey = String(ms);
          const point = pointMap.get(bucketKey) || { ms };
          allowedKeys.forEach((seriesKey) => {
            if (point[seriesKey] === undefined) {
              point[seriesKey] = 0;
            }
          });
          point[key] = sizeBytes / 1000000;
          pointMap.set(bucketKey, point);
        });
        return Array.from(pointMap.values())
          .sort((a, b) => a.ms - b.ms)
          .map((point) => {
            const normalized = { ms: point.ms };
            allowedKeys.forEach((seriesKey) => {
              const value = asNumber(point[seriesKey]);
              normalized[seriesKey] = value === null ? 0 : Math.max(0, value);
            });
            return normalized;
          });
      }

      function buildStackedTooltipTargets(points, seriesDefs, xFor, chartLeft, chartRight, chartTop, chartBottom) {
        if (!Array.isArray(points) || points.length === 0 || !Array.isArray(seriesDefs) || !seriesDefs.length) {
          return "";
        }
        const xPositions = points.map((point) => xFor(point.ms));
        const hitHeight = Math.max(0, chartBottom - chartTop);
        return points
          .map((point, index) => {
            const currentX = xPositions[index];
            const leftBound = index === 0 ? chartLeft : (xPositions[index - 1] + currentX) / 2;
            const rightBound = index === points.length - 1
              ? chartRight
              : (currentX + xPositions[index + 1]) / 2;
            const width = Math.max(1, rightBound - leftBound);
            const bucketLabel = formatTime(point.ms);
            const seriesPayload = seriesDefs.map((series) => {
              const value = Number(point[series.key] || 0);
              return {
                label: series.label,
                size: `${formatMegabytes(value)} MB`,
                value_mb: value,
              };
            });
            return `
              <rect
                class="db-size-stacked-tooltip-hit"
                x="${leftBound.toFixed(2)}"
                y="${chartTop.toFixed(2)}"
                width="${width.toFixed(2)}"
                height="${hitHeight.toFixed(2)}"
                fill="#000000"
                fill-opacity="0.001"
                stroke="none"
                pointer-events="all"
                data-bucket="${escapeHtml(bucketLabel)}"
                data-series-json="${escapeHtml(encodeURIComponent(JSON.stringify(seriesPayload)))}"
              />
            `;
          })
          .join("");
      }

      function buildDbTooltipTargets(points, key, label, color, xFor, yFor) {
        return points
          .map((point) => {
            const value = point[key];
            if (value === null || value === undefined || Number.isNaN(Number(value))) {
              return "";
            }
            const bucketLabel = formatTime(point.ms);
            const sizeLabel = `${formatMegabytes(Number(value))} MB`;
            const oldestKey = `${key}_oldest_observed_at`;
            const oldestDayLabel = formatDbOldestDayLabel(point[oldestKey] || null);
            return `
              <circle
                class="db-size-tooltip-hit"
                cx="${xFor(point.ms).toFixed(2)}"
                cy="${yFor(Number(value)).toFixed(2)}"
                r="7"
                fill="${color}"
                fill-opacity="0.001"
                stroke="none"
                pointer-events="all"
                data-label="${escapeHtml(label)}"
                data-bucket="${escapeHtml(bucketLabel)}"
                data-size="${escapeHtml(sizeLabel)}"
                data-oldest-day="${escapeHtml(oldestDayLabel)}"
              />
            `;
          })
          .join("");
      }

      function bindDbSizeTooltips(panel) {
        const chartWrap = panel.querySelector(".db-size-chart-wrap");
        const tooltip = panel.querySelector(".db-size-hover-tooltip");
        const targets = panel.querySelectorAll(".db-size-tooltip-hit");
        if (!chartWrap || !tooltip || targets.length === 0) {
          return;
        }

        function positionTooltip(clientX, clientY) {
          const wrapRect = chartWrap.getBoundingClientRect();
          const localY = clientY - wrapRect.top;
          const halfWidth = Math.max(30, tooltip.offsetWidth / 2 + 8);
          const x = Math.max(halfWidth, Math.min(wrapRect.width - halfWidth, clientX - wrapRect.left));
          const tooltipHeight = Math.max(20, tooltip.offsetHeight);
          const y = Math.max(8, Math.min(wrapRect.height - tooltipHeight - 8, localY + 10));
          tooltip.style.left = `${x}px`;
          tooltip.style.top = `${y}px`;
        }

        function showTooltip(event) {
          const target = event.currentTarget;
          const label = target.getAttribute("data-label") || "";
          const bucket = target.getAttribute("data-bucket") || "";
          const size = target.getAttribute("data-size") || "";
          const oldestDay = target.getAttribute("data-oldest-day") || ">=--/--/----";
          tooltip.innerHTML = `
            <div>${escapeHtml(label)}</div>
            <div>Bucket: ${escapeHtml(bucket)}</div>
            <div>DB size: ${escapeHtml(size)}</div>
            <div>Oldest day: ${escapeHtml(oldestDay)}</div>
          `;
          tooltip.classList.add("visible");
          positionTooltip(event.clientX, event.clientY);
        }

        function moveTooltip(event) {
          if (!tooltip.classList.contains("visible")) {
            return;
          }
          positionTooltip(event.clientX, event.clientY);
        }

        function hideTooltip() {
          tooltip.classList.remove("visible");
        }

        targets.forEach((target) => {
          target.addEventListener("mouseenter", showTooltip);
          target.addEventListener("mousemove", moveTooltip);
          target.addEventListener("mouseleave", hideTooltip);
        });
        chartWrap.addEventListener("mouseleave", hideTooltip);
      }

      function bindStackedDbSizeTooltips(panel) {
        const chartWraps = panel.querySelectorAll(".db-size-subchart .db-size-chart-wrap");
        chartWraps.forEach((chartWrap) => {
          const tooltip = chartWrap.querySelector(".db-size-hover-tooltip");
          const targets = chartWrap.querySelectorAll(".db-size-stacked-tooltip-hit");
          if (!tooltip || targets.length === 0) {
            return;
          }

          function positionTooltip(clientX, clientY) {
            const wrapRect = chartWrap.getBoundingClientRect();
            const localY = clientY - wrapRect.top;
            const halfWidth = Math.max(30, tooltip.offsetWidth / 2 + 8);
            const x = Math.max(halfWidth, Math.min(wrapRect.width - halfWidth, clientX - wrapRect.left));
            const tooltipHeight = Math.max(20, tooltip.offsetHeight);
            const y = Math.max(8, Math.min(wrapRect.height - tooltipHeight - 8, localY + 10));
            tooltip.style.left = `${x}px`;
            tooltip.style.top = `${y}px`;
          }

          function showTooltip(event) {
            const target = event.currentTarget;
            const bucket = target.getAttribute("data-bucket") || "";
            const encoded = target.getAttribute("data-series-json") || "";
            let rows = [];
            try {
              const parsed = JSON.parse(decodeURIComponent(encoded));
              if (Array.isArray(parsed)) {
                rows = parsed;
              }
            } catch (_err) {
              rows = [];
            }
            const rowMarkup = rows
              .map((row) => {
                const label = row && row.label ? String(row.label) : "series";
                const size = row && row.size ? String(row.size) : "0 MB";
                return `<div>${escapeHtml(label)}: ${escapeHtml(size)}</div>`;
              })
              .join("");
            const totalMb = rows.reduce((sum, row) => {
              const value = Number(row && row.value_mb);
              if (!Number.isFinite(value)) {
                return sum;
              }
              return sum + value;
            }, 0);
            tooltip.innerHTML = `<div>Bucket: ${escapeHtml(bucket)}</div>${rowMarkup}<div>Total: ${escapeHtml(`${formatMegabytes(totalMb)} MB`)}</div>`;
            tooltip.classList.add("visible");
            positionTooltip(event.clientX, event.clientY);
          }

          function moveTooltip(event) {
            if (!tooltip.classList.contains("visible")) {
              return;
            }
            positionTooltip(event.clientX, event.clientY);
          }

          function hideTooltip() {
            tooltip.classList.remove("visible");
          }

          targets.forEach((target) => {
            target.addEventListener("mouseenter", showTooltip);
            target.addEventListener("mousemove", moveTooltip);
            target.addEventListener("mouseleave", hideTooltip);
          });
          chartWrap.addEventListener("mouseleave", hideTooltip);
        });
      }

      async function refreshR2MetricsOnly() {
        if (activeMode !== "operations") {
          return;
        }
        if (!latestDashboardData) {
          return;
        }
        setError("");
        setStatus("Refreshing R2 metrics...");
        try {
          const params = new URLSearchParams();
          params.set("force", "1");
          params.set("t", String(Date.now()));
          const resp = await fetch(buildApiUrl("r2_metrics", params));
          const text = await resp.text();
          let payload = null;
          try {
            payload = JSON.parse(text);
          } catch (_err) {
            payload = null;
          }
          if (!resp.ok) {
            const message = buildResponseErrorMessage(resp, payload, text);
            throw new Error(message);
          }
          latestDashboardData.r2_usage = payload ? payload.r2_usage : null;
          latestDashboardData.r2_usage_error = payload ? payload.r2_usage_error : null;
          latestDashboardData.r2_backup_window = payload ? payload.r2_backup_window : null;
          latestDashboardData.r2_backup_window_error = payload ? payload.r2_backup_window_error : null;
          const nextPanel = renderDbSizePanel(
            latestDashboardData.db_size_metrics,
            latestDashboardData.db_size_metrics_error,
            latestDashboardData.schema_size_metrics,
            latestDashboardData.schema_size_metrics_error,
            latestDashboardData.r2_domain_size_metrics,
            latestDashboardData.r2_domain_size_metrics_error,
            latestDashboardData.r2_usage,
            latestDashboardData.r2_usage_error,
            latestDashboardData.r2_backup_window,
            latestDashboardData.r2_backup_window_error,
          );
          const operationsContainer = getModeContainer("operations");
          const currentPanel = operationsContainer
            ? operationsContainer.querySelector('[data-panel="db-size"]')
            : null;
          if (currentPanel) {
            currentPanel.replaceWith(nextPanel);
          } else if (operationsContainer) {
            operationsContainer.appendChild(nextPanel);
          }
          const generatedAt = (payload && payload.generated_at) || new Date().toISOString();
          setStatus(`R2 metrics refreshed ${formatDateTimeLocalWithTimezone(generatedAt)}`);
        } catch (err) {
          setError(err.message || String(err));
          setStatus("Error");
        }
      }

      function renderDbSizePanel(
        dbRows,
        dbSourceError,
        schemaRows,
        schemaSourceError,
        r2DomainRows,
        r2DomainSourceError,
        r2Usage,
        r2Error,
        r2BackupWindow,
        r2BackupWindowError,
      ) {
        const panel = document.createElement("section");
        panel.className = "panel";
        panel.dataset.panel = "db-size";

        const cutoffMs = Date.now() - dbSizePeriodHours * 60 * 60 * 1000;
        const pointMap = new Map();
        const oldestByLabel = new Map();
        (Array.isArray(dbRows) ? dbRows : []).forEach((row) => {
          let label = String((row && row.database_label) || "").toLowerCase().trim();
          if (label === "obs_aqidb") {
            label = "obs_aqidb";
          }
          if (label !== "ingestdb" && label !== "obs_aqidb") {
            return;
          }
          const sampleTimestamp = row.recorded_at || row.bucket_hour;
          const sampleMs = new Date(sampleTimestamp).getTime();
          const oldestObservedAt = row.oldest_observed_at;
          const oldestMs = new Date(oldestObservedAt || "").getTime();
          if (!Number.isNaN(sampleMs) && !Number.isNaN(oldestMs)) {
            const currentOldest = oldestByLabel.get(label);
            if (!currentOldest || sampleMs >= currentOldest.sampleMs) {
              oldestByLabel.set(label, {
                sampleMs,
                oldestObservedAt,
              });
            }
          }
          const timestamp = row.bucket_hour || row.recorded_at;
          const ms = new Date(timestamp).getTime();
          if (Number.isNaN(ms) || ms < cutoffMs) {
            return;
          }
          const sizeBytes = asNumber(row.size_bytes);
          if (sizeBytes === null || sizeBytes < 0) {
            return;
          }
          const key = String(ms);
          const point = pointMap.get(key) || { ms, ingestdb: null, obs_aqidb: null };
          point[label] = sizeBytes / 1000000;
          point[`${label}_oldest_observed_at`] = oldestObservedAt || null;
          pointMap.set(key, point);
        });

        const schemaOldestByName = new Map();
        (Array.isArray(schemaRows) ? schemaRows : []).forEach((row) => {
          const schemaName = String((row && row.schema_name) || "").toLowerCase();
          if (schemaName !== "uk_aq_observs" && schemaName !== "uk_aq_aqilevels") {
            return;
          }
          const sampleTimestamp = (row && (row.recorded_at || row.bucket_hour)) || null;
          const sampleMs = new Date(sampleTimestamp || "").getTime();
          const oldestObservedAt = row && row.oldest_observed_at;
          const oldestMs = new Date(oldestObservedAt || "").getTime();
          if (Number.isNaN(sampleMs) || Number.isNaN(oldestMs)) {
            return;
          }
          const current = schemaOldestByName.get(schemaName);
          if (!current || sampleMs >= current.sampleMs) {
            schemaOldestByName.set(schemaName, {
              sampleMs,
              oldestObservedAt,
            });
          }
        });
        const observsOldestDayLabel = formatDbOldestDayLabel(
          (schemaOldestByName.get("uk_aq_observs") || {}).oldestObservedAt,
        );
        const aqilevelsOldestDayLabel = formatDbOldestDayLabel(
          (schemaOldestByName.get("uk_aq_aqilevels") || {}).oldestObservedAt,
        );
        const ingestOldestDayLabel = formatDbOldestDayLabel(
          (oldestByLabel.get("ingestdb") || {}).oldestObservedAt,
        );

        const points = Array.from(pointMap.values()).sort((a, b) => a.ms - b.ms);
        const maxObservedMb = points.reduce((max, point) => {
          const ingest = point.ingestdb === null ? 0 : Number(point.ingestdb);
          const obsAqi = point.obs_aqidb === null ? 0 : Number(point.obs_aqidb);
          return Math.max(max, ingest, obsAqi);
        }, 0);
        const yAxisMaxMb = DB_LINE_CHART_Y_MAX_MB;

        let chartMarkup = `<div class="db-size-empty">No DB size samples in the selected period.</div>`;
        if (points.length > 0) {
          const width = 960;
          const height = 300;
          const margin = { top: 16, right: 18, bottom: 36, left: 56 };
          const innerWidth = width - margin.left - margin.right;
          const innerHeight = height - margin.top - margin.bottom;

          const minX = points[0].ms;
          const maxX = points[points.length - 1].ms;
          const spanX = Math.max(1, maxX - minX);
          const xFor = (ms) => margin.left + ((ms - minX) / spanX) * innerWidth;
          const yFor = (valueMb) => {
            const capped = Math.max(0, Math.min(yAxisMaxMb, Number(valueMb)));
            return margin.top + (1 - capped / yAxisMaxMb) * innerHeight;
          };

          const yTicks = buildYAxisTicks(yAxisMaxMb, 5);
          const xTicks = [minX, minX + spanX / 2, maxX];

          const ingestPath = buildDbPath(points, "ingestdb", xFor, yFor);
          const obsAqiPath = buildDbPath(points, "obs_aqidb", xFor, yFor);
          const ingestSinglePoint = getSingleSeriesPoint(points, "ingestdb");
          const obsAqiSinglePoint = getSingleSeriesPoint(points, "obs_aqidb");
          const ingestTooltipTargets = buildDbTooltipTargets(
            points,
            "ingestdb",
            "Ingest DB",
            COLOR_INGEST_DB,
            xFor,
            yFor,
          );
          const obsAqiTooltipTargets = buildDbTooltipTargets(
            points,
            "obs_aqidb",
            "Observs & AQI DB",
            COLOR_OBSAQI_OBSERVS,
            xFor,
            yFor,
          );

          chartMarkup = `
            <svg class="db-size-chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMinYMin meet" role="img" aria-label="Ingest and Observs/AQI DB size trend">
              ${yTicks
                .map((tick) => {
                  const y = yFor(tick);
                  return `
                    <line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="#e7dbc7" stroke-width="1" />
                    <text x="${margin.left - 8}" y="${y + 4}" text-anchor="end" fill="#6b6255" font-size="11" font-family="IBM Plex Mono, ui-monospace, monospace">${formatMegabytes(tick)}</text>
                  `;
                })
                .join("")}
              <line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#bfae91" stroke-width="1.3" />
              ${xTicks
                .map((tick, idx) => {
                  const x = xFor(tick);
                  const anchor = idx === 0 ? "start" : idx === xTicks.length - 1 ? "end" : "middle";
                  return `
                    <line x1="${x}" y1="${height - margin.bottom}" x2="${x}" y2="${height - margin.bottom + 5}" stroke="#bfae91" stroke-width="1" />
                    <text x="${x}" y="${height - margin.bottom + 20}" text-anchor="${anchor}" fill="#6b6255" font-size="11" font-family="IBM Plex Mono, ui-monospace, monospace">${formatTime(tick)}</text>
                  `;
                })
                .join("")}
              ${ingestPath ? `<path d="${ingestPath}" fill="none" stroke="${COLOR_INGEST_DB}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" />` : ""}
              ${obsAqiPath ? `<path d="${obsAqiPath}" fill="none" stroke="${COLOR_OBSAQI_OBSERVS}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" />` : ""}
              ${ingestTooltipTargets}
              ${obsAqiTooltipTargets}
              ${ingestSinglePoint ? `<circle cx="${xFor(ingestSinglePoint.ms).toFixed(2)}" cy="${yFor(Number(ingestSinglePoint.ingestdb)).toFixed(2)}" r="3.5" fill="${COLOR_INGEST_DB}" />` : ""}
              ${obsAqiSinglePoint ? `<circle cx="${xFor(obsAqiSinglePoint.ms).toFixed(2)}" cy="${yFor(Number(obsAqiSinglePoint.obs_aqidb)).toFixed(2)}" r="3.5" fill="${COLOR_OBSAQI_OBSERVS}" />` : ""}
            </svg>
          `;
        }

        const maxNote = maxObservedMb > yAxisMaxMb
          ? `Line chart fixed at ${formatMegabytes(yAxisMaxMb)} MB (max observed ${formatMegabytes(maxObservedMb)} MB).`
          : `Line chart fixed at ${formatMegabytes(yAxisMaxMb)} MB.`;

        const renderStackedChart = ({
          title,
          points,
          seriesDefs,
          stackOrderKeys,
          ariaLabel,
          emptyLabel,
          yMaxOverride,
        }) => {
          if (!Array.isArray(points) || points.length === 0) {
            return `
              <div class="db-size-subchart">
                <h3>${escapeHtml(title)}</h3>
                <div class="db-size-chart-wrap">
                  <div class="db-size-empty">${escapeHtml(emptyLabel)}</div>
                </div>
              </div>
            `;
          }

          const width = 960;
          const height = 260;
          const margin = { top: 16, right: 18, bottom: 36, left: 56 };
          const innerWidth = width - margin.left - margin.right;
          const innerHeight = height - margin.top - margin.bottom;
          const minX = points[0].ms;
          const maxX = points[points.length - 1].ms;
          const spanX = Math.max(1, maxX - minX);
          const xFor = (ms) => margin.left + ((ms - minX) / spanX) * innerWidth;
          const maxStack = points.reduce((max, point) => {
            const total = seriesDefs.reduce((sum, series) => sum + Number(point[series.key] || 0), 0);
            return Math.max(max, total);
          }, 0);
          const yMax = yMaxOverride != null ? yMaxOverride : computeAxisMax(maxStack);
          const yFor = (valueMb) => {
            const capped = Math.max(0, Math.min(yMax, Number(valueMb)));
            return margin.top + (1 - capped / yMax) * innerHeight;
          };
          const yTicks = buildYAxisTicks(yMax, 5);
          const xTicks = [minX, minX + spanX / 2, maxX];
          const stackedSeriesDefs = (() => {
            const requestedOrder = Array.isArray(stackOrderKeys) ? stackOrderKeys : [];
            const byKey = new Map(seriesDefs.map((series) => [series.key, series]));
            const used = new Set();
            const ordered = [];
            requestedOrder.forEach((key) => {
              const series = byKey.get(key);
              if (series && !used.has(series.key)) {
                ordered.push(series);
                used.add(series.key);
              }
            });
            seriesDefs.forEach((series) => {
              if (!used.has(series.key)) {
                ordered.push(series);
                used.add(series.key);
              }
            });
            return ordered;
          })();

          const paths = stackedSeriesDefs
            .map((series, index) => {
              const priorKeys = stackedSeriesDefs.slice(0, index).map((entry) => entry.key);
              const path = buildStackedAreaPath(points, series.key, priorKeys, xFor, yFor);
              if (!path) {
                return "";
              }
              return `<path d="${path}" fill="${series.color}" fill-opacity="0.68" stroke="${series.color}" stroke-width="1.1" />`;
            })
            .join("");
          const stackedTooltipTargets = buildStackedTooltipTargets(
            points,
            seriesDefs,
            xFor,
            margin.left,
            width - margin.right,
            margin.top,
            height - margin.bottom,
          );

          return `
            <div class="db-size-subchart">
              <h3>${escapeHtml(title)}</h3>
              <div class="db-size-chart-wrap">
                <svg class="db-size-chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMinYMin meet" role="img" aria-label="${escapeHtml(ariaLabel)}">
                  ${yTicks
                    .map((tick) => {
                      const y = yFor(tick);
                      return `
                        <line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="#e7dbc7" stroke-width="1" />
                        <text x="${margin.left - 8}" y="${y + 4}" text-anchor="end" fill="#6b6255" font-size="11" font-family="IBM Plex Mono, ui-monospace, monospace">${formatMegabytes(tick)}</text>
                      `;
                    })
                    .join("")}
                  <line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#bfae91" stroke-width="1.3" />
                  ${xTicks
                    .map((tick, idx) => {
                      const x = xFor(tick);
                      const anchor = idx === 0 ? "start" : idx === xTicks.length - 1 ? "end" : "middle";
                      return `
                        <line x1="${x}" y1="${height - margin.bottom}" x2="${x}" y2="${height - margin.bottom + 5}" stroke="#bfae91" stroke-width="1" />
                        <text x="${x}" y="${height - margin.bottom + 20}" text-anchor="${anchor}" fill="#6b6255" font-size="11" font-family="IBM Plex Mono, ui-monospace, monospace">${formatTime(tick)}</text>
                      `;
                    })
                    .join("")}
                  ${paths}
                  ${stackedTooltipTargets}
                </svg>
                <div class="db-size-hover-tooltip" aria-hidden="true"></div>
              </div>
              <div class="db-size-sublegend">
                ${seriesDefs
                  .map((series) => `<span class="db-size-item-title"><span class="db-size-swatch" style="background:${series.color}"></span>${escapeHtml(series.label)}</span>`)
                  .join("")}
              </div>
            </div>
          `;
        };

        const schemaPoints = buildStackedMetricPoints(
          schemaRows,
          "schema_name",
          ["uk_aq_observs", "uk_aq_aqilevels"],
          cutoffMs,
        );
        const schemaChartMarkup = renderStackedChart({
          title: "obs_aqidb schema sizes (MB)",
          points: schemaPoints,
          ariaLabel: "obs_aqidb schema size stacked area chart",
          emptyLabel: "No schema size samples in the selected period.",
          seriesDefs: [
            { key: "uk_aq_observs", label: "uk_aq_observs", color: COLOR_OBSAQI_OBSERVS },
            { key: "uk_aq_aqilevels", label: "uk_aq_aqilevels", color: COLOR_OBSAQI_AQILEVELS },
          ],
          stackOrderKeys: ["uk_aq_aqilevels", "uk_aq_observs"],
          yMaxOverride: 500,
        });

        const r2DomainPoints = buildStackedMetricPoints(
          r2DomainRows,
          "domain_name",
          ["observations", "aqilevels"],
          cutoffMs,
        );
        const r2DomainChartMarkup = renderStackedChart({
          title: "R2 History domain sizes (MB)",
          points: r2DomainPoints,
          ariaLabel: "R2 history domain size stacked area chart",
          emptyLabel: "No R2 domain size samples in the selected period.",
          seriesDefs: [
            { key: "observations", label: "observations", color: COLOR_R2_OBSERVS },
            { key: "aqilevels", label: "aqilevels", color: COLOR_R2_AQILEVELS },
          ],
          stackOrderKeys: ["aqilevels", "observations"],
        });

        const r2UsageObject = asObject(r2Usage);
        const r2BackupWindowObject = asObject(r2BackupWindow);
        const backupWindowMin = formatDateDdMmYyyy(
          r2BackupWindowObject ? r2BackupWindowObject.min_day_utc : null,
        ) || "--/--/----";
        const backupWindowMax = formatDateDdMmYyyy(
          r2BackupWindowObject ? r2BackupWindowObject.max_day_utc : null,
        ) || "--/--/----";
        const backupWindowMinDayMs = parseUtcDayMs(
          r2BackupWindowObject ? r2BackupWindowObject.min_day_utc : null,
        );
        const backupWindowMaxDayMs = parseUtcDayMs(
          r2BackupWindowObject ? r2BackupWindowObject.max_day_utc : null,
        );
        const backupWindowDayCountRaw = r2BackupWindowObject
          ? Number(r2BackupWindowObject.day_count)
          : NaN;
        let backupWindowDays = Number.isFinite(backupWindowDayCountRaw)
          ? Math.max(0, Math.trunc(backupWindowDayCountRaw))
          : null;
        let backupWindowYears = null;
        if (backupWindowDays === null) {
          if (
            backupWindowMinDayMs !== null &&
            backupWindowMaxDayMs !== null &&
            backupWindowMaxDayMs >= backupWindowMinDayMs
          ) {
            backupWindowDays = Math.floor(
              (backupWindowMaxDayMs - backupWindowMinDayMs) / (24 * 60 * 60 * 1000),
            ) + 1;
          }
        }
        if (backupWindowDays !== null) {
          backupWindowYears = backupWindowDays / 365.25;
        }
        const backupWindowLabel = `CLOUDFLARE R2 HISTORY WINDOW - ${backupWindowMin} -> ${backupWindowMax} - ${backupWindowDays !== null ? backupWindowDays : "n/a"} Days - ${backupWindowYears !== null ? backupWindowYears.toFixed(1) : "n/a"} Years`;
        const r2LimitsResetLabel = "Limits are per calendar month";
        const r2Rows = [];
        let r2LastUpdate = "n/a";
        const addUsageRow = (title, summaryText, percentValue, subText, subRightText) => {
          const fillPct = Math.min(100, Math.max(0, Number(percentValue)));
          let subMarkup = "";
          if (subText || subRightText) {
            if (subRightText) {
              subMarkup = `
                <div class="r2-usage-sub r2-usage-sub-split">
                  <span>${escapeHtml(subText || "")}</span>
                  <span class="r2-usage-sub-right">${escapeHtml(String(subRightText))}</span>
                </div>
              `;
            } else {
              subMarkup = `<div class="r2-usage-sub">${escapeHtml(subText || "")}</div>`;
            }
          }
          r2Rows.push(`
            <div class="r2-usage-row">
              <div class="r2-usage-head">
                <span>${escapeHtml(title)}</span>
                <span>${escapeHtml(summaryText)}</span>
              </div>
              <div class="r2-usage-bar" role="img" aria-label="${escapeHtml(title)} usage">
                <div class="r2-usage-fill" style="width:${fillPct.toFixed(2)}%"></div>
              </div>
              ${subMarkup}
            </div>
          `);
        };
        const addUnavailableRow = (title, errorText) => {
          const suffix = errorText ? `: ${String(errorText)}` : "";
          r2Rows.push(`
            <div class="r2-usage-row">
              <div class="r2-usage-sub">${escapeHtml(`${title} unavailable${suffix}`)}</div>
            </div>
          `);
        };
        if (r2UsageObject) {
          r2LastUpdate = formatDateTimeLocalWithTimezone(r2UsageObject.as_of_utc);

          const usedGb = asNumber(r2UsageObject.standard_used_gb);
          const usedBytes = asNumber(r2UsageObject.standard_used_bytes);
          const freeTierGb = asNumber(r2UsageObject.free_tier_gb);
          const storagePercent = asNumber(r2UsageObject.percent_of_free_tier);
          const objects = asNumber(r2UsageObject.standard_objects);
          if (usedGb !== null && freeTierGb !== null && storagePercent !== null) {
            addUsageRow(
              "R2 Standard free tier (storage)",

          const classBUsed = asNumber(r2UsageObject.class_b_used_requests);

          if (classBUsed !== null && classBFree !== null && classBPercent !== null) {
            addUsageRow(
              "R2 Class B free tier",
              `${formatCount(classBUsed)} / ${formatCount(classBFree)} (${Math.round(classBPercent)}%)`,
              classBPercent,
              "Read operations",
              r2LimitsResetLabel,
            );
          } else {
            addUnavailableRow("R2 Class B free tier", r2UsageObject.class_ops_error);
          }
        } else {
          addUnavailableRow("R2 usage", r2Error);
        }
        const r2UsageMarkup = `
          <div class="r2-usage-wrap">
            <div class="r2-window-heading">${escapeHtml(backupWindowLabel)}</div>
            ${r2Rows.join("")}
            <div class="r2-usage-meta">
              <div class="r2-usage-sub">R2 Metrics updated every hour. Last update: ${escapeHtml(r2LastUpdate)}</div>
              ${r2BackupWindowError ? `<div class="r2-usage-sub">Backup window source warning: ${escapeHtml(r2BackupWindowError)}</div>` : ""}
              <button class="settings-button r2-refresh-button" id="refresh-r2-metrics" type="button">Refresh R2 metrics</button>
            </div>
          </div>
        `;
        const sourceWarnings = [];
        if (dbSourceError) {
          sourceWarnings.push(`DB metrics source warning: ${dbSourceError}`);
        }
        if (schemaSourceError) {
          sourceWarnings.push(`Schema metrics source warning: ${schemaSourceError}`);
        }
        if (r2DomainSourceError) {
          sourceWarnings.push(`R2 domain metrics source warning: ${r2DomainSourceError}`);
        }
        const sourceWarningMarkup = sourceWarnings
          .map((message) => `<div class="footnote">${escapeHtml(message)}</div>`)
          .join("");

        panel.innerHTML = `
          <h2 class="panel-heading">
            <span>DB Size Trend</span>
            <div class="dispatch-filters">
              <label class="dispatch-filter" for="db-size-period-filter">
                Time period
                <select id="db-size-period-filter">
                  ${DB_SIZE_PERIOD_OPTIONS
                    .map((opt) => `<option value="${opt.value}" ${opt.value === dbSizePeriodHours ? "selected" : ""}>${opt.label}</option>`)
                    .join("")}
                </select>
              </label>
            </div>
          </h2>
          <div class="db-size-legend-row">
            <div class="db-size-legend">
              <span class="db-size-item">
              <span class="db-size-item-title"><span class="db-size-swatch" style="background:${COLOR_INGEST_DB}"></span>Ingest DB</span>
              <span class="db-size-item-min">${escapeHtml(ingestOldestDayLabel)}</span>
            </span>
            <span class="db-size-item">
              <span class="db-size-item-title"><span class="db-size-swatch" style="background:${COLOR_OBSAQI_OBSERVS}"></span>Observs &amp; AQI DB</span>
              <span class="db-size-item-min">uk_aq_observs ${escapeHtml(observsOldestDayLabel)}&nbsp;&nbsp;&nbsp;uk_aq_aqilevels ${escapeHtml(aqilevelsOldestDayLabel)}</span>
            </span>
            </div>
            <strong class="db-size-timezone-note">Times in UTC</strong>
          </div>
          <div class="db-size-chart-wrap">${chartMarkup}<div class="db-size-hover-tooltip" aria-hidden="true"></div></div>
          ${schemaChartMarkup}
          ${r2DomainChartMarkup}
          ${r2UsageMarkup}
          ${sourceWarningMarkup}
        `;

        bindDbSizeTooltips(panel);
        bindStackedDbSizeTooltips(panel);

        const periodSelect = panel.querySelector("#db-size-period-filter");
        if (periodSelect) {
          periodSelect.addEventListener("change", (event) => {
            const nextHours = Number(event.target.value);
            if (
              !Number.isFinite(nextHours) ||
              !DB_SIZE_PERIOD_OPTIONS.some((opt) => opt.value === nextHours)
            ) {
              return;
            }
            dbSizePeriodHours = nextHours;
            try {
              localStorage.setItem(DB_SIZE_PERIOD_STORAGE_KEY, String(dbSizePeriodHours));
            } catch (_err) {
              // Ignore storage write issues.
            }
            loadOperationsDashboard();
          });
        }

        const refreshR2Button = panel.querySelector("#refresh-r2-metrics");
        if (refreshR2Button) {
          refreshR2Button.addEventListener("click", () => {
            refreshR2MetricsOnly();
