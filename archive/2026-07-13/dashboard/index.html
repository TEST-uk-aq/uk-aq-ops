<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UK AQ Dashboard</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-base: #f9f3e7;
        --bg-accent: #f4e3c2;
        --ink: #1f1c16;
        --ink-soft: #4b443a;
        --card: #fffaf1;
        --border: #e4d6be;
        --accent: #d0632c;
        --accent-2: #1f7a7a;
        --accent-3: #87562c;
        --accent-4: #a8b2c1;
        --accent-5: #d8c8a8;
        --shadow: 0 20px 40px rgba(34, 24, 12, 0.12);
        --color-ingest-db: #FE2E2E;
        --color-r2-observs: #F48021;
        --color-r2-aqilevels: #F4C04B;
        --color-obsaqi-observs: #3C82F5;
        --color-obsaqi-aqilevels: #61D836;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 20%, rgba(214, 115, 44, 0.15), transparent 50%),
          radial-gradient(circle at 80% 0%, rgba(31, 122, 122, 0.18), transparent 45%),
          linear-gradient(135deg, var(--bg-base), var(--bg-accent));
        min-height: 100vh;
        padding: 32px 10px calc(112px + env(safe-area-inset-bottom));
      }

      .shell {
        max-width: 100%;
        width: 90vw;
        margin: 0 auto;
        display: grid;
        gap: 24px;
        position: relative;
      }

      header {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px 24px 20px;
        box-shadow: var(--shadow);
        display: grid;
        gap: 16px;
        animation: float-in 0.6s ease both;
      }

      header h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 38px);
        letter-spacing: -0.02em;
      }

      .mode-switch {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mode-switch-btn {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--ink);
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .mode-switch-btn.is-active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
        cursor: default;
      }

      .mode-switch-btn:not(.is-active):hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(34, 24, 12, 0.18);
      }

      .dashboard-page-switcher {
        position: fixed;
        left: 50%;
        bottom: calc(12px + env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 1000;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 250, 241, 0.94);
        box-shadow: 0 8px 28px rgba(34, 24, 12, 0.16);
        backdrop-filter: blur(10px);
      }

      .dashboard-page-switcher__button {
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--ink);
        padding: 8px 14px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      }

      .dashboard-page-switcher__button.is-active {
        background: var(--ink);
        border-color: var(--ink);
        color: #fff;
        cursor: default;
      }

      .dashboard-page-switcher__button:not(.is-active):hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 16px 24px;
        align-items: center;
      }

      .meta-left {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .meta-status {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(31, 122, 122, 0.1);
        color: var(--accent-2);
      }

      .meta-note {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(32, 29, 29, 0.06);
        color: var(--ink-soft);
      }

      .refresh-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        align-items: center;
      }

      .refresh-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .refresh-left {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .refresh-right {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .dropbox-mtime-value {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 14px;
        color: var(--ink);
        word-break: break-word;
      }

      .dropbox-mtime-note {
        margin-top: 8px;
      }

      .refresh-controls span {
        font-weight: 600;
        color: var(--ink-soft);
      }

      .refresh-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .refresh-pill {
        position: relative;
      }

      .refresh-pill input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .refresh-pill label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: #fff;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .refresh-pill input:checked + label {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }

      .refresh-button {
        border: none;
        background: var(--accent);
        color: #fff;
        padding: 8px 14px;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .refresh-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(208, 99, 44, 0.25);
      }

      .grid {
        display: grid;
        gap: 22px;
      }

      .mode-view {
        display: grid;
        gap: 22px;
      }

      .mode-view[hidden] {
        display: none;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px 22px 24px;
        box-shadow: var(--shadow);
        animation: rise-in 0.55s ease both;
      }

      .panel h2 {
        margin: 0 0 14px;
        font-size: 22px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .chip {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(208, 99, 44, 0.12);
        color: var(--accent);
      }

      .panel-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .dispatch-filters {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .dispatch-filter {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--ink-soft);
        font-size: 12px;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
      }

      .dispatch-filter select {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        padding: 6px 9px;
        font-size: 13px;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }

      .db-size-legend-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 10px;
      }

      .db-size-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 0;
        flex: 1 1 520px;
        min-width: 0;
      }

      .db-size-timezone-note {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 12px;
        color: var(--ink-soft);
        margin-left: auto;
        white-space: nowrap;
      }

      .db-size-item {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .db-size-item-title {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .db-size-item-min {
        padding-left: 18px;
        font-size: 11px;
        color: #6b6255;
      }

      .db-size-oldest-row {
        margin: 2px 0 12px;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .db-size-swatch {
        width: 12px;
        height: 12px;
        border-radius: 999px;
      }

      .db-size-chart-wrap {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.68);
        overflow: hidden;
        position: relative;
        min-height: 220px;
      }

      .db-size-chart {
        width: 100%;
        height: auto;
        display: block;
      }

      .db-size-tooltip-hit {
        cursor: pointer;
      }

      .db-size-stacked-tooltip-hit {
        cursor: pointer;
      }

      .db-size-hover-tooltip {
        position: absolute;
        left: 0;
        top: 0;
        transform: translateX(-50%);
        background: rgba(31, 28, 22, 0.94);
        color: #fff;
        border-radius: 10px;
        padding: 7px 9px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 11px;
        line-height: 1.35;
        white-space: nowrap;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        z-index: 4;
      }

      .db-size-hover-tooltip.visible {
        opacity: 1;
        visibility: visible;
      }

      .db-size-hover-tooltip div + div {
        margin-top: 2px;
      }

      .db-size-empty {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-soft);
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 12px;
      }

      .db-size-subchart {
        margin-top: 12px;
      }

      .db-size-subchart h3 {
        margin: 0 0 8px;
        font-size: 13px;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--ink-soft);
      }

      .db-size-sublegend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 8px;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .r2-usage-wrap {
        margin-top: 12px;
        display: grid;
        gap: 10px;
      }

      .r2-window-heading {
        font-weight: 600;
        color: var(--ink-soft);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
      }

      .r2-usage-row {
        display: grid;
        gap: 6px;
      }

      .r2-usage-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .r2-usage-bar {
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.85);
      }

      .r2-usage-fill {
        height: 100%;
        border-radius: 999px;
        background: var(--accent-2);
        transition: width 0.25s ease;
      }

      .r2-usage-sub {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 11px;
        color: var(--ink-soft);
      }

      .r2-usage-sub-split {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .r2-usage-sub-right {
        margin-left: auto;
        text-align: right;
        white-space: nowrap;
      }

      .r2-usage-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex-wrap: wrap;
      }

      .r2-usage-meta .r2-usage-sub {
        margin-right: auto;
      }

      .r2-refresh-button {
        padding: 6px 10px;
        font-size: 12px;
        border-radius: 10px;
      }

      .coverage-calendar-panel {
        background: #ffffff;
        border-color: #d7d7d7;
        box-shadow: 0 12px 28px rgba(22, 20, 16, 0.1);
      }

      .coverage-calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .coverage-calendar-title {
        margin: 0;
        font-size: clamp(26px, 3.6vw, 44px);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .coverage-calendar-version {
        display: inline-flex;
        align-items: center;
        border: 1px solid #d9cbb7;
        border-radius: 999px;
        padding: 0.18rem 0.48rem;
        color: #6b6255;
        background: #fffaf2;
        font: 700 0.72rem/1 IBM Plex Mono, ui-monospace, monospace;
      }

      .coverage-calendar-version.is-warning {
        border-color: #d9822b;
        color: #8a4b12;
        background: #fff3df;
      }

      .coverage-calendar-nav {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .coverage-calendar-view {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-right: 4px;
      }

      .coverage-calendar-view-label {
        font-size: 12px;
        font-weight: 700;
        color: #3f3a33;
      }

      .coverage-calendar-view-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .coverage-calendar-view-btn {
        min-width: 72px;
        border: 1px solid #F37F22;
        border-radius: 10px;
        background: #ffffff;
        color: #1f1c16;
        font-family: "IBM Plex Sans", "Inter", ui-sans-serif, system-ui, sans-serif;
        font-size: 12px;
        font-weight: 600;
        padding: 7px 12px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      }

      .coverage-calendar-view-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 0 0 3px rgba(243, 127, 34, 0.22), 0 6px 14px rgba(22, 20, 16, 0.2);
      }

      .coverage-calendar-view-btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(243, 127, 34, 0.28), 0 6px 14px rgba(22, 20, 16, 0.2);
      }

      .coverage-calendar-view-btn.is-active {
        background: #F37F22;
        border-color: #F37F22;
        color: #ffffff;
        cursor: default;
        pointer-events: none;
        box-shadow: none;
      }

      .coverage-calendar-view-btn.is-active:hover,
      .coverage-calendar-view-btn.is-active:focus-visible {
        transform: none;
        box-shadow: none;
      }

      .coverage-calendar-nav-btn {
        border: none;
        border-radius: 12px;
        background: #151515;
        color: #ffffff;
        font-family: "IBM Plex Sans", "Inter", ui-sans-serif, system-ui, sans-serif;
        font-size: 13px;
        font-weight: 600;
        padding: 8px 14px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .coverage-calendar-nav-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 0 0 3px rgba(31, 122, 122, 0.22), 0 8px 16px rgba(22, 20, 16, 0.3);
      }

      .coverage-calendar-nav-btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(31, 122, 122, 0.28), 0 8px 16px rgba(22, 20, 16, 0.3);
      }

      .coverage-calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 8px;
      }

      .coverage-day-cell {
        min-height: 160px;
        border: 1px solid #dddddd;
        border-radius: 12px;
        background: #ffffff;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .coverage-day-cell.is-outside {
        background: #f6f6f6;
        color: #9b9489;
      }

      .coverage-day-cell.is-outside .coverage-day-weekday {
        color: #8f877b;
      }

      .coverage-day-cell.is-today {
        border-color: #1f1c16;
        box-shadow: inset 0 0 0 1px #1f1c16;
      }

      .coverage-day-title {
        display: flex;
        align-items: baseline;
        gap: 6px;
        line-height: 1.1;
      }

      .coverage-day-number {
        font-size: 21px;
        font-weight: 700;
      }

      .coverage-day-weekday {
        font-size: 13px;
        color: #4a4a4a;
      }

      .coverage-bars {
        margin-top: 0;
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        grid-template-rows: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .coverage-bar-slot {
        min-height: 0;
        display: flex;
        align-items: center;
      }

      .coverage-bar {
        display: flex;
        align-items: center;
        width: 100%;
        height: 100%;
        min-height: 12px;
        box-sizing: border-box;
        border-radius: 8px;
        overflow: hidden;
      }

      .coverage-bar.is-half {
        width: 48%;
      }

      .coverage-bar-label {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        width: 100%;
        height: 100%;
        padding: 2px 8px;
        color: #ffffff;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.1;
        overflow: hidden;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.45);
        pointer-events: none;
      }

      .coverage-bar-label-primary {
        display: block;
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .coverage-bar-label-primary.with-icon {
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }

      .coverage-bar-label-primary-icon {
        width: 12px;
        height: 12px;
        display: inline-block;
        flex: 0 0 auto;
      }

      .coverage-bar-label-primary-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .coverage-bar-label.has-secondary .coverage-bar-label-primary {
        font-size: 12px;
      }

      .coverage-bar-label-secondary {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        margin-top: 1px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
        opacity: 0.95;
      }

      .coverage-bar-label-secondary.is-dropbox-badge {
        color: #ffffff;
      }

      .coverage-bar-label-secondary-icon {
        width: 12px;
        height: 12px;
        display: inline-block;
      }

      .coverage-bar-label-secondary-icon.is-dropbox-blue {
        filter: none !important;
        opacity: 1;
      }

      .coverage-bar-ingest {
        background: var(--color-ingest-db);
      }

      .coverage-bar-r2-observs {
        background: var(--color-r2-observs);
      }

      .coverage-bar-r2-aqilevels {
        background: var(--color-r2-aqilevels);
      }

      .coverage-bar-obsaqi-observs {
        background: var(--color-obsaqi-observs);
      }

      .coverage-bar-obsaqi-aqilevels {
        background: var(--color-obsaqi-aqilevels);
      }

      .coverage-bar-dropbox-only-observs {
        background: var(--color-r2-observs);
        border: 0;
      }

      .coverage-bar-dropbox-only-aqilevels {
        background: var(--color-r2-aqilevels);
        border: 0;
      }

      .coverage-bar-aqilevels-striped {
        background: repeating-linear-gradient(
          45deg,
          var(--color-r2-aqilevels) 0 22px,
          var(--color-obsaqi-aqilevels) 22px 44px
        );
      }

      .coverage-year-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 10px;
      }

      .coverage-connector-counts-section {
        margin-top: 18px;
        border-top: 1px solid #e4d7c5;
        padding-top: 18px;
      }

      .coverage-connector-counts-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .coverage-connector-counts-title {
        margin: 0;
        font-size: 19px;
        font-weight: 700;

    <script src="assets/config.js"></script>
    <script>
      const DEFAULT_CONFIG = {
        envName: "local",
        apiBaseUrl: "/api",
        dashboardTitle: "UK AQ Dashboard",
        defaultRefreshSeconds: 300,
      };
      const runtimeConfig =
        window.UKAQ_OPS_CONFIG && typeof window.UKAQ_OPS_CONFIG === "object"
          ? { ...DEFAULT_CONFIG, ...window.UKAQ_OPS_CONFIG }
          : DEFAULT_CONFIG;
      const API_BASE_URL = String(runtimeConfig.apiBaseUrl || "/api")
        .trim()
        .replace(/\/+$/, "");

      function buildApiUrl(path, params) {
        const cleanPath = String(path || "").replace(/^\/+/, "");
        const base = API_BASE_URL || "/api";
        const url = `${base}/${cleanPath}`;
        if (!params) {
          return url;
        }
        const query = typeof params === "string" ? params : params.toString();
        return query ? `${url}?${query}` : url;
      }

      const ACCESS_LOGIN_REDIRECT_KEY = "uk_aq_dashboard_access_login_redirect_ts";
      const ACCESS_LOGIN_REDIRECT_COOLDOWN_MS = 10000;

      function isLikelyAccessFetchFailure(error) {
        if (!(error instanceof TypeError)) {
          return false;
        }
        const message = String(error.message || "").toLowerCase();
        return message.includes("failed to fetch") || message.includes("networkerror");
      }

      function maybeRedirectToAccessLogin(error, requestUrl) {
        if (!isLikelyAccessFetchFailure(error)) {
          return false;
        }
        if ((window.location.hostname || "").endsWith(".cloudflareaccess.com")) {
          return false;
        }
        const requestText = String(requestUrl || "");
        if (requestText && !requestText.includes("/api/")) {
          return false;
        }
        try {
          const now = Date.now();
          const last = Number(sessionStorage.getItem(ACCESS_LOGIN_REDIRECT_KEY) || "0");
          if (Number.isFinite(last) && now - last < ACCESS_LOGIN_REDIRECT_COOLDOWN_MS) {
            return false;
          }
          sessionStorage.setItem(ACCESS_LOGIN_REDIRECT_KEY, String(now));
        } catch (_err) {
          // Ignore storage failures and continue with redirect.
        }
        const redirectPath = `${window.location.pathname}${window.location.search}${window.location.hash}`;
        window.location.assign(redirectPath || window.location.href);
        return true;
      }

      const dashboardEl = document.getElementById("dashboard");
      const dashboardTitleEl = document.getElementById("dashboard-title");
      const modeIngestBtn = document.getElementById("mode-ingest");
      const modeOperationsBtn = document.getElementById("mode-operations");
      const modeIngestBottomBtn = document.getElementById("mode-ingest-bottom");
      const modeOperationsBottomBtn = document.getElementById("mode-operations-bottom");
      const DASHBOARD_MODE_STORAGE_KEY = "uk_aq_dashboard_mode";
      const DASHBOARD_REFRESH_INGEST_STORAGE_KEY = "uk_aq_dashboard_refresh_ingest_seconds";
      const DASHBOARD_REFRESH_OPERATIONS_STORAGE_KEY = "uk_aq_dashboard_refresh_operations_seconds";
      const DAILY_TASK_RUNS_SELECTED_DAY_STORAGE_KEY = "ukAqDashboard.operations.dailyTaskRuns.selectedDay";
      const DAILY_TASK_RUNS_MODE_STORAGE_KEY = "ukAqDashboard.operations.dailyTaskRuns.mode";
      const DAILY_TASK_RUNS_MODE_VALUES = new Set(["latest", "all"]);
      const DAILY_TASK_RUNS_SORT_KEYS = new Set([
        "updated",
        "task",
        "scheduled_started",
        "finished_failed",
        "duration",
      ]);
      const DASHBOARD_MODES = new Set(["ingest", "operations"]);
      let activeMode = "ingest";
      let statusEl = null;
      let dataMetaEl = null;
      let errorEl = null;
      let refreshGroup = null;
      let refreshNowBtn = null;
      let refreshTimer = null;
      let operationsDropboxPollTimer = null;
      let dailyTaskRunsDayValue = null;
      let dailyTaskRunsModeValue = "latest";
      let dailyTaskRunsRows = [];
      let dailyTaskRunsLoading = false;
      let dailyTaskRunsLoadSequence = 0;
      let dailyTaskRunsLastUpdatedText = "n/a";
      let dailyTaskRunsSort = {
        key: "updated",
        direction: "desc",
      };
      const modeContainers = {
        ingest: null,
        operations: null,
      };
      const modeIsLoading = {
        ingest: false,
        operations: false,
      };
      const modeLastLoadedAtMs = {
        ingest: 0,
        operations: 0,
      };
      const MIN_OPERATIONS_AUTO_REFRESH_SECONDS = 3600;
      const refreshSecondsByMode = {
        ingest: Number(runtimeConfig.defaultRefreshSeconds) || 300,
        operations: MIN_OPERATIONS_AUTO_REFRESH_SECONDS,
      };
      let modeStatusText = "Waiting for data...";
      let modeDataMetaText = "Project n/a";
      let modeErrorText = "";
      let wasInactive = document.hidden || !document.hasFocus();
      if (!Number.isFinite(refreshSecondsByMode.ingest) || refreshSecondsByMode.ingest <= 0) {
        refreshSecondsByMode.ingest = 300;
      }
      if (!Number.isFinite(refreshSecondsByMode.operations) || refreshSecondsByMode.operations <= 0) {
        refreshSecondsByMode.operations = MIN_OPERATIONS_AUTO_REFRESH_SECONDS;
      }
      if (dashboardTitleEl) {
        dashboardTitleEl.textContent = runtimeConfig.dashboardTitle || DEFAULT_CONFIG.dashboardTitle;
      }
      if (document && document.title) {
        document.title = runtimeConfig.dashboardTitle || DEFAULT_CONFIG.dashboardTitle;
      }

      const bucketOrder = ["0-3 Hours", "3-6 Hours", "6-24 Hours", "1 - 7 Days", "Older than 7 Days"];
      const DISPATCH_CONNECTOR_OPTIONS = [
        { value: "all", label: "All" },
        { value: "sos", label: "UK-AIR SOS" },
        { value: "sensorcommunity", label: "Sensor.Community" },
        { value: "breathelondon", label: "Breathe London" },
        { value: "openaq", label: "OpenAQ" },
      ];
      const DISPATCH_LOOKBACK_OPTIONS = [
        { value: 10, label: "10mins" },
        { value: 30, label: "30mins" },
        { value: 60, label: "60mins" },
        { value: 120, label: "120mins" },
        { value: 240, label: "240mins" },
      ];
      const DISPATCH_CONNECTOR_STORAGE_KEY = "uk_aq_dispatch_connector";
      const DISPATCH_LOOKBACK_STORAGE_KEY = "uk_aq_dispatch_lookback_mins";
      const DB_SIZE_PERIOD_OPTIONS = [
        { value: 6, label: "6 hours" },
        { value: 12, label: "12 hours" },
        { value: 24, label: "24 hours" },
        { value: 48, label: "48 hours" },

        }
        if (run.series_polled !== null && run.series_polled !== undefined) {
          return `${formatCount(run.series_polled)} series`;
        }
        return "n/a";
      }

      function formatObservations(run) {
        if (hasNoNewData(run)) {
          return `<span class="metric-note">No new data</span>`;
        }
        const observations = resolveObservationCount(run);
        return formatCount(observations);
      }

      function formatSeries(run) {
        if (run.series_polled !== null && run.series_polled !== undefined) {
          return formatCount(run.series_polled);
        }
        if (run.timeseries_updated !== null && run.timeseries_updated !== undefined) {
          return formatCount(run.timeseries_updated);
        }
        return "n/a";
      }

      function formatMinutes(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
          return null;
        }
        return `${Number(value)}m`;
      }

      function formatDurationSeconds(totalSeconds) {
        if (totalSeconds === null || totalSeconds === undefined || Number.isNaN(Number(totalSeconds))) {
          return null;
        }
        const rounded = Math.max(0, Math.round(Number(totalSeconds)));
        const hours = Math.floor(rounded / 3600);
        const minutes = Math.floor((rounded % 3600) / 60);
        const seconds = rounded % 60;
        if (hours > 0) {
          return `${hours}h ${String(minutes).padStart(2, "0")}m ${String(seconds).padStart(2, "0")}s`;
        }
        if (minutes > 0) {
          return `${minutes}m ${seconds}s`;
        }
        return `${seconds}s`;
      }

      function calcDurationMinutes(run) {
        const startRaw = run.run_started_at;
        const endRaw = run.run_ended_at;
        if (startRaw && endRaw) {
          const start = new Date(startRaw).getTime();
          const end = new Date(endRaw).getTime();
          if (!Number.isNaN(start) && !Number.isNaN(end) && end >= start) {
            return (end - start) / 60000;
          }
        }
        if (run.in_flight_minutes !== null && run.in_flight_minutes !== undefined) {
          return Number(run.in_flight_minutes);
        }
        return null;
      }

      function setStatus(text) {
        modeStatusText = text || "";
        if (statusEl) {
          statusEl.textContent = modeStatusText;
        }
      }

      function setDataMeta(payload) {
        const projectRef =
          activeMode === "operations"
            ? (
                (payload && payload.obs_aqidb_project_ref)
                || (payload && payload.project_ref)
                || "n/a"
              )
            : (
                (payload && payload.project_ref)
                || "n/a"
              );
        modeDataMetaText = `Project ${projectRef}`;
        if (dataMetaEl) {
          dataMetaEl.textContent = modeDataMetaText;
        }
      }

      function setError(text) {
        modeErrorText = text || "";
        if (errorEl) {
          errorEl.textContent = modeErrorText;
        }
      }

      function buildResponseErrorMessage(resp, payload, text) {
        const payloadMessage =
          payload &&
          typeof payload === "object" &&
          (payload.error || payload.message);
        if (payloadMessage) {
          return String(payloadMessage);
        }

        const rawText = String(text || "").trim();
        if (!rawText) {
          return `Request failed (${resp.status})`;
        }

        const isHtmlResponse =
          /^<!doctype html/i.test(rawText) ||
          /<html[\s>]/i.test(rawText) ||
          /<title>/i.test(rawText);
        if (isHtmlResponse) {
          if (resp.status === 404) {
            return "API route not found (404). Check Cloudflare route for /api/* and Worker deployment.";
          }
          return `API request failed (${resp.status}) and returned HTML instead of JSON.`;
        }

        const singleLine = rawText.replace(/\s+/g, " ").trim();
        if (singleLine.length > 260) {
          return `${singleLine.slice(0, 260)}...`;
        }
        return singleLine;
      }

      function clearRefreshTimer() {
        if (refreshTimer) {
          clearInterval(refreshTimer);
          refreshTimer = null;
        }
      }

      function isPageActive() {
        return !document.hidden && document.hasFocus();
      }

      function ensureModeContainer(mode) {
        if (!DASHBOARD_MODES.has(mode)) {
          return null;
        }
        if (modeContainers[mode]) {
          return modeContainers[mode];
        }
        const container = document.createElement("div");
        container.className = "mode-view";
        container.dataset.mode = mode;
        container.hidden = mode !== activeMode;
        dashboardEl.appendChild(container);
        modeContainers[mode] = container;
        return container;
      }

      function getModeContainer(mode = activeMode) {
        return ensureModeContainer(mode);
      }

      function syncModeControlRefsFromVisibleContainer() {
        const container = getModeContainer(activeMode);
        if (!container) {
          statusEl = null;
          dataMetaEl = null;
          errorEl = null;
          return;
        }
        statusEl = container.querySelector('[data-panel="mode-controls"] #status');
        dataMetaEl = container.querySelector('[data-panel="mode-controls"] #data-meta');
        errorEl = container.querySelector('[data-panel="mode-controls"] #error');
      }

      function showModeContainer(mode) {
        DASHBOARD_MODES.forEach((candidate) => {
          const container = ensureModeContainer(candidate);
          if (container) {
            container.hidden = candidate !== mode;
          }
        });
        syncModeControlRefsFromVisibleContainer();
      }

      function getActiveRefreshSeconds() {
        const value = Number(refreshSecondsByMode[activeMode]);
        if (!Number.isFinite(value) || value <= 0) {
          return activeMode === "operations" ? MIN_OPERATIONS_AUTO_REFRESH_SECONDS : 300;
        }
        if (activeMode === "operations") {
          return Math.max(MIN_OPERATIONS_AUTO_REFRESH_SECONDS, value);
        }
        return value;
      }

      function persistActiveModeRefreshSeconds() {
        const key = activeMode === "operations"
          ? DASHBOARD_REFRESH_OPERATIONS_STORAGE_KEY
          : DASHBOARD_REFRESH_INGEST_STORAGE_KEY;
        try {
          localStorage.setItem(key, String(getActiveRefreshSeconds()));
        } catch (_err) {
          // Ignore storage write failures.
        }
      }

      function isModeStale(mode) {
        const refreshSeconds = Number(refreshSecondsByMode[mode]);
        if (!Number.isFinite(refreshSeconds) || refreshSeconds <= 0) {
          return true;
        }
        const lastLoadedAt = Number(modeLastLoadedAtMs[mode] || 0);
        if (!Number.isFinite(lastLoadedAt) || lastLoadedAt <= 0) {
          return true;
        }
        return (Date.now() - lastLoadedAt) >= (refreshSeconds * 1000);
      }

      function startRefreshTimer() {
        clearRefreshTimer();
        if (!isPageActive()) {
          return;
        }
        const refreshSeconds = getActiveRefreshSeconds();
        refreshTimer = setInterval(() => {
          if (!isPageActive()) {
            return;
          }
          if (activeMode === "operations" && modeIsLoading.operations) {
            return;
          }
          if (activeMode === "ingest" && modeIsLoading.ingest) {
            return;
          }
          void loadCurrentMode();
        }, refreshSeconds * 1000);
      }

      function setRefreshIntervalForActiveMode(seconds) {
        if (!Number.isFinite(seconds) || seconds <= 0) {
          return;
        }
        if (activeMode === "operations") {
          seconds = Math.max(MIN_OPERATIONS_AUTO_REFRESH_SECONDS, seconds);
        }
        refreshSecondsByMode[activeMode] = seconds;
        persistActiveModeRefreshSeconds();
        startRefreshTimer();
      }

      function handleActivityChange() {
        if (!isPageActive()) {
          clearRefreshTimer();
          clearOperationsDropboxPollTimer();
          wasInactive = true;
          return;
        }
        startRefreshTimer();
        if (activeMode === "operations") {
          startOperationsDropboxPolling();
        }
        if (wasInactive) {
          if (activeMode === "ingest") {
            void loadCurrentMode({ refreshOnResume: true });
          }
          wasInactive = false;
        }
      }

      function renderRefreshPills(mode) {
        const refreshName = `refresh-${mode}`;
        const selectedValue = Number(refreshSecondsByMode[mode] || (mode === "operations" ? MIN_OPERATIONS_AUTO_REFRESH_SECONDS : 300));
        const options = mode === "operations"
          ? [{ value: MIN_OPERATIONS_AUTO_REFRESH_SECONDS, label: "60 min" }]
          : [
            { value: 60, label: "1 min" },
            { value: 300, label: "5 min" },
            { value: 600, label: "10 min" },
            { value: 1800, label: "30 min" },
            { value: 3600, label: "60 min" },
          ];
        return options
          .map((option) => {
            const inputId = `${refreshName}-${option.value}`;
            const checked = option.value === selectedValue ? "checked" : "";
            return `
              <span class="refresh-pill">
                <input type="radio" name="${refreshName}" id="${inputId}" value="${option.value}" ${checked} />
                <label for="${inputId}">${option.label}</label>
              </span>
            `;
          })
          .join("");
      }

      function renderModeControlPanel(mode) {
        const title = mode === "operations" ? "Operations" : "Ingest";
        const panel = document.createElement("section");
        panel.className = "panel";
        panel.dataset.panel = "mode-controls";
        panel.innerHTML = `
          <h2>${title}</h2>
          <div class="refresh-row">
            <div class="refresh-left">
              <span class="meta-status" id="status">${escapeHtml(modeStatusText || "Waiting for data...")}</span>
              <span class="meta-note" id="data-meta">${escapeHtml(modeDataMetaText || "Project n/a")}</span>
            </div>
            <div class="refresh-right">
              <div class="refresh-controls">
                <span>Refresh</span>
                <div class="refresh-group" id="refresh-group">${renderRefreshPills(mode)}</div>
              </div>
              <button class="refresh-button" id="refresh-now" type="button">Refresh now</button>
            </div>
          </div>
          <div class="error" id="error">${escapeHtml(modeErrorText || "")}</div>
        `;
        statusEl = panel.querySelector("#status");
        dataMetaEl = panel.querySelector("#data-meta");
        errorEl = panel.querySelector("#error");
        refreshGroup = panel.querySelector("#refresh-group");
        refreshNowBtn = panel.querySelector("#refresh-now");
        if (refreshGroup) {
          refreshGroup.addEventListener("change", (event) => {
            if (event.target && event.target.type === "radio") {
              const value = Number(event.target.value);
              setRefreshIntervalForActiveMode(value);
            }
          });
        }
        if (refreshNowBtn) {
          refreshNowBtn.addEventListener("click", async () => {
            if (refreshNowBtn.disabled) {
              return;
            }
            refreshNowBtn.disabled = true;
            const originalLabel = refreshNowBtn.textContent;
            refreshNowBtn.textContent = "Refreshing...";
            try {
              if (activeMode === "operations") {
                await loadOperationsDashboard({ forceRefresh: true });
              } else {
                await loadDashboard({ forceRefresh: true });
              }
            } finally {
              if (document.body.contains(refreshNowBtn)) {
                refreshNowBtn.disabled = false;
                refreshNowBtn.textContent = originalLabel || "Refresh now";
              }
            }
          });
        }
        return panel;
      }

      function renderPanel(pollutant) {
        const panel = document.createElement("section");
        panel.className = "panel";
        panel.innerHTML = `
          <h2>${pollutant.label} <span class="chip">${pollutant.key}</span></h2>
          <div class="table-scroll table-scroll-freshness">
            <table class="freshness-table">

                <tr>
                  <th>Connector</th>
                  <th>Stations</th>
                  <th>Active</th>
                  <th>0-3</th>
                  <th>3-6</th>
                  <th>6-24</th>
                  <th>1-7</th>
                  <th>7+</th>
                  <th>Trend</th>
                </tr>
              </thead>
              <tbody>

                        <td><div class="bucket-bar">${segments}</div></td>

                      <tr class="freshness-mobile-trend-row">
                        <td colspan="9" class="freshness-mobile-trend-cell">

              </tbody>
