      function parseDailyTaskSummaryObject(summaryValue) {
        if (!summaryValue) {
          return null;
        }
        if (typeof summaryValue === "object" && !Array.isArray(summaryValue)) {
          return summaryValue;
        }
        if (typeof summaryValue === "string") {
          try {
            const parsed = JSON.parse(summaryValue);
            if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) {
              return parsed;
            }
          } catch (_err) {
            return null;
          }
        }
        return null;
      }

      function buildDailyTaskRunsRowMeta(row, nowMs) {
        const rawStatus = String((row && (row.raw_status || row.status)) || "").trim().toLowerCase();
        const scheduledAtMs = parseTimestampMs(row && (row.scheduled_at_utc || row.scheduled_or_started_at));
        const startedAtMs = parseTimestampMs(row && row.started_at);
        const finishedAtMs = parseTimestampMs(row && row.finished_at);
        const failedAtMs = parseTimestampMs(row && row.failed_at);
        const updatedAtMs = parseTimestampMs(row && row.updated_at);
        const hasWarningStatus = ["warning", "partial", "stopped_limit"].includes(rawStatus);
        const hasSuccessStatus = ["finished", "success", "ok", "completed"].includes(rawStatus);
        const hasFailedStatus = ["failed", "error"].includes(rawStatus);
        const isOverdue = startedAtMs === null && scheduledAtMs !== null && (scheduledAtMs + 120000) < nowMs;
        const summary = parseDailyTaskSummaryObject(row && row.summary);
        const integrityBackfillsFailed = Number(summary && summary.backfills_failed);
        const integrityAqiRebuildsFailed = Number(summary && summary.aqi_rebuilds_failed);
        const isIntegrityFinishedWithErrors =
          String((row && row.task_key) || "") === "ops.history_integrity" &&
          ((Number.isFinite(integrityBackfillsFailed) && integrityBackfillsFailed > 0) ||
            (Number.isFinite(integrityAqiRebuildsFailed) && integrityAqiRebuildsFailed > 0));

        let statusLabel = "Unknown";
        let statusClass = "unknown";
        if (failedAtMs !== null || hasFailedStatus) {
          statusLabel = "Failed";
          statusClass = "failed";
        } else if (finishedAtMs !== null || hasSuccessStatus) {
          if (isIntegrityFinishedWithErrors) {
            statusLabel = "Finished with Errors";
            statusClass = "warning";
          } else {
            statusLabel = "Finished";
            statusClass = "succeeded";
          }
        } else if (startedAtMs !== null) {
          statusLabel = "Started";
          statusClass = "running";
        } else if (isOverdue) {
          statusLabel = "Overdue";
          statusClass = "overdue";
        } else if (scheduledAtMs !== null) {
          statusLabel = "Scheduled";
          statusClass = "scheduled";
        } else if (hasWarningStatus) {
          statusLabel = "Warning";
          statusClass = "warning";
        }

        const isActiveRun = startedAtMs !== null && finishedAtMs === null && failedAtMs === null;
        let durationSeconds = Number.isFinite(Number(row && row.duration_seconds))
          ? Math.max(0, Math.round(Number(row.duration_seconds)))
          : null;
        const durationStartMs = startedAtMs !== null ? startedAtMs : scheduledAtMs;
        if (isActiveRun && durationStartMs !== null) {
          durationSeconds = Math.max(0, Math.floor((nowMs - durationStartMs) / 1000));
        } else if (durationSeconds === null && durationStartMs !== null && (startedAtMs !== null || rawStatus === "started")) {
          if (failedAtMs !== null) {
            durationSeconds = Math.max(0, Math.floor((failedAtMs - durationStartMs) / 1000));
          } else if (finishedAtMs !== null) {
            durationSeconds = Math.max(0, Math.floor((finishedAtMs - durationStartMs) / 1000));
          } else {
            durationSeconds = Math.max(0, Math.floor((nowMs - durationStartMs) / 1000));
          }
        }

        return {
          statusLabel,
          statusClass,
          scheduledAtMs,
          startedAtMs,
          finishedAtMs,
          failedAtMs,
          updatedAtMs,
          scheduledOrStartedMs: startedAtMs !== null ? startedAtMs : scheduledAtMs,
          finishedOrFailedMs: failedAtMs !== null ? failedAtMs : finishedAtMs,
          durationSeconds,
        };
      }

      function formatDailyTaskSummary(summaryValue) {
        if (summaryValue === null || summaryValue === undefined) {
          return "No summary";
        }
        if (typeof summaryValue === "string") {
          const trimmed = summaryValue.trim();
          return trimmed ? trimmed : "No summary";
        }
        if (typeof summaryValue === "object") {
          if (Array.isArray(summaryValue) && summaryValue.length === 0) {
            return "No summary";
          }
          if (!Array.isArray(summaryValue) && Object.keys(summaryValue).length === 0) {
            return "No summary";
          }
          try {
            return JSON.stringify(summaryValue, null, 2);
          } catch (_err) {
            return "No summary";
          }
        }
        return String(summaryValue);
      }

      function sortDailyTaskRunsRows(rows, mode, nowMs) {
        const direction = dailyTaskRunsSort.direction === "asc" ? "asc" : "desc";
        const entries = (Array.isArray(rows) ? rows : []).map((row, index) => ({
          row,
          meta: buildDailyTaskRunsRowMeta(row, nowMs),
          index,
        }));

        if (dailyTaskRunsSort.key === "task" && mode === "all") {
          const grouped = new Map();
          entries.forEach((entry) => {
            const groupKey = String((entry.row && (entry.row.task_name || entry.row.task_key)) || "Unknown");
            if (!grouped.has(groupKey)) {
              grouped.set(groupKey, []);
            }
            grouped.get(groupKey).push(entry);
          });
          const groups = Array.from(grouped.entries()).map(([groupKey, groupEntries]) => {
            const sortedEntries = [...groupEntries].sort((left, right) => {
              const leftUpdated = left.meta.updatedAtMs === null ? -1 : left.meta.updatedAtMs;
              const rightUpdated = right.meta.updatedAtMs === null ? -1 : right.meta.updatedAtMs;
              return rightUpdated - leftUpdated || left.index - right.index;
            });
            const latestUpdated = sortedEntries.length ? (sortedEntries[0].meta.updatedAtMs || -1) : -1;
            return { groupKey, latestUpdated, entries: sortedEntries };
          });
          groups.sort((left, right) => {
            if (left.latestUpdated !== right.latestUpdated) {
              return right.latestUpdated - left.latestUpdated;
            }
            return left.groupKey.localeCompare(right.groupKey, undefined, { sensitivity: "base" });
          });
          return groups.flatMap((group) => group.entries);
        }

        const compareNullableNumber = (left, right) => {
          if (left === right) return 0;
          if (left === null) return 1;
          if (right === null) return -1;
          return direction === "asc" ? left - right : right - left;
        };

        const compareText = (left, right) => {
          const result = String(left || "").localeCompare(String(right || ""), undefined, {
            sensitivity: "base",
            numeric: true,
          });
          return direction === "asc" ? result : -result;
        };

        const sortedEntries = [...entries];
        sortedEntries.sort((left, right) => {
          let result = 0;
          if (dailyTaskRunsSort.key === "task") {
            result = compareText(
              left.row && (left.row.task_name || left.row.task_key || "Unknown"),
              right.row && (right.row.task_name || right.row.task_key || "Unknown"),
            );
          } else if (dailyTaskRunsSort.key === "scheduled_started") {
            result = compareNullableNumber(left.meta.scheduledOrStartedMs, right.meta.scheduledOrStartedMs);
          } else if (dailyTaskRunsSort.key === "finished_failed") {
            result = compareNullableNumber(left.meta.finishedOrFailedMs, right.meta.finishedOrFailedMs);
          } else if (dailyTaskRunsSort.key === "duration") {
            result = compareNullableNumber(left.meta.durationSeconds, right.meta.durationSeconds);
          } else {
            result = compareNullableNumber(left.meta.updatedAtMs, right.meta.updatedAtMs);
          }
          if (result !== 0) {
            return result;
          }
          return left.index - right.index;
        });

        return sortedEntries;
      }

      function renderDailyTaskRunsCardContent(panel, rows, options = {}) {
        if (!panel) {
          return;
        }
        const contentEl = panel.querySelector("#daily-task-runs-content");
        if (!contentEl) {
          return;
        }
        if (options.loading) {
          contentEl.innerHTML = `<div class="daily-task-state">${escapeHtml(options.loadingMessage || "Loading...")}</div>`;
          return;
        }
        if (options.errorMessage) {
          contentEl.innerHTML = `<div class="daily-task-state is-error">${escapeHtml(options.errorMessage)}</div>`;
          return;
        }
        if (!Array.isArray(rows) || rows.length === 0) {
          contentEl.innerHTML = `<div class="daily-task-state">No daily task runs found for this day.</div>`;
          return;
        }

        const mode = dailyTaskRunsModeValue === "all" ? "all" : "latest";
        const nowMs = Date.now();
        const sortedEntries = sortDailyTaskRunsRows(rows, mode, nowMs);
        const sortArrow = (sortKey) => {
          if (dailyTaskRunsSort.key !== sortKey) {
            return "";
          }
          return dailyTaskRunsSort.direction === "asc" ? " ▲" : " ▼";
        };

        const rowsMarkup = sortedEntries
          .map((entry, index) => {
            const row = entry.row || {};
            const meta = entry.meta;
            const rowKey = String(row.run_id || `${row.task_key || "task"}-${index}`);
            const summaryRowId = `daily-task-summary-${escapeHtml(rowKey).replace(/[^a-zA-Z0-9_-]/g, "_")}`;
            const taskLabel = String(row.task_name || row.task_key || "Unknown");
            const platformLabel = String(row.platform || "n/a");
            const scheduledValue = meta.startedAtMs !== null
              ? formatTime(row.started_at)
              : (meta.scheduledAtMs !== null ? formatTime(row.scheduled_at_utc || row.scheduled_or_started_at) : "n/a");
            const finishedValue = meta.failedAtMs !== null
              ? formatTime(row.failed_at)
              : (meta.finishedAtMs !== null ? formatTime(row.finished_at) : "—");
            const durationValue = meta.durationSeconds === null ? "n/a" : (formatDurationSeconds(meta.durationSeconds) || "n/a");
            const summaryText = formatDailyTaskSummary(row.summary);

            return `
              <tr class="daily-task-row">
                <td>
                  <div class="daily-task-task-cell">
                    <button class="daily-task-expand" type="button" aria-label="Toggle summary" aria-expanded="false" aria-controls="${summaryRowId}" data-summary-row-id="${summaryRowId}"></button>
                    <span class="daily-task-name">${escapeHtml(taskLabel)}</span>
                  </div>
                </td>
                <td class="daily-task-platform">${escapeHtml(platformLabel)}</td>
                <td><span class="status-pill ${escapeHtml(meta.statusClass)}">${escapeHtml(meta.statusLabel)}</span></td>
                <td>${escapeHtml(scheduledValue)}</td>
                <td>${escapeHtml(finishedValue)}</td>
                <td>${escapeHtml(durationValue)}</td>
              </tr>
              <tr id="${summaryRowId}" class="daily-task-summary-row is-hidden">
                <td colspan="6" class="daily-task-summary-cell">
                  <pre class="daily-task-summary-json">${escapeHtml(summaryText)}</pre>
                </td>
              </tr>
            `;
          })
          .join("");

        contentEl.innerHTML = `
          <div class="table-scroll table-scroll-daily-task">
            <table class="daily-task-table">
              <colgroup>
                <col style="width:40%" />
                <col style="width:9%" />
                <col style="width:10%" />
                <col style="width:17%" />
                <col style="width:17%" />
                <col style="width:7%" />
              </colgroup>
              <thead>
                <tr>
                  <th><button type="button" class="daily-task-sort-btn" data-daily-task-sort="task">Task${sortArrow("task")}</button></th>
                  <th>Platform</th>
                  <th>Status</th>
                  <th><button type="button" class="daily-task-sort-btn" data-daily-task-sort="scheduled_started">Scheduled<br>/ Started${sortArrow("scheduled_started")}</button></th>
                  <th><button type="button" class="daily-task-sort-btn" data-daily-task-sort="finished_failed">Finished<br>/ Failed${sortArrow("finished_failed")}</button></th>
                  <th><button type="button" class="daily-task-sort-btn" data-daily-task-sort="duration">Duration${sortArrow("duration")}</button></th>
                </tr>
              </thead>
              <tbody>${rowsMarkup}</tbody>
            </table>
          </div>
        `;

        const sortButtons = contentEl.querySelectorAll("[data-daily-task-sort]");
        sortButtons.forEach((buttonEl) => {
          buttonEl.addEventListener("click", () => {
            const nextKey = String(buttonEl.getAttribute("data-daily-task-sort") || "");
            if (!DAILY_TASK_RUNS_SORT_KEYS.has(nextKey)) {
              return;
            }
            if (dailyTaskRunsSort.key === nextKey) {
              dailyTaskRunsSort.direction = dailyTaskRunsSort.direction === "asc" ? "desc" : "asc";
            } else {
              dailyTaskRunsSort.key = nextKey;
              dailyTaskRunsSort.direction = nextKey === "task" ? "asc" : "desc";
            }
            renderDailyTaskRunsCardContent(panel, dailyTaskRunsRows);
          });
        });

        const expandButtons = contentEl.querySelectorAll(".daily-task-expand");
        expandButtons.forEach((buttonEl) => {
          buttonEl.addEventListener("click", () => {
            const summaryRowId = String(buttonEl.getAttribute("data-summary-row-id") || "");
            if (!summaryRowId) {
              return;
            }
            const summaryRowEl = document.getElementById(summaryRowId);
            if (!summaryRowEl) {
              return;
            }
            const currentlyExpanded = buttonEl.getAttribute("aria-expanded") === "true";
            buttonEl.setAttribute("aria-expanded", currentlyExpanded ? "false" : "true");
            summaryRowEl.classList.toggle("is-hidden", currentlyExpanded);
          });
        });
      }

      function updateDailyTaskRunsModeButtons(panel) {
        const buttons = panel ? panel.querySelectorAll("[data-daily-task-mode]") : [];
        buttons.forEach((buttonEl) => {
          const modeValue = String(buttonEl.getAttribute("data-daily-task-mode") || "latest");
          const isActive = modeValue === dailyTaskRunsModeValue;
          buttonEl.classList.toggle("is-active", isActive);
          buttonEl.setAttribute("aria-pressed", isActive ? "true" : "false");
          buttonEl.disabled = isActive || dailyTaskRunsLoading;
        });
      }

      async function loadDailyTaskRunsCard(options = {}) {
        const panel = getOperationsDailyTaskPanel();
        if (!panel) {
          return;
        }
        const force = Boolean(options.force);
        const parentLoadId = Number(options.parentLoadId) || 0;
        const requestId = ++dailyTaskRunsLoadSequence;
        dailyTaskRunsLoading = true;

        const dayInput = panel.querySelector("#daily-task-runs-day-selector");
        const refreshButton = panel.querySelector("#daily-task-runs-refresh");
        const updatedEl = panel.querySelector("#daily-task-runs-updated");
        if (dayInput) {
          dayInput.disabled = true;
        }
        if (refreshButton) {
          refreshButton.disabled = true;
          refreshButton.textContent = "Refreshing...";
        }
        updateDailyTaskRunsModeButtons(panel);
        if (!dailyTaskRunsRows.length) {
          renderDailyTaskRunsCardContent(panel, dailyTaskRunsRows, { loading: true, loadingMessage: "Loading daily task runs..." });
        }

        try {
          const params = new URLSearchParams();
          params.set("day", dailyTaskRunsDayValue || toUtcDateKey(startOfUtcDay(new Date())));
          params.set("mode", dailyTaskRunsModeValue || "latest");
          if (force) {
            params.set("t", String(Date.now()));
          }
          const requestUrl = buildApiUrl("daily_task_runs", params);
          const resp = await fetch(requestUrl);
          const text = await resp.text();
          let payload = null;
          try {
            payload = JSON.parse(text);
          } catch (_err) {
            payload = null;
          }
          if (!resp.ok) {
            const message = buildResponseErrorMessage(resp, payload, text);
            throw new Error(message);
          }
          if (requestId !== dailyTaskRunsLoadSequence) {
            return;
          }
          if (parentLoadId && parentLoadId !== operationsLoadSequence) {
            return;
          }
          const rows = Array.isArray(payload && payload.rows) ? payload.rows : [];
          dailyTaskRunsRows = rows;
          dailyTaskRunsLastUpdatedText = payload && payload.generated_at
            ? formatDateTimeLocalWithTimezone(payload.generated_at)
            : "n/a";
          if (updatedEl) {
            updatedEl.textContent = `Updated: ${dailyTaskRunsLastUpdatedText}`;
          }
          renderDailyTaskRunsCardContent(panel, dailyTaskRunsRows);
        } catch (err) {
          if (requestId !== dailyTaskRunsLoadSequence) {
            return;
          }
          if (parentLoadId && parentLoadId !== operationsLoadSequence) {
            return;
          }
          if (maybeRedirectToAccessLogin(err, buildApiUrl("daily_task_runs"))) {
            setStatus("Cloudflare Access login required. Redirecting...");
            setError("Cloudflare Access login required. Redirecting...");
            return;
          }
          const message = err && err.message ? String(err.message) : "Failed to load daily task runs";
          renderDailyTaskRunsCardContent(panel, dailyTaskRunsRows, {
            errorMessage: message,
          });
        } finally {
          if (requestId === dailyTaskRunsLoadSequence) {
            dailyTaskRunsLoading = false;
            if (dayInput) {
              dayInput.disabled = false;
            }
            if (refreshButton) {
              refreshButton.disabled = false;
              refreshButton.textContent = "Refresh";
            }
            updateDailyTaskRunsModeButtons(panel);
          }
        }
      }

      function renderOperationsDailyTaskPanel() {
        const panel = document.createElement("section");
        panel.className = "panel";
        panel.dataset.panel = "operations-daily-task";
        const dayValue = dailyTaskRunsDayValue || toUtcDateKey(startOfUtcDay(new Date()));
        panel.innerHTML = `
          <h2>Daily Tasks Latest Runs</h2>
          <div class="daily-task-toolbar">
            <div class="dispatch-filters">
              <label class="dispatch-filter" for="daily-task-runs-day-selector">
                Day
                <input class="settings-input" id="daily-task-runs-day-selector" type="date" value="${escapeHtml(dayValue)}" />
              </label>
              <div class="daily-task-mode-switch" role="group" aria-label="Daily task run mode">
                <button type="button" class="daily-task-mode-button${dailyTaskRunsModeValue === "latest" ? " is-active" : ""}" data-daily-task-mode="latest" aria-pressed="${dailyTaskRunsModeValue === "latest" ? "true" : "false"}">Latest</button>
                <button type="button" class="daily-task-mode-button${dailyTaskRunsModeValue === "all" ? " is-active" : ""}" data-daily-task-mode="all" aria-pressed="${dailyTaskRunsModeValue === "all" ? "true" : "false"}">All runs</button>
              </div>
            </div>
            <div class="daily-task-toolbar-right">
              <span class="meta-note" id="daily-task-runs-updated">Updated: ${escapeHtml(dailyTaskRunsLastUpdatedText)}</span>
              <button class="settings-button" id="daily-task-runs-refresh" type="button">Refresh</button>
            </div>
          </div>
          <div id="daily-task-runs-content">
            <div class="daily-task-state">Loading daily task runs...</div>
          </div>
          <div class="footnote">Times in UTC.</div>
        `;
        const daySelector = panel.querySelector("#daily-task-runs-day-selector");
        if (daySelector) {
          daySelector.addEventListener("change", (event) => {
            const nextValue = String(event.target.value || "");
            if (!/^\d{4}-\d{2}-\d{2}$/.test(nextValue)) {
              return;
            }
            dailyTaskRunsDayValue = nextValue;
            try {
              sessionStorage.setItem(DAILY_TASK_RUNS_SELECTED_DAY_STORAGE_KEY, dailyTaskRunsDayValue);
            } catch (_err) {
              // Ignore storage write failures.
            }
            loadDailyTaskRunsCard({ force: true });
          });
        }

        const modeButtons = panel.querySelectorAll("[data-daily-task-mode]");
        modeButtons.forEach((buttonEl) => {
          buttonEl.addEventListener("click", () => {
            const nextMode = String(buttonEl.getAttribute("data-daily-task-mode") || "").trim().toLowerCase();
            if (!DAILY_TASK_RUNS_MODE_VALUES.has(nextMode) || nextMode === dailyTaskRunsModeValue) {
              return;
            }
            dailyTaskRunsModeValue = nextMode;
            try {
              sessionStorage.setItem(DAILY_TASK_RUNS_MODE_STORAGE_KEY, dailyTaskRunsModeValue);
            } catch (_err) {
              // Ignore storage write failures.
            }
            if (!DAILY_TASK_RUNS_SORT_KEYS.has(dailyTaskRunsSort.key)) {
              dailyTaskRunsSort = { key: "updated", direction: "desc" };
            }
            updateDailyTaskRunsModeButtons(panel);
            loadDailyTaskRunsCard({ force: true });
          });
        });

        const refreshButton = panel.querySelector("#daily-task-runs-refresh");
        if (refreshButton) {
          refreshButton.addEventListener("click", () => {
            loadDailyTaskRunsCard({ force: true });
          });
        }
        updateDailyTaskRunsModeButtons(panel);
        if (Array.isArray(dailyTaskRunsRows) && dailyTaskRunsRows.length) {
          renderDailyTaskRunsCardContent(panel, dailyTaskRunsRows);
        }
        return panel;
      }

      async function refreshOperationsDropboxPanel() {
        if (activeMode !== "operations") {
          return;
        }
        const operationsContainer = getModeContainer("operations");
        const valueEl = operationsContainer ? operationsContainer.querySelector("#dropbox-mtime-value") : null;
        const noteEl = operationsContainer ? operationsContainer.querySelector("#dropbox-mtime-note") : null;
        if (!valueEl || !noteEl) {
          return;
        }
        try {
          const params = new URLSearchParams();
          params.set("t", String(Date.now()));
          const resp = await fetch(buildApiUrl("operations_dropbox_mtime", params));
          const text = await resp.text();
          let payload = null;
          try {
            payload = JSON.parse(text);
          } catch (_err) {
            payload = null;
          }
          if (!resp.ok) {
            throw new Error(buildResponseErrorMessage(resp, payload, text));
          }
          const absolute = payload && payload.latest_mtime_utc
            ? formatDateTimeLocalWithTimezone(payload.latest_mtime_utc)
            : "n/a";
          const ago = payload && payload.latest_mtime_utc
            ? formatDurationSince(payload.latest_mtime_utc)
            : "n/a";
          valueEl.textContent = `${absolute} (${ago})`;
          const resolvedPath = String((payload && payload.resolved_history_path) || "n/a");
          const apiError = payload && payload.error ? String(payload.error) : "";
          const updatesLine = "Updates every 30 secs";
          noteEl.innerHTML = apiError
            ? `${escapeHtml(`Path: ${resolvedPath}`)}<br>${escapeHtml(updatesLine)}<br>${escapeHtml(apiError)}`
            : `${escapeHtml(`Path: ${resolvedPath}`)}<br>${escapeHtml(updatesLine)}`;
        } catch (err) {
          valueEl.textContent = "Unavailable";
          noteEl.textContent = err && err.message ? String(err.message) : "Failed to load Dropbox mtime";
        }
      }

      function clearOperationsDropboxPollTimer() {
        if (operationsDropboxPollTimer) {
          clearInterval(operationsDropboxPollTimer);
          operationsDropboxPollTimer = null;
        }
      }

      function startOperationsDropboxPolling() {
        clearOperationsDropboxPollTimer();
        if (activeMode !== "operations" || !isPageActive()) {
          return;
        }
        operationsDropboxPollTimer = setInterval(() => {
          if (activeMode !== "operations" || !isPageActive()) {
            return;
          }
          void refreshOperationsDropboxPanel();
        }, 30000);
      }

      function applyModeSwitchUi() {
        if (modeIngestBtn) {
          const isActive = activeMode === "ingest";
          modeIngestBtn.classList.toggle("is-active", isActive);
          modeIngestBtn.setAttribute("aria-selected", isActive ? "true" : "false");
        }
        if (modeOperationsBtn) {
          const isActive = activeMode === "operations";
          modeOperationsBtn.classList.toggle("is-active", isActive);
          modeOperationsBtn.setAttribute("aria-selected", isActive ? "true" : "false");
        }
        if (modeIngestBottomBtn) {
          const isActive = activeMode === "ingest";
          modeIngestBottomBtn.classList.toggle("is-active", isActive);
          modeIngestBottomBtn.setAttribute("aria-selected", isActive ? "true" : "false");
        }
        if (modeOperationsBottomBtn) {
          const isActive = activeMode === "operations";
          modeOperationsBottomBtn.classList.toggle("is-active", isActive);
          modeOperationsBottomBtn.setAttribute("aria-selected", isActive ? "true" : "false");
        }
      }

      async function loadOperationsDashboard(options = {}) {
        const forceRefresh = Boolean(options.forceRefresh);
        const loadId = ++operationsLoadSequence;
        const operationsContainer = getModeContainer("operations");
        if (!operationsContainer) {
          return;
        }
        modeIsLoading.operations = true;
        setError("");
        setStatus(forceRefresh ? "Force refreshing..." : "Loading...");
        renderOperationsInitialLoadingShell(forceRefresh);
        try {
          const params = new URLSearchParams();
          params.set("include_storage_coverage", "0");
          params.set("include_metric_context", "1");
          params.set("include_ingest_context", "0");
          if (forceRefresh) {
            params.set("force", "1");
            params.set("t", String(Date.now()));
          }
          const dashboardUrl = buildApiUrl("dashboard", params);
          const resp = await fetch(dashboardUrl);
          const text = await resp.text();
          let payload = null;
          try {
            payload = JSON.parse(text);
          } catch (_err) {
            payload = null;
          }
          if (!resp.ok) {
            const message = buildResponseErrorMessage(resp, payload, text);
            throw new Error(message);
          }
          if (loadId !== operationsLoadSequence || activeMode !== "operations") {
            modeIsLoading.operations = false;
            return;
          }
          const data = payload || {};
          latestDashboardData = data;
          latestR2HistoryReadVersion = data.r2_history_read_version || latestR2HistoryReadVersion;
          const existingDailyTaskPanel = operationsContainer.querySelector('[data-panel="operations-daily-task"]');
          const nextPanels = [
            renderModeControlPanel("operations"),
            renderOperationsDropboxPanel(),
            existingDailyTaskPanel || renderOperationsDailyTaskPanel(),
            renderDbSizePanel(
              data.db_size_metrics,
              data.db_size_metrics_error,
              data.schema_size_metrics,
              data.schema_size_metrics_error,
              data.r2_domain_size_metrics,
              data.r2_domain_size_metrics_error,
              data.r2_usage,
              data.r2_usage_error,
              data.r2_backup_window,
              data.r2_backup_window_error,
            ),
            renderServiceEgressPanel(
              data.service_egress_metrics,
              data.service_egress_metrics_error,
            ),
            renderStorageCoverageLoadingPanel("Refreshing calendar..."),
          ];
          operationsContainer.replaceChildren(...nextPanels);
          await refreshOperationsDropboxPanel();
          await loadDailyTaskRunsCard({ force: forceRefresh, parentLoadId: loadId });
          if (loadId !== operationsLoadSequence || activeMode !== "operations") {
            modeIsLoading.operations = false;
            return;
          }
          modeLastLoadedAtMs.operations = Date.now();
          modeIsLoading.operations = false;
          setStatus(`Updated ${formatDateTimeLocalWithTimezone(data.generated_at)}`);
          setDataMeta(data);
          startOperationsDropboxPolling();
          void loadStorageCoverage({ forceRefresh, parentLoadId: loadId });
        } catch (err) {
          if (loadId !== operationsLoadSequence || activeMode !== "operations") {
            modeIsLoading.operations = false;
            return;
          }
          modeIsLoading.operations = false;
          if (maybeRedirectToAccessLogin(err, buildApiUrl("dashboard"))) {
            setStatus("Cloudflare Access login required. Redirecting...");
            setError("Cloudflare Access login required. Redirecting...");
            return;
          }
          setError(err.message || String(err));
          setStatus("Error");
        }
      }

      async function loadCurrentMode(options = {}) {
        const forceRefresh = Boolean(options.forceRefresh);
        const refreshOnResume = Boolean(options.refreshOnResume);
        const modeSwitch = Boolean(options.modeSwitch);
        applyModeSwitchUi();
        showModeContainer(activeMode);
        clearOperationsDropboxPollTimer();
        if (activeMode === "operations") {
          const hasLoaded = Number(modeLastLoadedAtMs.operations || 0) > 0;
          const shouldLoad = modeSwitch
            ? (!hasLoaded || forceRefresh)
            : (forceRefresh || refreshOnResume || isModeStale("operations"));
          if (shouldLoad && !modeIsLoading.operations) {
            await loadOperationsDashboard({ forceRefresh });
          } else {
            startOperationsDropboxPolling();
          }
          return;
        }
        const hasLoaded = Number(modeLastLoadedAtMs.ingest || 0) > 0;
        const shouldLoad = modeSwitch
          ? (!hasLoaded || forceRefresh)
          : (forceRefresh || refreshOnResume || isModeStale("ingest"));
        if (shouldLoad && !modeIsLoading.ingest) {
          await loadDashboard({ forceRefresh });
        }
      }

      async function loadDashboard(options = {}) {
        if (activeMode !== "ingest") {
          return;
        }
        const forceRefresh = Boolean(options.forceRefresh);
        const loadId = ++dashboardLoadSequence;
        const ingestContainer = getModeContainer("ingest");
        if (!ingestContainer) {
          return;
        }
        if (ingestContainer.children.length === 0) {
          ingestContainer.appendChild(renderModeControlPanel("ingest"));
        } else {
          syncModeControlRefsFromVisibleContainer();
        }
        modeIsLoading.ingest = true;
        setError("");
        setStatus(forceRefresh ? "Force refreshing..." : "Loading...");
        try {
          const params = new URLSearchParams();
          params.set("include_storage_coverage", "0");
          params.set("include_metric_context", "0");
          if (forceRefresh) {
            params.set("force", "1");
            params.set("t", String(Date.now()));
          }
          const dashboardUrl = buildApiUrl("dashboard", params);
          const resp = await fetch(dashboardUrl);
          const text = await resp.text();
          let payload = null;
          try {
            payload = JSON.parse(text);
          } catch (err) {
            payload = null;
          }
          if (!resp.ok) {
            const message = buildResponseErrorMessage(resp, payload, text);
            throw new Error(message);
          }
          if (loadId !== dashboardLoadSequence) {
            modeIsLoading.ingest = false;
            return;
          }
          if (activeMode !== "ingest") {
            modeIsLoading.ingest = false;
            return;
          }
          const data = payload || {};
          latestDashboardData = data;
          const nextPanels = [];
          nextPanels.push(renderModeControlPanel("ingest"));
          if (Array.isArray(data.connectors_settings)) {
            nextPanels.push(renderConnectorSettingsPanel(data.connectors_settings));
          }
          if (
            data.dispatcher_settings &&
            shouldShowDispatcherSettings(data.connectors_settings)
          ) {
            nextPanels.push(renderDispatcherSettingsPanel(data.dispatcher_settings));
          }
          if (Array.isArray(data.dispatch_runs)) {
            nextPanels.push(renderDispatchPanel(data.dispatch_runs));
          }
          (Array.isArray(data.pollutants) ? data.pollutants : []).forEach((pollutant) => {
            nextPanels.push(renderPanel(pollutant));
          });
          ingestContainer.replaceChildren(...nextPanels);
          modeLastLoadedAtMs.ingest = Date.now();
          modeIsLoading.ingest = false;
          setStatus(`Updated ${formatDateTimeLocalWithTimezone(data.generated_at)}`);
          setDataMeta(data);
        } catch (err) {
          if (loadId !== dashboardLoadSequence) {
            modeIsLoading.ingest = false;
            return;
          }
          if (activeMode !== "ingest") {
            modeIsLoading.ingest = false;
            return;
          }
          modeIsLoading.ingest = false;
          if (maybeRedirectToAccessLogin(err, buildApiUrl("dashboard"))) {
            setStatus("Cloudflare Access login required. Redirecting...");
            setError("Cloudflare Access login required. Redirecting...");
            return;
          }
          setError(err.message || String(err));
          setStatus("Error");
        }
      }

      document.addEventListener("visibilitychange", handleActivityChange);
      window.addEventListener("focus", handleActivityChange);
      window.addEventListener("blur", handleActivityChange);
      function activateMode(mode) {
        if (!DASHBOARD_MODES.has(mode) || activeMode === mode) {
          return;
        }
        activeMode = mode;
        try {
          localStorage.setItem(DASHBOARD_MODE_STORAGE_KEY, activeMode);
        } catch (_err) {
          // Ignore storage write failures.
        }
        startRefreshTimer();
        void loadCurrentMode({ forceRefresh: false, modeSwitch: true });
      }

      if (modeIngestBtn) {
        modeIngestBtn.addEventListener("click", () => activateMode("ingest"));
      }
      if (modeOperationsBtn) {
        modeOperationsBtn.addEventListener("click", () => activateMode("operations"));
      }
      if (modeIngestBottomBtn) {
        modeIngestBottomBtn.addEventListener("click", () => activateMode("ingest"));
      }
      if (modeOperationsBottomBtn) {
        modeOperationsBottomBtn.addEventListener("click", () => activateMode("operations"));
      }

      applyModeSwitchUi();
      startRefreshTimer();
      if (isPageActive()) {
        void loadCurrentMode({ forceRefresh: false });
      }
    </script>
  </body>
</html>
