        return panel;
      }

      /**
       * @typedef {Object} DayCoverage
       * @property {string} date
       * @property {boolean} ingest
       * @property {boolean} obsAqiObservs
       * @property {boolean} obsAqiAqilevels
       * @property {boolean} r2Observs
       * @property {boolean} r2Aqilevels
       * @property {boolean=} isToday
       */

      function normalizeDayCoverageRows(rows) {
        if (!Array.isArray(rows)) {
          return [];
        }
        return rows
          .map((row) => {
            const dateObj = parseUtcDateKey(row && row.date);
            if (!dateObj) {
              return null;
            }
            const obsAqiObservs = row && row.obs_aqi_observs !== undefined
              ? Boolean(row.obs_aqi_observs)
              : Boolean(row && row.observs);
            const obsAqiAqilevels = row && row.obs_aqi_aqilevels !== undefined
              ? Boolean(row.obs_aqi_aqilevels)
              : Boolean(row && row.aqilevels);
            const r2Observs = row && row.r2_observs !== undefined
              ? Boolean(row.r2_observs)
              : Boolean(row && row.r2);
            const r2Aqilevels = row && row.r2_aqilevels !== undefined
              ? Boolean(row.r2_aqilevels)
              : false;
            const dropboxObservs = row && row.dropbox_observs !== undefined
              ? Boolean(row.dropbox_observs)
              : false;
            const dropboxAqilevels = row && row.dropbox_aqilevels !== undefined
              ? Boolean(row.dropbox_aqilevels)
              : false;
            const ingest = Boolean(row && row.ingest) && !r2Observs;
            return {
              date: toUtcDateKey(dateObj),
              ingest,
              obsAqiObservs,
              obsAqiAqilevels,
              r2Observs,
              r2Aqilevels,
              dropboxObservs,
              dropboxAqilevels,
              isToday: Boolean(row && row.isToday),
            };
          })
          .filter(Boolean);
      }

      function resolveCoverageRowsForMonth(_monthStartUtc, serverCoverageRows) {
        const normalizedRows = normalizeDayCoverageRows(serverCoverageRows);
        return { rows: normalizedRows, source: "api" };
      }

      function buildCoverageCalendarCells(monthStartUtc, dayCoverageRows, includeTodayCoverage = false) {
        const todayKey = toUtcDateKey(startOfUtcDay(new Date()));
        const coverageByDate = new Map(
          dayCoverageRows.map((row) => [row.date, row]),
        );
        const monthEndUtc = addUtcDays(addUtcMonths(monthStartUtc, 1), -1);
        const leadingDays = (monthStartUtc.getUTCDay() + 6) % 7;
        const trailingDays = 6 - ((monthEndUtc.getUTCDay() + 6) % 7);
        const gridStartUtc = addUtcDays(monthStartUtc, -leadingDays);
        const gridEndUtc = addUtcDays(monthEndUtc, trailingDays);

        const cells = [];
        for (
          let cursor = new Date(gridStartUtc.getTime());
          cursor <= gridEndUtc;
          cursor = addUtcDays(cursor, 1)
        ) {
          const dateKey = toUtcDateKey(cursor);
          const weekdayIndex = (cursor.getUTCDay() + 6) % 7;
          const row = coverageByDate.get(dateKey) || {
            date: dateKey,
            ingest: false,
            obsAqiObservs: false,
            obsAqiAqilevels: false,
            r2Observs: false,
            r2Aqilevels: false,
            dropboxObservs: false,
            dropboxAqilevels: false,
            isToday: dateKey === todayKey,
          };
          const isToday = Boolean(row.isToday) || dateKey === todayKey;
          const showCoverage = includeTodayCoverage || !isToday;
          cells.push({
            date: new Date(cursor.getTime()),
            dateKey,
            isInMonth: sameUtcMonth(cursor, monthStartUtc),
            dayNumber: cursor.getUTCDate(),
            weekdayLabel: COVERAGE_WEEKDAY_NAMES[weekdayIndex],
            coverage: {
              date: row.date,
              ingest: showCoverage && Boolean(row.ingest),
              obsAqiObservs: showCoverage && Boolean(row.obsAqiObservs),
              obsAqiAqilevels: showCoverage && Boolean(row.obsAqiAqilevels),
              r2Observs: showCoverage && Boolean(row.r2Observs),
              r2Aqilevels: showCoverage && Boolean(row.r2Aqilevels),
              dropboxObservs: showCoverage && Boolean(row.dropboxObservs),
              dropboxAqilevels: showCoverage && Boolean(row.dropboxAqilevels),
              isToday,
            },
          });
        }
        return cells;
      }

      function summarizeCoverageSources(coverage) {
        const sources = [];
        if (coverage.ingest) {
          sources.push("Ingest DB");
        }
        if (coverage.r2Observs) {
          sources.push("R2 History - Obs");
        }
        if (coverage.r2Aqilevels) {
          sources.push("R2 History - AQI");
        }
        if (coverage.obsAqiObservs) {
          sources.push("ObsAQI DB - Obs");
        }
        if (coverage.obsAqiAqilevels) {
          sources.push("ObsAQI DB - AQI");
        }
        if (coverage.dropboxObservs) {
          sources.push("Backup - Obs");
        }
        if (coverage.dropboxAqilevels) {
          sources.push("Backup - AQI");
        }
        return sources;
      }

      function resolveCoverageBarLayers(coverage) {
        let topLayer = coverage.r2Observs
          ? { key: "r2-observs", label: "R2 History - Obs", className: "coverage-bar-r2-observs", dropboxDomain: "observations" }
          : coverage.dropboxObservs
            ? {
                key: "dropbox-observs",
                label: "Backup - Obs",
                className: "coverage-bar-dropbox-only-observs",
                dropboxDomain: "observations",
                dropboxOnly: true,
                primaryDropboxIcon: true,
              }
          : coverage.ingest
            ? { key: "ingest", label: "Ingest DB", className: "coverage-bar-ingest" }
            : null;
        let middleLayer = coverage.obsAqiObservs
          ? { key: "obsaqi-observs", label: "ObsAQI DB - Obs", className: "coverage-bar-obsaqi-observs" }
          : null;
        let bottomLayer = null;
        if (coverage.r2Aqilevels && coverage.obsAqiAqilevels) {
          bottomLayer = {
            key: "aqilevels-striped",
            label: "R2 History - AQI + ObsAQI DB - AQI",
            className: "coverage-bar-aqilevels-striped",
            dropboxDomain: "both",
            hideLabel: true,
          };
        } else if (coverage.r2Aqilevels) {
          bottomLayer = {
            key: "r2-aqilevels",
            label: "R2 History - AQI",
            className: "coverage-bar-r2-aqilevels",
            dropboxDomain: "aqilevels",
          };
        } else if (coverage.dropboxAqilevels) {
          bottomLayer = {
            key: "dropbox-aqilevels",
            label: "Backup - AQI",
            className: "coverage-bar-dropbox-only-aqilevels",
            dropboxDomain: "aqilevels",
            dropboxOnly: true,
            primaryDropboxIcon: true,
          };
        } else if (coverage.obsAqiAqilevels) {
          bottomLayer = {
            key: "obsaqi-aqilevels",
            label: "ObsAQI DB - AQI",
            className: "coverage-bar-obsaqi-aqilevels",
          };
        }
        if (
          !middleLayer &&
          topLayer &&
          (topLayer.key === "r2-observs" || topLayer.key === "dropbox-observs") &&
          bottomLayer &&
          (bottomLayer.key === "r2-aqilevels" || bottomLayer.key === "dropbox-aqilevels")
        ) {
          middleLayer = bottomLayer;
          bottomLayer = null;
        }
        return { topLayer, middleLayer, bottomLayer };
      }

      function coverageLayerHasDropboxBackup(layer, coverage) {
        if (!layer || !coverage || layer.dropboxOnly) {
          return false;
        }
        if (layer.dropboxDomain === "observations") {
          return Boolean(coverage.dropboxObservs);
        }
        if (layer.dropboxDomain === "aqilevels") {
          return Boolean(coverage.dropboxAqilevels);
        }
        if (layer.dropboxDomain === "both") {
          return Boolean(coverage.dropboxObservs) && Boolean(coverage.dropboxAqilevels);
        }
        return false;
      }

      function resolveCoverageSquareLayers(coverage) {
        const slots = [null, null, null, null];
        if (coverage.isToday) {
          return slots;
        }
        if (coverage.ingest) {
          slots[0] = { key: "ingest", label: "Ingest DB", className: "coverage-bar-ingest" };
          if (coverage.obsAqiObservs) {
            slots[2] = {
              key: "obsaqi-observs-bottom",
              label: "ObsAQI DB - Obs",
              className: "coverage-bar-obsaqi-observs",
            };
          }
          if (coverage.obsAqiAqilevels) {
            slots[3] = {
              key: "obsaqi-aqilevels-bottom",
              label: "ObsAQI DB - AQI",
              className: "coverage-bar-obsaqi-aqilevels",
            };
          }
          return slots;
        }
        if (coverage.obsAqiObservs) {
          slots[0] = {
            key: "obsaqi-observs-top",
            label: "ObsAQI DB - Obs",
            className: "coverage-bar-obsaqi-observs",
          };
        }
        if (coverage.obsAqiAqilevels) {
          slots[1] = {
            key: "obsaqi-aqilevels-top",
            label: "ObsAQI DB - AQI",
            className: "coverage-bar-obsaqi-aqilevels",
          };
        }
        if (coverage.r2Observs) {
          slots[2] = {
            key: "r2-observs-bottom",
            label: "R2 History - Obs",
            className: "coverage-bar-r2-observs",
            dropboxDomain: "observations",
          };
        } else if (coverage.dropboxObservs) {
          slots[2] = {
            key: "dropbox-observs-bottom",
            label: "Backup - Obs",
            className: "coverage-square-dropbox-only-observs",
            dropboxDomain: "observations",
            forceBackupIcon: true,
          };
        }
        if (coverage.r2Aqilevels) {
          slots[3] = {
            key: "r2-aqilevels-bottom",
            label: "R2 History - AQI",
            className: "coverage-bar-r2-aqilevels",
            dropboxDomain: "aqilevels",
          };
        } else if (coverage.dropboxAqilevels) {
          slots[3] = {
            key: "dropbox-aqilevels-bottom",
            label: "Backup - AQI",
            className: "coverage-square-dropbox-only-aqilevels",
            dropboxDomain: "aqilevels",
            forceBackupIcon: true,
          };
        }
        return slots;
      }

      function formatCoverageDayTooltip(cell) {
        const cellSources = summarizeCoverageSources(cell.coverage);
        if (cell.coverage.isToday && !cellSources.length) {
          return `${cell.dateKey} • Today excluded (complete days only)`;
        }
        if (!cellSources.length) {
          return `${cell.dateKey} • No data in storage layers`;
        }
        return `${cell.dateKey} • Sources: ${cellSources.join(", ")}`;
      }

      function renderCoverageYearGrid(yearStartUtc, dayCoverageRows) {
        const monthMarkup = Array.from({ length: 12 }, (_, monthOffset) => {
          const monthStartUtc = addUtcMonths(yearStartUtc, monthOffset);
          const monthCells = buildCoverageCalendarCells(monthStartUtc, dayCoverageRows);
          const weekdayMarkup = COVERAGE_WEEKDAY_ABBREVIATIONS
            .map((weekdayLabel) => `<span class="coverage-year-weekday">${weekdayLabel}</span>`)
            .join("");
          const dayMarkup = monthCells
            .map((cell) => {
              const outsideClass = cell.isInMonth ? "" : " is-outside";
              const todayClass = cell.coverage.isToday ? " is-today" : "";
              const slotLayers = cell.isInMonth
                ? resolveCoverageSquareLayers(cell.coverage)
                : [null, null, null, null];
              const squaresMarkup = slotLayers
                .map((layer) => {
                  if (!layer) {
                    return '<span class="coverage-square is-empty"></span>';
                  }
                  const hasBackupIcon = layer.forceBackupIcon || coverageLayerHasDropboxBackup(layer, cell.coverage);
                  const backupClass = hasBackupIcon ? " has-backup-icon" : "";
                  const squareTitle = hasBackupIcon ? `${layer.label} • Backup` : layer.label;
                  return `<span class="coverage-square ${layer.className}${backupClass}" title="${escapeHtml(squareTitle)}"></span>`;
                })
                .join("");
              return `
                <div class="coverage-year-day${outsideClass}${todayClass}" title="${escapeHtml(formatCoverageDayTooltip(cell))}">
                  <div class="coverage-square-grid">${squaresMarkup}</div>
                </div>
              `;
            })
            .join("");
          return `
            <section class="coverage-year-month">
              <h3 class="coverage-year-month-title">${escapeHtml(formatCoverageMonthShortTitle(monthStartUtc))}</h3>
              <div class="coverage-year-weekdays">${weekdayMarkup}</div>
              <div class="coverage-year-days">${dayMarkup}</div>
            </section>
          `;
        }).join("");
        return `<div class="coverage-year-grid">${monthMarkup}</div>`;
      }

      function formatR2CountAxisValue(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
          return "n/a";
        }
        const numeric = Number(value);
        const abs = Math.abs(numeric);
        if (abs >= 1000) {
          return formatCompactCount(numeric);
        }
        if (abs >= 100) {
          return Math.round(numeric).toLocaleString();
        }
        if (abs >= 10) {
          return numeric.toFixed(0);
        }
        return numeric.toFixed(1);
      }

      function buildR2ConnectorCountsRequest(monthStartUtc, isYearMode) {
        if (isYearMode) {
          const yearStartUtc = new Date(Date.UTC(monthStartUtc.getUTCFullYear(), 0, 1, 0, 0, 0, 0));
          const yearEndUtc = new Date(Date.UTC(monthStartUtc.getUTCFullYear(), 11, 31, 0, 0, 0, 0));
          const fromDay = toUtcDateKey(yearStartUtc);
          const toDay = toUtcDateKey(yearEndUtc);
          return {
            requestKey: `month:${fromDay}:${toDay}`,
            fromDay,
            toDay,
            grain: "month",
          };
        }
        const fromDay = toUtcDateKey(monthStartUtc);
        const toDay = toUtcDateKey(addUtcDays(addUtcMonths(monthStartUtc, 1), -1));
        return {
          requestKey: `day:${fromDay}:${toDay}`,
          fromDay,
          toDay,
          grain: "day",
        };
      }

      function findR2ConnectorCountsEntry(payload, connectorId) {
        if (!payload || !Array.isArray(payload.connectors)) {
          return null;
        }
        return payload.connectors.find((entry) => Number(entry.connector_id) === Number(connectorId)) || null;
      }

      function resolveR2ConnectorChartConfigs(payload) {
        const seen = new Set();
        const resolved = [];
        R2_CONNECTOR_CHARTS.forEach((entry) => {
          seen.add(entry.connectorId);
          resolved.push(entry);
        });
        const payloadIds = Array.isArray(payload?.connectors)
          ? payload.connectors
            .map((entry) => Number(entry && entry.connector_id))
            .filter((value) => Number.isFinite(value) && value > 0)
            .sort((a, b) => a - b)
          : [];
        payloadIds.forEach((connectorId) => {
          if (seen.has(connectorId)) {
            return;
          }
          seen.add(connectorId);
          resolved.push({
            connectorId,
            title: `Connector ${connectorId}`,
            observsColor: "#4B443A",
            aqiColor: "#A08D74",
          });
        });
        return resolved;
      }

      function buildEmptyConnectorBuckets(request) {
        const buckets = [];
        let cursorDay = request.fromDay;
        while (cursorDay && cursorDay <= request.toDay) {
          const bucketKey = request.grain === "month" ? cursorDay.slice(0, 7) : cursorDay;
          const current = buckets[buckets.length - 1];
          if (current && current.bucket_key === bucketKey) {
            current.bucket_end_day_utc = cursorDay;
            current.calendar_day_count += 1;
          } else {
            buckets.push({
              bucket_key: bucketKey,
              bucket_start_day_utc: cursorDay,
              bucket_end_day_utc: cursorDay,
              calendar_day_count: 1,
              observations_rows: 0,
              observations_present_days: 0,
              observations_avg_rows_per_day: 0,
              aqilevels_rows: 0,
              aqilevels_present_days: 0,
              aqilevels_avg_rows_per_day: 0,
              total_rows: 0,
              total_avg_rows_per_day: 0,
            });
          }
          cursorDay = addUtcDays(parseUtcDateKey(cursorDay), 1);
          cursorDay = cursorDay ? toUtcDateKey(cursorDay) : null;
        }
        return buckets;
      }

      function normalizeR2ConnectorBuckets(entry, request) {
        const buckets = Array.isArray(entry?.buckets) ? entry.buckets : [];
        if (buckets.length > 0) {
          return buckets;
        }
        return buildEmptyConnectorBuckets(request);
      }

      function buildR2ConnectorBucketTooltip(config, bucket, isYearMode) {
        const obsRows = Number(bucket?.observations_rows || 0);
        const aqiRows = Number(bucket?.aqilevels_rows || 0);
        const totalRows = obsRows + aqiRows;
        const periodLabel = isYearMode
          ? formatMonthYearLabel(bucket?.bucket_start_day_utc)
          : (formatDateDdMmYyyy(bucket?.bucket_start_day_utc) || String(bucket?.bucket_start_day_utc || ""));
        if (isYearMode) {
          return [
            config.title,
            periodLabel,
            `Obs avg/day: ${formatRowRate(bucket?.observations_avg_rows_per_day || 0)}`,
            `AQI avg/day: ${formatRowRate(bucket?.aqilevels_avg_rows_per_day || 0)}`,
            `Obs rows: ${formatCount(obsRows)}`,
            `AQI rows: ${formatCount(aqiRows)}`,
            `Total rows: ${formatCount(totalRows)}`,
            `Calendar days: ${formatCount(bucket?.calendar_day_count || 0)}`,
          ].join("\n");
        }
        return [
          config.title,
          periodLabel,
          `Obs rows: ${formatCount(obsRows)}`,
          `AQI rows: ${formatCount(aqiRows)}`,
          `Total rows: ${formatCount(totalRows)}`,
        ].join("\n");
      }

      function buildR2ConnectorChartSvg({ connectorConfig, entry, request, isYearMode }) {
        const buckets = normalizeR2ConnectorBuckets(entry, request);
        const displayMode = r2ConnectorCountsMode;
        const width = 960;
        const height = 210;
        const margin = { top: 10, right: 10, bottom: 28, left: 44 };
        const innerWidth = width - margin.left - margin.right;
        const innerHeight = height - margin.top - margin.bottom;
        const baselineY = height - margin.bottom;
        const bucketCount = Math.max(1, buckets.length);
        const stepX = innerWidth / bucketCount;
        const barWidth = Math.max(1.5, stepX * 0.72);

        const seriesValues = buckets.map((bucket) => {
          const obsValue = isYearMode
            ? Number(bucket?.observations_avg_rows_per_day || 0)
            : Number(bucket?.observations_rows || 0);
          const aqiValue = isYearMode
            ? Number(bucket?.aqilevels_avg_rows_per_day || 0)
            : Number(bucket?.aqilevels_rows || 0);
          return {
            observations: obsValue,
            aqilevels: aqiValue,
            total: obsValue + aqiValue,
          };
        });
        const maxValue = seriesValues.reduce((max, value) => {
          if (displayMode === "observs") {
            return Math.max(max, value.observations);
          }
          if (displayMode === "aqi") {
            return Math.max(max, value.aqilevels);
          }
          return Math.max(max, value.total);
        }, 0);

        if (maxValue <= 0) {
          return `<div class="coverage-connector-chart-empty">No R2 rows in the selected period.</div>`;
        }

        const yMax = computeAxisMax(maxValue);
        const yFor = (value) => margin.top + (1 - (Number(value) || 0) / yMax) * innerHeight;
        const yTicks = buildYAxisTicks(yMax, 4);

        const barsMarkup = buckets.map((bucket, index) => {
          const x = margin.left + index * stepX + (stepX - barWidth) / 2;
          const obsValue = seriesValues[index].observations;
          const aqiValue = seriesValues[index].aqilevels;
          const tooltip = escapeHtml(buildR2ConnectorBucketTooltip(connectorConfig, bucket, isYearMode));

          if (displayMode === "observs" || displayMode === "aqi") {
            const value = displayMode === "observs" ? obsValue : aqiValue;
            const y = yFor(value);
            const barHeight = Math.max(0, baselineY - y);
            const color = displayMode === "observs"
              ? connectorConfig.observsColor
              : connectorConfig.aqiColor;
            return `
              <g>
                <title>${tooltip}</title>
                <rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${barWidth.toFixed(2)}" height="${barHeight.toFixed(2)}" rx="3" fill="${color}" />
              </g>
            `;
          }

          const aqiTopY = yFor(aqiValue);
          const totalTopY = yFor(aqiValue + obsValue);
          const aqiHeight = Math.max(0, baselineY - aqiTopY);
          const obsHeight = Math.max(0, aqiTopY - totalTopY);
          return `
            <g>
              <title>${tooltip}</title>
              <rect x="${x.toFixed(2)}" y="${aqiTopY.toFixed(2)}" width="${barWidth.toFixed(2)}" height="${aqiHeight.toFixed(2)}" rx="3" fill="${connectorConfig.aqiColor}" />
              <rect x="${x.toFixed(2)}" y="${totalTopY.toFixed(2)}" width="${barWidth.toFixed(2)}" height="${obsHeight.toFixed(2)}" rx="3" fill="${connectorConfig.observsColor}" />
            </g>
          `;
        }).join("");

        const xLabelsMarkup = buckets.map((bucket, index) => {
          const x = margin.left + index * stepX + stepX / 2;
          const label = isYearMode
            ? formatMonthShortLabel(bucket?.bucket_start_day_utc)
            : String((bucket?.bucket_start_day_utc || "").slice(-2)).replace(/^0/, "");
          return `
            <text x="${x.toFixed(2)}" y="${height - 8}" text-anchor="middle" fill="#6b6255" font-size="10" font-family="IBM Plex Mono, ui-monospace, monospace">${escapeHtml(label)}</text>
          `;
        }).join("");

        return `
          <svg class="coverage-connector-chart-svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMinYMin meet" role="img" aria-label="${escapeHtml(connectorConfig.title)} R2 connector row counts">
            ${yTicks.map((tick) => {
              const y = yFor(tick);
              return `
                <line x1="${margin.left}" y1="${y.toFixed(2)}" x2="${width - margin.right}" y2="${y.toFixed(2)}" stroke="#e8ddcd" stroke-width="1" />
                <text x="${margin.left - 6}" y="${(y + 4).toFixed(2)}" text-anchor="end" fill="#6b6255" font-size="10" font-family="IBM Plex Mono, ui-monospace, monospace">${escapeHtml(formatR2CountAxisValue(tick))}</text>
              `;
            }).join("")}
            <line x1="${margin.left}" y1="${baselineY}" x2="${width - margin.right}" y2="${baselineY}" stroke="#bfae91" stroke-width="1.2" />
            ${barsMarkup}
            ${xLabelsMarkup}
          </svg>
        `;
      }

      function renderR2ConnectorCountsBody(container, request, isYearMode, payload, errorMessage = "", isLoading = false) {
        const chartConfigs = resolveR2ConnectorChartConfigs(payload);
        const sectionTitle = "R2 connector row counts";
        const toggleMarkup = Array.from(R2_CONNECTOR_COUNTS_MODE_VALUES).map((mode) => {
          const active = mode === r2ConnectorCountsMode;
          const label = mode === "stacked" ? "Stacked" : mode === "observs" ? "Observs" : "AQI";
          return `
            <button
              type="button"
              class="coverage-calendar-view-btn${active ? " is-active" : ""}"
              data-action="r2-counts-mode"
              data-mode="${mode}"
              ${active ? "disabled aria-pressed=\"true\"" : "aria-pressed=\"false\""}
            >${label}</button>
          `;
        }).join("");

        let bodyMarkup = `<div class="coverage-connector-chart-empty">Loading R2 connector counts...</div>`;
        if (errorMessage) {
          bodyMarkup = `<div class="coverage-connector-chart-empty">Failed to load R2 connector counts: ${escapeHtml(errorMessage)}</div>`;
        } else if (!isLoading) {
          const cardsMarkup = chartConfigs.map((config) => {
            const entry = findR2ConnectorCountsEntry(payload, config.connectorId);
            const chartTitle = `${config.title} - Connector Id ${config.connectorId}`;
            const svgMarkup = buildR2ConnectorChartSvg({
              connectorConfig: config,
              entry,
              request,
              isYearMode,
            });
            return `
              <article class="coverage-connector-chart-card">
                <div class="coverage-connector-chart-head">
                  <h3>${escapeHtml(chartTitle)}</h3>
                  <div class="coverage-connector-chart-legend">
                    <span><span class="coverage-connector-chart-swatch" style="background:${config.observsColor}"></span>Observs</span>
                    <span><span class="coverage-connector-chart-swatch" style="background:${config.aqiColor}"></span>AQI</span>
                  </div>
                </div>
                <div class="coverage-connector-chart-wrap">${svgMarkup}</div>
              </article>
            `;
          }).join("");
          bodyMarkup = `<div class="coverage-connector-chart-grid">${cardsMarkup}</div>`;
        }

        const subtitle = isYearMode
          ? "Year view shows monthly average rows per day. Stacked mode places AQI on the bottom and Observs on the top."
          : "Month view shows daily row totals. Stacked mode places AQI on the bottom and Observs on the top.";
        const payloadWarningParts = [];
        if (payload && payload.read_version_label) {
          payloadWarningParts.push(`active version ${payload.read_version_label}`);
        }
        if (payload && payload.error) {
          const attemptedKeys = payload.index_keys && typeof payload.index_keys === "object"
            ? Object.values(payload.index_keys).filter(Boolean).join(", ")
            : "unknown index key";
          payloadWarningParts.push(`index warning: ${payload.error}; attempted ${attemptedKeys}`);
        }
        if (payload && payload.read_version_warning) {
          payloadWarningParts.push(payload.read_version_warning);
        }
        const payloadWarningMarkup = payloadWarningParts.length
          ? `<div class="coverage-connector-counts-note is-warning">${escapeHtml(payloadWarningParts.join(" • "))}</div>`
          : "";

        container.innerHTML = `
          <div class="coverage-connector-counts-head">
            <h3 class="coverage-connector-counts-title">${escapeHtml(sectionTitle)}</h3>
            <div class="coverage-calendar-view">
              <span class="coverage-calendar-view-label">Series</span>
              <span class="coverage-calendar-view-toggle" role="group" aria-label="R2 connector count display mode">
                ${toggleMarkup}
              </span>
            </div>
          </div>
          <div class="coverage-connector-counts-note">${escapeHtml(subtitle)}</div>
          ${payloadWarningMarkup}
          ${bodyMarkup}
        `;

        const modeButtons = Array.from(container.querySelectorAll('[data-action="r2-counts-mode"]'));
        modeButtons.forEach((button) => {
          button.addEventListener("click", () => {
            const requestedMode = String(button.dataset.mode || "");
            if (!R2_CONNECTOR_COUNTS_MODE_VALUES.has(requestedMode) || requestedMode === r2ConnectorCountsMode) {
              return;
            }
            r2ConnectorCountsMode = requestedMode;
            try {
              localStorage.setItem(R2_CONNECTOR_COUNTS_MODE_STORAGE_KEY, r2ConnectorCountsMode);
            } catch (_err) {
              // Ignore localStorage write failures.
            }
            const cachedPayload = latestR2ConnectorCounts && latestR2ConnectorCounts.requestKey === request.requestKey
              ? latestR2ConnectorCounts.payload
              : payload;
            renderR2ConnectorCountsBody(
              container,
              request,
              isYearMode,
              cachedPayload,
              errorMessage,
              isLoading,
            );
          });
        });
      }

      async function loadR2ConnectorCounts(container, { monthStartUtc, isYearMode, forceRefresh = false }) {
        const requestId = ++r2ConnectorCountsLoadSequence;
        const request = buildR2ConnectorCountsRequest(monthStartUtc, isYearMode);
        container.dataset.requestKey = request.requestKey;
        const cached = !forceRefresh
          && latestR2ConnectorCounts
          && latestR2ConnectorCounts.requestKey === request.requestKey
          && Number.isFinite(Number(latestR2ConnectorCounts.fetchedAtMs))
          && (Date.now() - Number(latestR2ConnectorCounts.fetchedAtMs)) < R2_CONNECTOR_COUNTS_CACHE_TTL_MS
          ? latestR2ConnectorCounts.payload
          : null;
        if (cached) {
          renderR2ConnectorCountsBody(container, request, isYearMode, cached);
          return;
        }

        renderR2ConnectorCountsBody(container, request, isYearMode, null, "", true);
        try {
          const params = new URLSearchParams({
            from_day: request.fromDay,
            to_day: request.toDay,
            grain: request.grain,
            t: String(Date.now()),
          });
          const resp = await fetch(buildApiUrl("r2_connector_counts", params));
          const text = await resp.text();
          let payload = null;
          try {
            payload = JSON.parse(text);
          } catch (_err) {
            payload = null;
          }
          if (!resp.ok) {
            const message = buildResponseErrorMessage(resp, payload, text);
            throw new Error(message);
          }
          if (requestId !== r2ConnectorCountsLoadSequence) {
            return;
          }
          if (!document.body.contains(container) || container.dataset.requestKey !== request.requestKey) {
            return;
          }
          latestR2ConnectorCounts = {
            requestKey: request.requestKey,
            payload,
            fetchedAtMs: Date.now(),
          };
          renderR2ConnectorCountsBody(container, request, isYearMode, payload);
          if (String(errorEl.textContent || "").startsWith(R2_CONNECTOR_COUNTS_ERROR_PREFIX)) {
            setError("");
          }
        } catch (error) {
          if (requestId !== r2ConnectorCountsLoadSequence) {
            return;
          }
          if (!document.body.contains(container) || container.dataset.requestKey !== request.requestKey) {
            return;
          }
          const message = error && error.message ? error.message : String(error);
          renderR2ConnectorCountsBody(container, request, isYearMode, null, message, false);
          setError(`${R2_CONNECTOR_COUNTS_ERROR_PREFIX} ${message}`);
        }
      }

      function renderServiceEgressPanel(rows, sourceError) {
        const panel = document.createElement("section");
        panel.className = "panel";
        panel.dataset.panel = "service-egress";

        const normalizedRows = Array.isArray(rows) ? rows : [];
        const cutoffMs = Date.now() - (24 * 60 * 60 * 1000);
        const latestSnapshotRows = normalizedRows.filter((row) => {
          if (!row) return false;
          const bucketMs = new Date(row.bucket_minute || "").getTime();
          return Number.isFinite(bucketMs) && bucketMs >= cutoffMs;
        });

        const grouped = new Map();
        latestSnapshotRows.forEach((row) => {
          const key = [
            String(row.source_type || "other"),
            String(row.route_name || ""),
            String(row.query_name || ""),
            String(row.window_label || ""),
          ].join("|");
          const current = grouped.get(key) || {
            source_type: String(row.source_type || "other"),
            route_name: String(row.route_name || ""),
            query_name: String(row.query_name || ""),
            window_label: String(row.window_label || ""),
            request_count: 0,
            response_rows: 0,
            response_bytes_est: 0,
            upstream_bytes_est: 0,
            duration_ms: 0,
            error_count: 0,
          };
          current.request_count += Number(row.request_count || 0);
          current.response_rows += Number(row.response_rows || 0);
          current.response_bytes_est += Number(row.response_bytes_est || 0);
          current.upstream_bytes_est += Number(row.upstream_bytes_est || 0);
          current.duration_ms += Number(row.duration_ms || 0);
          current.error_count += Number(row.error_count || 0);
          grouped.set(key, current);
        });

        const tableRows = Array.from(grouped.values()).sort((a, b) => {
          const aBytes = Number(a.response_bytes_est || 0) + Number(a.upstream_bytes_est || 0);
          const bBytes = Number(b.response_bytes_est || 0) + Number(b.upstream_bytes_est || 0);
          return bBytes - aBytes;
        });

        const totals = tableRows.reduce((acc, row) => {
          acc.request_count += Number(row.request_count || 0);
          acc.response_rows += Number(row.response_rows || 0);
          acc.response_bytes_est += Number(row.response_bytes_est || 0);
          acc.upstream_bytes_est += Number(row.upstream_bytes_est || 0);
          acc.duration_ms += Number(row.duration_ms || 0);
          acc.error_count += Number(row.error_count || 0);
          return acc;
        }, {
          request_count: 0,
          response_rows: 0,
          response_bytes_est: 0,
          upstream_bytes_est: 0,
          duration_ms: 0,
          error_count: 0,
        });

        const rowsMarkup = tableRows.length
          ? tableRows.map((row) => `
              <tr>
                <td>${escapeHtml(String(row.source_type || ""))}</td>
                <td>${escapeHtml(String(row.window_label || "all"))}</td>
                <td class="egress-wrap">${escapeHtml(String(row.route_name || ""))}</td>
                <td class="egress-query">${escapeHtml(String(row.query_name || ""))}</td>
                <td>${formatCount(row.request_count)}</td>
                <td>${formatCompactCount(row.response_rows)}</td>
                <td>${formatBytesBestFit(row.response_bytes_est)}</td>
                <td>${formatBytesBestFit(row.upstream_bytes_est)}</td>
                <td>${formatCompactCount(row.duration_ms)}</td>
                <td>${formatCount(row.error_count)}</td>
              </tr>
            `).join("")
          : `<tr><td colspan="10">No Supabase endpoint egress rows in the last 24h.</td></tr>`;

        const warningLine = sourceError
          ? `<div class="footnote">Metrics source warning: ${escapeHtml(String(sourceError))}</div>`
          : "";

        panel.innerHTML = `
          <h2>Supabase Endpoint Egress (24h) <span class="chip">beta</span></h2>
          <div class="meta-note">
            Requests ${formatCount(totals.request_count)} · Supabase response ${formatBytesBestFit(totals.response_bytes_est)} · Upstream ${formatBytesBestFit(totals.upstream_bytes_est)} · Errors ${formatCount(totals.error_count)}
          </div>
          <div class="table-scroll table-scroll-egress">
            <table class="egress-table">
              <colgroup>
                <col class="egress-col-source">
                <col class="egress-col-window">
                <col class="egress-col-route">
                <col class="egress-col-query">
                <col class="egress-col-req">
                <col class="egress-col-rows">
                <col class="egress-col-resp">
                <col class="egress-col-upstream">
                <col class="egress-col-duration">
                <col class="egress-col-errors">
              </colgroup>
              <thead>
                <tr>
                  <th>Source</th>
                  <th>Window</th>
                  <th class="egress-wrap">Route</th>
                  <th class="egress-query-head">Query</th>
                  <th>Req</th>
                  <th>Rows</th>
                  <th>Resp bytes</th>
                  <th>Upstream bytes</th>
                  <th>Duration ms</th>
                  <th>Errors</th>
                </tr>
              </thead>
              <tbody>${rowsMarkup}</tbody>
            </table>
          </div>
          <div class="footnote">Rollup source: uk_aq_public.uk_aq_endpoint_egress_metrics_24h_dashboard. Values are estimates, not Supabase billing authority.</div>
          ${warningLine}
        `;

        return panel;
      }

      function renderStorageCoverageCalendarPanel(serverCoverageRows, options = {}) {
        const forceConnectorCountsRefresh = Boolean(options.forceConnectorCountsRefresh);
        const monthStartUtc = storageCoverageMonthCursor || startOfUtcMonth(new Date());
        const resolved = resolveCoverageRowsForMonth(monthStartUtc, serverCoverageRows);
        const panel = document.createElement("section");
        panel.className = "panel coverage-calendar-panel";
        panel.dataset.panel = "storage-coverage";
        const isYearMode = storageCoverageMode === "year";
        const navStepMonths = isYearMode ? 12 : 1;
        const titleText = isYearMode
          ? formatCoverageYearTitle(monthStartUtc)
          : formatCoverageMonthTitle(monthStartUtc);
        const previousLabel = isYearMode ? "&lt; Previous Year" : "&lt; Previous";
        const nextLabel = isYearMode ? "Next Year &gt;" : "Next &gt;";
        const r2Version = options.r2HistoryReadVersion || latestR2HistoryReadVersion || {};
        const r2VersionLabel = String(r2Version.label || (r2Version.version ? `R2_${r2Version.version}` : "R2_?"));
        const r2VersionWarning = String(r2Version.warning || "");
        const r2VersionClass = r2VersionWarning || r2Version.valid === false ? " is-warning" : "";
        const r2VersionTitle = r2VersionWarning || `${r2VersionLabel} selected by UK_AQ_R2_HISTORY_VERSION`;

        let bodyMarkup = "";
        let footnoteText = "";
        if (isYearMode) {
          const yearStartUtc = new Date(Date.UTC(monthStartUtc.getUTCFullYear(), 0, 1, 0, 0, 0, 0));
          bodyMarkup = renderCoverageYearGrid(yearStartUtc, resolved.rows);
          footnoteText = "Squares only and complete days only (today excluded). With ingest: red top-left and blue/green on the bottom row. Without ingest: blue/green on top row and R2 orange/yellow on bottom row. Backup-only days use the same filled orange/yellow storage colours with a blue Dropbox icon.";
        } else {
          const calendarCells = buildCoverageCalendarCells(monthStartUtc, resolved.rows, true);
          const cellsMarkup = calendarCells
            .map((cell) => {
              const { topLayer, middleLayer, bottomLayer } = resolveCoverageBarLayers(cell.coverage);
              const outsideClass = cell.isInMonth ? "" : " is-outside";
              const todayClass = cell.coverage.isToday ? " is-today" : "";
              const dayTooltip = formatCoverageDayTooltip(cell);

              const renderBar = (layer) => {
                if (!layer) return "";
                const isToday = cell.coverage.isToday;
                const halfClass = isToday ? " is-half" : "";
                const hasDropboxBackup = !isToday && coverageLayerHasDropboxBackup(layer, cell.coverage);
                const backupBadgeMarkup = hasDropboxBackup
                  ? `<span class="coverage-bar-label-secondary is-dropbox-badge"><img class="coverage-bar-label-secondary-icon is-dropbox-blue" src="${DASHBOARD_DROPBOX_ICON_PATH}" alt="" aria-hidden="true">Backup</span>`
                  : "";
                const primaryLabelMarkup = layer.primaryDropboxIcon
                  ? `<span class="coverage-bar-label-primary with-icon"><img class="coverage-bar-label-primary-icon" src="${DASHBOARD_DROPBOX_ICON_PATH}" alt="" aria-hidden="true"><span class="coverage-bar-label-primary-text">${escapeHtml(layer.label)}</span></span>`
                  : `<span class="coverage-bar-label-primary">${escapeHtml(layer.label)}</span>`;
                let labelMarkup = "";
                if (!isToday && layer.hideLabel && backupBadgeMarkup) {
                  labelMarkup = `<span class="coverage-bar-label">${backupBadgeMarkup}</span>`;
                } else if (!isToday && !layer.hideLabel && layer.label) {
                  labelMarkup = `<span class="coverage-bar-label${hasDropboxBackup ? " has-secondary" : ""}">${primaryLabelMarkup}${backupBadgeMarkup}</span>`;
                }
                return `<span class="coverage-bar ${layer.className}${halfClass}" title="${escapeHtml(layer.label)}">${labelMarkup}</span>`;
              };

              return `
                <div class="coverage-day-cell${outsideClass}${todayClass}" title="${escapeHtml(dayTooltip)}">
                  <div class="coverage-day-title">
                    <span class="coverage-day-number">${cell.dayNumber}</span>
                    <span class="coverage-day-weekday">${escapeHtml(cell.weekdayLabel)}</span>
                  </div>
                  <div class="coverage-bars">
                    <div class="coverage-bar-slot">${renderBar(topLayer)}</div>
                    <div class="coverage-bar-slot">${renderBar(middleLayer)}</div>
                    <div class="coverage-bar-slot">${renderBar(bottomLayer)}</div>
                  </div>
                </div>
              `;
            })
            .join("");
          bodyMarkup = `<div class="coverage-calendar-grid">${cellsMarkup}</div>`;
          footnoteText = "Top: Ingest DB (red), R2 History - Obs (orange), or Backup - Obs (orange filled). Middle: ObsAQI DB - Obs (blue). Bottom: AQI (yellow/green, striped when both R2 + ObsAQI are present) or Backup - AQI (yellow filled). R2 bars with Dropbox copy show a second line (blue Dropbox icon + Backup). Today shows half-width bars.";
        }

        panel.innerHTML = `
          <div class="coverage-calendar-head">
            <h2 class="coverage-calendar-title">${escapeHtml(titleText)}</h2>
            <span class="coverage-calendar-version${r2VersionClass}" title="${escapeHtml(r2VersionTitle)}">${escapeHtml(r2VersionLabel)}</span>
            <div class="coverage-calendar-nav">
              <span class="coverage-calendar-view">
                <span class="coverage-calendar-view-label">View</span>
                <span class="coverage-calendar-view-toggle" role="group" aria-label="Coverage calendar view">
                  <button
                    type="button"
                    class="coverage-calendar-view-btn${isYearMode ? " is-active" : ""}"
                    data-action="coverage-mode"
                    data-mode="year"
                    ${isYearMode ? "disabled aria-pressed=\"true\"" : "aria-pressed=\"false\""}
                  >Year</button>
                  <button
                    type="button"
                    class="coverage-calendar-view-btn${isYearMode ? "" : " is-active"}"
                    data-action="coverage-mode"
                    data-mode="month"
                    ${isYearMode ? "aria-pressed=\"false\"" : "disabled aria-pressed=\"true\""}
                  >Month</button>
                </span>
              </span>
              <button type="button" class="coverage-calendar-nav-btn" data-action="today-period">Today</button>
              <button type="button" class="settings-button r2-refresh-button" data-action="force-refresh">Force Refresh</button>
              <button type="button" class="coverage-calendar-nav-btn" data-action="prev-period">${previousLabel}</button>
              <button type="button" class="coverage-calendar-nav-btn" data-action="next-period">${nextLabel}</button>

          <div class="coverage-connector-counts-section" data-role="r2-connector-counts"></div>
        `;

        const handlePeriodChange = (monthDelta) => {
          storageCoverageMonthCursor = addUtcMonths(monthStartUtc, monthDelta);
          try {
            localStorage.setItem(
              STORAGE_COVERAGE_MONTH_STORAGE_KEY,
              formatCoverageMonthStorageKey(storageCoverageMonthCursor),
            );
          } catch (_err) {
            // Ignore localStorage write failures.
          }
          const nextPanel = renderStorageCoverageCalendarPanel(serverCoverageRows);
          panel.replaceWith(nextPanel);
        };

        const forceRefreshButton = panel.querySelector('[data-action="force-refresh"]');
        const todayButton = panel.querySelector('[data-action="today-period"]');
        const prevButton = panel.querySelector('[data-action="prev-period"]');
        const nextButton = panel.querySelector('[data-action="next-period"]');
        const modeButtons = Array.from(panel.querySelectorAll('[data-action="coverage-mode"]'));
        if (forceRefreshButton) {
          forceRefreshButton.addEventListener("click", async () => {
            forceRefreshButton.disabled = true;
            forceRefreshButton.textContent = "Force Refreshing...";
            try {
              if (activeMode === "operations") {
                await loadOperationsDashboard({ forceRefresh: true });
              } else {
                await loadDashboard({ forceRefresh: true });
              }
            } finally {
              if (document.body.contains(forceRefreshButton)) {
                forceRefreshButton.disabled = false;
                forceRefreshButton.textContent = "Force Refresh";
              }
            }
          });
        }
        if (todayButton) {
          todayButton.addEventListener("click", () => {
            const now = new Date();
            storageCoverageMonthCursor = isYearMode
              ? new Date(Date.UTC(now.getUTCFullYear(), 0, 1, 0, 0, 0, 0))
              : startOfUtcMonth(now);
            try {
              localStorage.setItem(
                STORAGE_COVERAGE_MONTH_STORAGE_KEY,
                formatCoverageMonthStorageKey(storageCoverageMonthCursor),
              );
            } catch (_err) {
              // Ignore localStorage write failures.
            }
            const nextPanel = renderStorageCoverageCalendarPanel(serverCoverageRows);
            panel.replaceWith(nextPanel);
          });
        }
        if (prevButton) {
          prevButton.addEventListener("click", () => handlePeriodChange(-1 * navStepMonths));
        }
        if (nextButton) {
          nextButton.addEventListener("click", () => handlePeriodChange(1 * navStepMonths));
        }

      async function loadStorageCoverage(options = {}) {
        if (activeMode !== "operations") {
          return;
        }
        const forceRefresh = Boolean(options.forceRefresh);
        const parentLoadId = Number(options.parentLoadId) || 0;
        const requestId = ++storageCoverageLoadSequence;
        const loadingLabel = forceRefresh ? "Force refreshing calendar..." : "Refreshing calendar...";
        upsertStorageCoveragePanel(renderStorageCoverageLoadingPanel(loadingLabel));
        try {
          const params = new URLSearchParams();
          params.set("t", String(Date.now()));
          if (forceRefresh) {
            params.set("force", "1");
          }
          const storageCoverageUrl = buildApiUrl("storage_coverage", params);
          const resp = await fetch(storageCoverageUrl);
          const text = await resp.text();
          let payload = null;
          try {
            payload = JSON.parse(text);
          } catch (_err) {
            payload = null;
          }
          if (!resp.ok) {
            const message = buildResponseErrorMessage(resp, payload, text);
            throw new Error(message);
          }
          if (requestId !== storageCoverageLoadSequence) {
            return;
          }
          if (parentLoadId && parentLoadId !== operationsLoadSequence) {
            return;
          }
          const data = payload || {};
          const coverageRows = Array.isArray(data.storage_coverage_days)
            ? data.storage_coverage_days
            : [];
          if (latestDashboardData && typeof latestDashboardData === "object") {
            latestDashboardData.storage_coverage_days = coverageRows;
            latestDashboardData.storage_coverage_source =
              data.storage_coverage_source || "live_per_day_presence";
            latestDashboardData.r2_history_read_version =
              data.r2_history_read_version || latestDashboardData.r2_history_read_version;
          }
          latestR2HistoryReadVersion = data.r2_history_read_version || latestR2HistoryReadVersion;
          upsertStorageCoveragePanel(
            renderStorageCoverageCalendarPanel(coverageRows, {
              forceConnectorCountsRefresh: forceRefresh,
              r2HistoryReadVersion: latestR2HistoryReadVersion,
            }),
          );
          if (String(errorEl.textContent || "").startsWith(STORAGE_COVERAGE_ERROR_PREFIX)) {
            setError("");
          }
        } catch (err) {
          if (requestId !== storageCoverageLoadSequence) {
            return;
          }
          if (parentLoadId && parentLoadId !== operationsLoadSequence) {
            return;
          }
          if (maybeRedirectToAccessLogin(err, buildApiUrl("storage_coverage"))) {
            setStatus("Cloudflare Access login required. Redirecting...");
            setError("Cloudflare Access login required. Redirecting...");
            return;
          }
          const message = err.message || String(err);
          upsertStorageCoveragePanel(
            renderStorageCoverageErrorPanel(message, { forceRefresh, parentLoadId }),
          );
          setError(`${STORAGE_COVERAGE_ERROR_PREFIX} ${message}`);
        }
      }

      function formatDurationSince(value) {
        const time = new Date(value || "").getTime();
        if (Number.isNaN(time)) {
          return "n/a";
        }
        const deltaSeconds = Math.max(0, Math.floor((Date.now() - time) / 1000));
        const hours = Math.floor(deltaSeconds / 3600);
        const minutes = Math.floor((deltaSeconds % 3600) / 60);
        const seconds = deltaSeconds % 60;
        return `${hours}h ${minutes}m ${seconds}s ago`;
      }

      function parseTimestampMs(value) {
        if (!value) {
          return null;
        }
        const parsedMs = new Date(value).getTime();
        if (Number.isNaN(parsedMs)) {
          return null;
        }
