<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>UK AQ station_snapshot_v2</title>
<style>
:root{--bg:#f3f6fb;--panel:#fff;--text:#10243b;--muted:#5e6f82;--line:#d8e0ea;--accent:#145da0;--warn:#8b1e3f}*{box-sizing:border-box}body{margin:0;font-family:"IBM Plex Sans","Segoe UI",sans-serif;background:linear-gradient(160deg,#eef4ff,#f7fbff 50%,#edf7f2);color:var(--text)}main{padding:18px;display:grid;gap:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}h1{font-size:1.35rem;margin:0 0 4px}.muted{color:var(--muted)}.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:end}label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:4px}input,select,button{border:1px solid #c4d1df;border-radius:8px;padding:8px 9px;font:inherit}input{min-width:320px}button{background:#eef4ff;color:#123;border-color:#bdd1e8;cursor:pointer;font-weight:650}button.active{background:var(--accent);color:#fff}.results{display:grid;gap:6px;margin-top:8px;max-width:780px}.result{width:100%;text-align:left;background:#fff}.status{padding:8px 10px;border-radius:8px;background:#ecf2fb;border:1px solid #d4e1f3}.warn{background:#fff5df;border-color:#f0c36a;color:#5a3b00}.error{background:#fff2f5;border-color:#efc0cf;color:var(--warn)}.table-wrap{overflow:auto}table{border-collapse:collapse;width:max-content;min-width:100%;font-size:.84rem}th,td{border-bottom:1px solid var(--line);padding:6px 8px;text-align:left;white-space:nowrap}th{position:sticky;top:0;background:#f7fbff}.num{text-align:right;font-variant-numeric:tabular-nums}.swatch{display:inline-block;width:22px;height:22px;border:1px solid #c4d1df;border-radius:4px;vertical-align:middle;background:#fff}
</style>
</head>
<body><main>
<div class="card"><h1>station_snapshot_v2</h1><div class="muted">Lightweight diagnostic for ingestdb, ObsAQIDB, R2 history, and AQI/hourly rows. v1 remains available separately.</div></div>
<div class="card"><div class="controls"><div><label for="q">Station search</label><input id="q" placeholder="Marylebone, station_id, station_ref, connector"></div><div><label>Pollutant</label><button data-pollutant="pm25" class="active">PM2.5</button> <button data-pollutant="pm10">PM10</button> <button data-pollutant="no2">NO2</button></div><div><label>Range</label><button data-range="24h" class="active">24hrs</button> <button data-range="7d">7 days</button> <button data-range="31d">31 days</button> <button data-range="90d">90 days</button></div><div id="tsBox" hidden><label for="ts">Timeseries</label><select id="ts"></select></div></div><div id="results" class="results"></div></div>
<div id="warning" class="status warn" hidden></div><div id="status" class="status">Search for a station to begin.</div>
<div class="card table-wrap"><table><thead><tr id="head"></tr></thead><tbody id="body"></tbody></table></div>
</main><script>
const cols=['observed_at','ingestdb.observs.value','obsaqidb.observs.value','r2.observs.value','aqi_source','hourly_mean_ugm3','rolling24h_mean_ugm3','hourly_sample_count','DAQI colour','daqi_index_level','EAQI colour','eaqi_index_level'];
const keys=['observed_at','ingestdb_observs_value','obsaqidb_observs_value','r2_observs_value','aqi_source','hourly_mean_ugm3','rolling24h_mean_ugm3','hourly_sample_count','daqi_colour','daqi_index_level','eaqi_colour','eaqi_index_level'];
let station=null,pollutant='pm25',range='24h',timer=null;head.innerHTML=cols.map(c=>`<th>${c}</th>`).join('');
function fmtDate(v){if(!v)return '';const d=new Date(v);return isNaN(d)?String(v):new Intl.DateTimeFormat('en-GB',{timeZone:'Europe/London',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false}).format(d).replace(',','');}
function fmt(v){if(v===null||v===undefined||v==='')return '';if(typeof v==='number')return Number.isInteger(v)?String(v):String(Math.round(v*1000)/1000);return String(v)}
async function search(){
  const q=document.getElementById('q').value.trim();
  if(q.length<2){
    results.innerHTML='';
    return;
  }

  const r=await fetch(`/api/station-snapshot-v2/search-stations?q=${encodeURIComponent(q)}`);
  const j=await r.json();
  const stations = j.stations || j.results || [];

  results.innerHTML = stations.map((s,i)=>`
    <button class="result" data-i="${i}">
      ${s.station_name || s.label || '(unnamed station)'} · station_id ${s.station_id} · connector ${s.connector_id ?? ''} · ref ${s.station_ref ?? ''}
    </button>
  `).join('') || '<div class="muted">No matches.</div>';

  [...results.querySelectorAll('button')].forEach((b,i)=>b.onclick=()=>{
    station = stations[i];
    results.innerHTML = `
      <div class="status">
        Selected: ${station.station_name || station.label || '(unnamed station)'} · station_id ${station.station_id} · connector ${station.connector_id ?? ''} · ref ${station.station_ref ?? ''}
      </div>
    `;
    loadRows();
  });
}
async function loadRows(){if(!station)return; status.textContent='Loading rows…'; warning.hidden=true; const ts=document.getElementById('ts').value; const qs=new URLSearchParams({station_id:station.station_id,pollutant,range}); if(ts)qs.set('timeseries_id',ts); const r=await fetch(`/api/station-snapshot-v2/rows?${qs}`); const j=await r.json(); if(!r.ok){status.className='status error';status.textContent=j.message||j.error||'Request failed';return} status.className='status'; status.textContent=`${j.rows.length} rows · selected timeseries ${j.selected_timeseries_id||''}`; if(j.overlap_detected){warning.hidden=false;warning.textContent='Overlap detected: both R2 and ingestdb have rows for the same observed_at. R2 is being used for AQI source values.'} const list=j.timeseries||[]; tsBox.hidden=list.length<=1; ts.innerHTML=list.map(t=>`<option value="${t.timeseries_id}" ${t.timeseries_id===j.selected_timeseries_id?'selected':''}>${t.timeseries_id} · connector ${t.connector_id} · ${t.label||''} · ${t.uom||''}</option>`).join(''); body.innerHTML=(j.rows||[]).map(row=>`<tr>${keys.map(k=>{if(k==='observed_at')return `<td>${fmtDate(row[k])}</td>`; if(k.endsWith('colour'))return `<td><span class="swatch" style="background:${row[k]||'#fff'}"></span></td>`; return `<td class="${typeof row[k]==='number'?'num':''}">${fmt(row[k])}</td>`}).join('')}</tr>`).join('');}
q.oninput=()=>{clearTimeout(timer);timer=setTimeout(search,250)}; document.querySelectorAll('[data-pollutant]').forEach(b=>b.onclick=()=>{pollutant=b.dataset.pollutant;document.querySelectorAll('[data-pollutant]').forEach(x=>x.classList.toggle('active',x===b));loadRows()}); document.querySelectorAll('[data-range]').forEach(b=>b.onclick=()=>{range=b.dataset.range;document.querySelectorAll('[data-range]').forEach(x=>x.classList.toggle('active',x===b));loadRows()}); ts.onchange=loadRows;
</script></body></html>
