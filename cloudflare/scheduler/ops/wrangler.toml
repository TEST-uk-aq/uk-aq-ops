name = "uk-aq-scheduler-ops"
main = "worker.mjs"
compatibility_date = "2026-07-10"

[triggers]
crons = [
  "0 * * * *",   # job_keys: ops.prune_daily | ops.observs_partition_maintenance
  "20 12 * * *",  # job_keys: ops.r2_core_snapshot
]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
