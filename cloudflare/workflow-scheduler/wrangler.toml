name = "uk-aq-workflow-scheduler"
main = "worker.js"
compatibility_date = "2026-05-13"

# Single schedule source of truth.
# Edit only these cron lines when changing run times.
# Format: "<cron>", # job_key: <job_key> | <repo>/<workflow_file>
# Schedule is in UTC
[triggers]
crons = [
  "0 3 * * *",   # job_keys: uk_aq_stations_daily | uk-aq-ingest/uk_aq_stations_daily.yml
  "35 4 * * *",  # job_keys: uk_aq_r2_history_dropbox_backup | uk-aq-ops/uk_aq_r2_history_dropbox_backup.yml
]

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
