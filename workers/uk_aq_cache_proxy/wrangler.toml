name = "uk-aq-cache-proxy"
main = "src/index.ts"
compatibility_date = "2026-02-22"

[observability]
enabled = true

# Runtime secrets expected:
# - SUPABASE_URL
# - SB_PUBLISHABLE_DEFAULT_KEY
# - OBS_AQIDB_SUPABASE_URL
# - OBS_AQIDB_SECRET_KEY
# - UK_AQ_CACHE_ALLOWED_ORIGINS
# - UK_AQ_EDGE_ACCESS_TOKEN_SECRET
# - UK_AQ_EDGE_UPSTREAM_SECRET
# - UK_AQ_CACHE_BYPASS_SECRET
# - UK_AQ_TURNSTILE_SECRET_KEY
# Runtime variables:
# - UK_AQ_EDGE_SESSION_MAX_AGE_SECONDS (optional)
# - UK_AQ_LOCAL_DEV_BYPASS_ENABLED (optional; set true/1 in test only)
# - UK_AQ_POSTCODE_LOOKUP_R2_API_URL (required for /api/aq/postcode_lookup)
# - UK_AQ_CHART_METRICS_RPC (optional)
# - UK_AQ_CHART_METRICS_RPC_SCHEMA (optional, default: uk_aq_public)
# - UK_AQ_CHART_METRICS_RATE_LIMIT_PER_MINUTE (optional)
# - UK_AQ_CHART_METRICS_MAX_BODY_BYTES (optional)
# - UK_AQ_TIMESERIES_V2_ENABLED (optional; default false)
# - UK_AQ_TIMESERIES_PROXY_FIRST (optional; default false)
# - UK_AQ_TIMESERIES_R2_FIRST (optional; default false; reserved for stitch phase)
# - UK_AQ_TIMESERIES_ALLOW_INGEST_OVERWRITE (optional; default false; reserved for stitch phase)
#
# Route binding is configured in Cloudflare dashboard or via wrangler CLI.
# Recommended hostnames:
# - uk-aq-cache-cic-test.chronicillnesschannel.co.uk
# - uk-aq-cache.chronicillnesschannel.co.uk
